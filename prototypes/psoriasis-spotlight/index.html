<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plaque psoriasis — Spotlight Atlas</title>
<style>
:root{
  --paper:#f2ecdd; --block:#fbf8f0; --panel:#f8f4e9; --ink:#231f18; --ink2:#5c564a; --muted:#8a8272; --rule:#cfc6b0; --rule2:#b9ad90;
  --s1:#2a78d6; --s2:#c25a1c; --s3:#1b8f68; --s4:#c98a12; --s5:#b0517f; --s6:#3f7a2e; --s7:#4a3aa7; --s8:#c0403f; --sN:#9a8f77;
  --accent:#8a2b1f; --kera:#e5c98f; --cell:#cdd8e6; --bio:#9c6b34;
  --sans:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif; --cond:"Arial Narrow",Arial,var(--sans); --mono:ui-monospace,Menlo,Consolas,monospace;
  --shadowmodal:0 24px 70px rgba(40,30,15,.45);
  --shadow:0 1px 2px rgba(70,52,20,.09), 0 6px 20px rgba(70,52,20,.07);
  --shadowsm:0 1px 3px rgba(70,52,20,.14);
  --gloss:linear-gradient(180deg, color-mix(in srgb,var(--panel) 40%,#fff) 0%, var(--panel) 62%);
}
:root[data-theme="dark"]{
  --paper:#15130f; --block:#201c16; --panel:#1c1913; --ink:#efe9db; --ink2:#c3bbab; --muted:#8a8272; --rule:#332e26; --rule2:#453d30;
  --s1:#4f92e6; --s2:#e07a3f; --s3:#31a97e; --s4:#d7a02f; --s5:#d071a0; --s6:#5aa246; --s7:#9085e9; --s8:#e06463; --sN:#9a8f77; --accent:#e0885f; --kera:#6b5a34; --cell:#2f3a49; --bio:#c99a5f;
  --shadow:0 1px 2px rgba(0,0,0,.30), 0 6px 20px rgba(0,0,0,.28);
  --shadowsm:0 1px 3px rgba(0,0,0,.4);
  --gloss:linear-gradient(180deg, color-mix(in srgb,var(--panel) 78%,#fff) 0%, var(--panel) 60%);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:12px}
button{font-family:inherit;cursor:pointer}
.tab{font-variant-numeric:tabular-nums}
#viewport{position:fixed;inset:0;overflow:hidden;cursor:grab;background:
  radial-gradient(circle at 30% 20%, color-mix(in srgb,var(--paper) 88%,#fff) 0%, var(--paper) 60%)}
#viewport.drag{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
#wires{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.node{position:absolute;cursor:pointer}
/* mechanism block */
.block{position:absolute;width:300px;background:var(--block);border:1px solid var(--rule2);border-left:4px solid var(--fam);box-shadow:var(--shadow);border-radius:2px}
.bhead{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:5px 8px;background:linear-gradient(180deg,color-mix(in srgb,var(--fam) 20%,var(--block)),color-mix(in srgb,var(--fam) 9%,var(--block)));border-bottom:1px solid var(--rule)}
.bhead .bn{font-weight:700;font-size:12px;line-height:1.05;color:var(--ink)}
.bhead .bc{font-size:9px;color:var(--muted);white-space:nowrap}
.bdesc{font-size:9.5px;color:var(--ink2);padding:3px 8px;border-bottom:1px solid var(--rule);font-style:italic}
.drow{display:grid;grid-template-columns:20px 1fr;gap:5px;padding:2px 8px;border-bottom:1px dotted var(--rule);cursor:pointer}
.drow:last-child{border-bottom:0}
.drow:hover{background:color-mix(in srgb,var(--fam) 10%,var(--block))}
.stage{font-family:var(--mono);font-size:9px;font-weight:700;text-align:center;color:var(--st,var(--muted));padding-top:1px}
.dn{font-weight:650;font-size:11px;line-height:1.08}
.dm{font-size:9px;color:var(--ink2);line-height:1.12}
.dm b{color:var(--ink);font-weight:600}
.mk{font-size:8px;font-weight:800;padding:0 2px;border-radius:2px;margin-left:2px;vertical-align:1px}
.mk.bio{color:#fff;background:var(--s1)}.mk.combo{color:#fff;background:var(--s3)}.mk.warn{color:var(--s8)}
.disc .dn{text-decoration:line-through;color:var(--muted)}
/* panels */
.panel{position:absolute;background:var(--gloss);border:1px solid var(--rule2);box-shadow:var(--shadow);border-radius:3px}
.panel h4{margin:0;display:flex;align-items:center;gap:6px;font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:12.5px;color:var(--accent);padding:5px 9px;border-bottom:1px solid var(--rule);background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 8%,transparent),transparent)}
.panel h4::before{content:"";width:4px;height:12px;background:var(--accent);border-radius:1px;flex:none;box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 30%,transparent)}
.panel .pc{padding:7px 9px}
.mast{position:absolute}
.mast .t{font-family:var(--cond);font-weight:700;font-size:42px;line-height:.86;text-transform:uppercase;letter-spacing:-.015em;color:var(--ink);text-shadow:0 1px 0 color-mix(in srgb,var(--paper) 60%,#fff)}
.mast .t small{display:block;font-family:var(--sans);font-size:9.5px;font-weight:700;letter-spacing:.2em;color:var(--accent);margin-top:6px;padding-bottom:7px;border-bottom:2px solid var(--accent);width:max-content;max-width:100%}
.mast .o{font-size:11.5px;line-height:1.4;color:var(--ink2);max-width:540px;margin-top:9px}
.mast .kb{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
.mast .k{border:1px solid var(--rule2);background:var(--gloss);box-shadow:var(--shadowsm);padding:5px 11px 4px;border-radius:3px;border-top:2px solid var(--accent)}
.mast .k b{font-family:var(--cond);font-size:21px;font-weight:700;color:var(--ink);display:block;line-height:1}.mast .k span{font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-top:2px}
.burden .st{display:grid;grid-template-columns:56px 1fr;gap:4px 9px;font-size:10px;align-items:baseline}
.burden .st b{font-family:var(--cond);font-size:15px;text-align:right;color:var(--accent)}
.burden .st span{color:var(--ink2)}
.burden .note{font-size:9.5px;color:var(--ink2);margin-top:5px}
.mkt .big{font-family:var(--cond);font-size:30px;font-weight:700}
.mkt .r{display:flex;justify-content:space-between;font-size:10px;color:var(--ink2);margin-top:2px}
.bench .row{display:grid;grid-template-columns:74px 1fr 20px;gap:5px;align-items:center;font-size:9.5px;margin:1.5px 0;cursor:pointer}
.bench .lab{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink2)}
.bench .tr{height:8px;background:var(--paper);border:1px solid var(--rule)}.bench .fi{height:100%}.bench .vv{text-align:right;color:var(--muted);font-weight:700}
.sites table{border-collapse:collapse;font-size:9.5px;width:100%}
.sites td{border-bottom:1px dotted var(--rule);padding:2px 4px;vertical-align:top}
.sites td:first-child{font-weight:700;white-space:nowrap}.sites td:nth-child(2){color:var(--accent);white-space:nowrap;font-weight:600}
.cats .row{display:grid;grid-template-columns:42px 1fr;gap:5px;font-size:9.5px;margin:2px 0;cursor:pointer}
.cats .d{font-weight:700;color:var(--accent);font-size:9px}.cats .k{font-size:7px;text-transform:uppercase;color:var(--muted)}
.deals .row{font-size:9.5px;margin:3px 0;cursor:pointer;border-bottom:1px dotted var(--rule);padding-bottom:2px}
.deals b{font-weight:700}.deals .v{color:var(--accent);font-weight:700}
.legend{font-size:9.5px;color:var(--ink2)}.legend code{font-family:var(--mono);font-weight:700;background:var(--paper);border:1px solid var(--rule);padding:0 3px}
.legend .lr{margin:3px 0}.legend .fam{display:inline-flex;align-items:center;gap:3px;margin:1px 6px 1px 0}.legend .fam i{width:8px;height:8px;display:inline-block;border-radius:2px}
/* band label */
.bandlabel{position:absolute;font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--rule2);font-size:13px}
/* ---- objective mind-map (RA-Capital-style decision tree) ---- */
.hnode{position:absolute;transform:translateY(-50%);border-radius:6px}
.hobj{color:#fff;padding:9px 12px;box-shadow:var(--shadow);border-radius:7px}
.hobj .ht{font-family:var(--cond);font-weight:700;font-size:17px;line-height:1.0;text-transform:uppercase;letter-spacing:.005em}
.hobj .hd{font-size:9px;line-height:1.3;margin-top:5px;opacity:.93}
.hstrat{color:#fff;padding:6px 10px;box-shadow:var(--shadowsm)}
.hstrat .ht{font-family:var(--cond);font-weight:700;font-size:13.5px;line-height:1.06}
.hstrat .hd{font-size:8px;line-height:1.24;margin-top:2px;opacity:.9}
.happr{padding:5px 9px;box-shadow:var(--shadowsm);border:1px solid var(--hc)}
.happr .ht{font-weight:700;font-size:10.5px;line-height:1.12;color:var(--ink)}
.happr .hd{font-size:8px;color:var(--ink2);margin-top:2px;line-height:1.22}
.hmech{border:1px solid var(--hc);box-shadow:var(--shadowsm);background:var(--block);border-radius:6px;overflow:hidden}
.hmech .mh{font-weight:700;font-size:9.5px;padding:3px 8px;color:var(--ink);background:color-mix(in srgb,var(--hc) 30%,var(--block));border-bottom:1px solid var(--hc)}
.hmech .md{font-size:7.5px;color:var(--ink2);padding:3px 8px 2px;line-height:1.22;font-style:italic}
.hasset{display:grid;grid-template-columns:15px 1fr;gap:6px;padding:2px 8px;font-size:9px;cursor:pointer;align-items:baseline;border-top:1px dotted var(--rule)}
.hasset:hover{background:color-mix(in srgb,var(--hc) 14%,transparent)}
.hasset .hs{font-family:var(--mono);font-weight:700;font-size:8px;text-align:center;color:var(--st,var(--muted))}
.hasset .han{font-weight:650;color:var(--ink)}.hasset.disc .han{text-decoration:line-through;color:var(--muted)}
.hasset .hac{color:var(--muted);font-size:7.5px}
.hasset .mk{font-size:7px}
.hwire{fill:none;stroke-linecap:round}
/* standard-of-care ladder */
.soc{display:flex;align-items:stretch}
.soc .step{flex:1;position:relative;padding:8px 11px 9px 18px;border-left:1px solid var(--rule);min-width:0}
.soc .step:first-child{border-left:0}
.soc .step::before{content:"";position:absolute;left:6px;top:8px;bottom:8px;width:5px;border-radius:3px;background:var(--sc);box-shadow:0 0 7px color-mix(in srgb,var(--sc) 55%,transparent)}
.soc .step .tier{font-family:var(--cond);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.soc .step .nm{font-family:var(--cond);font-size:18px;font-weight:700;color:var(--sc);line-height:1;margin:2px 0 4px}
.soc .step .ag{font-size:9.5px;color:var(--ink);font-weight:600;line-height:1.3}
.soc .step .nt{font-size:9px;color:var(--ink2);line-height:1.32;margin-top:5px}
.socbar{height:6px;display:flex;margin:2px 0 9px;border-radius:3px;overflow:hidden;box-shadow:var(--shadowsm)}.socbar i{flex:1}
.socnote{font-size:9px;color:var(--muted);margin-top:8px;font-style:italic}
/* trials timeline */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px 18px}
.trow{display:grid;grid-template-columns:38px 1fr;gap:8px;font-size:9.5px;cursor:pointer;padding:4px 5px;border-bottom:1px dotted var(--rule);align-items:baseline}
.trow:hover{background:color-mix(in srgb,var(--tc) 10%,transparent)}
.trow .yr{font-family:var(--cond);font-weight:700;font-size:13px;color:var(--tc);text-align:right;position:relative}
.trow .tn{font-weight:700;color:var(--ink)}.trow .tn i{font-weight:600;font-style:normal;color:var(--tc)}
.trow .tr{color:var(--ink2);line-height:1.28;margin-top:1px}
/* glossary */
.gloss2{columns:5;column-gap:18px;font-size:9.5px}
@media (max-width:1px){.gloss2{columns:2}}
.gloss2 .g{break-inside:avoid;margin:0 0 6px;line-height:1.28}
.gloss2 .g b{color:var(--accent);font-weight:700}
.gloss2 .g span{color:var(--ink2)}
/* comorbidity + market share */
.comorb{display:grid;grid-template-columns:1fr auto;gap:2px 10px;font-size:9.5px;margin-top:4px}
.comorb b{color:var(--accent);font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.comorb span{color:var(--ink2)}
.mshare .row{display:grid;grid-template-columns:11px 1fr auto;gap:7px;align-items:center;font-size:9.5px;margin:3px 0}
.mshare .row i{width:10px;height:10px;border-radius:2px;box-shadow:0 0 5px color-mix(in srgb,var(--mc) 50%,transparent)}
.mshare .row .cl{font-weight:600;color:var(--ink)}
.mshare .row .tr{color:var(--ink2);font-style:italic;text-align:right;white-space:nowrap}
/* SoC stage table */
.soctab{display:grid;grid-template-columns:118px repeat(3,1fr);font-size:9px;border:1px solid var(--rule);border-radius:4px;overflow:hidden}
.soctab .hd{font-family:var(--cond);font-weight:700;font-size:11px;color:#fff;padding:4px 8px;text-transform:uppercase;line-height:1}
.soctab .hd span{font-weight:400;font-size:7.5px;opacity:.9;text-transform:none}
.soctab .rl{font-weight:700;color:var(--ink);padding:4px 8px;border-top:1px solid var(--rule);display:flex;align-items:center;font-size:9px}
.soctab .cell{border-top:1px solid var(--rule);border-left:1px solid var(--rule);min-height:19px;display:flex;align-items:center}
.soctab .pres{font-size:8px;color:var(--ink2);padding:3px 7px;line-height:1.2;align-items:flex-start}
.soctab .pill{height:100%;min-height:17px;width:100%;display:flex;align-items:center;padding:0 8px;color:#fff;font-weight:700;font-size:8.5px}
.socnote{font-size:9px;color:var(--muted);margin-top:7px;font-style:italic}
/* sales donut */
.donut{display:flex;gap:12px;align-items:center}
.donut svg{flex:none}
.donut .lg{font-size:8.5px;color:var(--ink2);flex:1;min-width:0}
.donut .lg .row{display:grid;grid-template-columns:9px 1fr auto;gap:6px;align-items:center;margin:1.5px 0;cursor:pointer}
.donut .lg .row:hover{color:var(--ink)}
.donut .lg i{width:9px;height:9px;border-radius:2px}
.donut .lg b{font-variant-numeric:tabular-nums;color:var(--ink);font-weight:700}
/* dev matrix */
.devmx{border-collapse:collapse;width:100%;font-size:8.5px}
.devmx th{font-family:var(--cond);font-weight:700;font-size:9px;color:var(--ink2);padding:3px 2px;text-align:center;vertical-align:bottom;line-height:1}
.devmx th.co{text-align:left;padding-left:4px}
.devmx td{border:1px solid var(--rule);text-align:center;padding:2px 0}
.devmx td.co{text-align:left;font-weight:600;color:var(--ink);padding:2px 5px;white-space:nowrap;border-left:0}
.devmx .cc{display:inline-block;min-width:16px;padding:0 2px;border-radius:2px;color:#fff;font-family:var(--mono);font-weight:700;font-size:8px}
.devmx tr:hover td{background:color-mix(in srgb,var(--accent) 5%,transparent)}
/* schematic labels */
.schlab{font-family:var(--sans);font-weight:700;font-size:11px;fill:var(--ink)}
.schsub{font-size:8.5px;fill:var(--ink2)}
.schnote{font-size:8.5px;font-style:italic;fill:var(--ink2);paint-order:stroke;stroke:var(--paper);stroke-width:3px}
.anchor:hover ellipse,.anchor:hover circle,.anchor:hover rect{filter:brightness(1.06)}
.anchor{cursor:pointer}
/* controls */
.ctrls{position:fixed;right:14px;bottom:14px;display:flex;gap:6px;z-index:30}
.ctrls button{width:32px;height:32px;border:1px solid var(--rule2);background:var(--panel);color:var(--ink);border-radius:4px;font-size:16px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.hintbar{position:fixed;left:14px;bottom:12px;z-index:30;font-size:10px;color:var(--muted);background:color-mix(in srgb,var(--paper) 80%,transparent);padding:3px 8px;border:1px solid var(--rule)}
.search{position:fixed;left:50%;transform:translateX(-50%);top:12px;z-index:30;background:var(--panel);border:1px solid var(--rule2);color:var(--ink);border-radius:3px;padding:6px 9px;font-size:12px;width:210px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
/* modal ER popup */
.backdrop{position:fixed;inset:0;background:rgba(20,15,8,.55);backdrop-filter:blur(2px);z-index:40;display:none;align-items:center;justify-content:center;padding:24px}
.backdrop.on{display:flex}
.modal{background:var(--paper);border:1px solid var(--rule2);border-top:4px solid var(--mc,var(--accent));width:min(1000px,96vw);height:min(660px,92vh);box-shadow:var(--shadowmodal);display:grid;grid-template-rows:auto 1fr;overflow:hidden}
.mhead{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--rule2)}
.mhead .shape{width:26px;height:26px;flex:none}.mhead .tt{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--mc,var(--accent))}
.mhead h2{margin:0;font-family:var(--cond);font-size:23px;font-weight:700;line-height:1;text-transform:uppercase}.mhead .sub{font-size:11px;color:var(--muted)}
.mhead .x{margin-left:auto;background:transparent;border:0;color:var(--muted);font-size:24px}
.mbody{display:grid;grid-template-columns:340px 1fr;min-height:0}
.minfo{overflow:auto;padding:13px 15px;border-right:1px solid var(--rule2)}
.kpis{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}.kpis .k{border:1px solid var(--rule2);background:var(--block);padding:5px 9px}.kpis .k b{font-family:var(--cond);font-size:17px;font-weight:700}.kpis .k span{display:block;font-size:8.5px;text-transform:uppercase;color:var(--muted)}
.desc{font-size:12.5px;color:var(--ink2);margin:6px 0}.desc b{color:var(--ink)}
.safety{font-size:11.5px;border:1px solid var(--rule2);border-left:3px solid var(--s4);background:color-mix(in srgb,var(--s4) 7%,var(--block));padding:7px 9px;margin:8px 0}
.srcs{font-size:10.5px;color:var(--muted);margin-top:10px}.srcs a{color:var(--s1);text-decoration:none}
.mgraph{position:relative;min-width:0}.mgraph svg{width:100%;height:100%}
.mgraph .glegend{position:absolute;bottom:8px;left:10px;right:10px;display:flex;flex-wrap:wrap;gap:4px 12px;font-size:9.5px;color:var(--muted);background:color-mix(in srgb,var(--paper) 80%,transparent);padding:4px 6px}
.elabel{font-size:10px;fill:var(--ink);paint-order:stroke;stroke:var(--paper);stroke-width:3px}
.ecenter{font-family:var(--cond);font-weight:700;font-size:12px;fill:var(--ink);paint-order:stroke;stroke:var(--paper);stroke-width:3.5px}
.erel{font-size:8.5px;fill:var(--muted);paint-order:stroke;stroke:var(--paper);stroke-width:2.6px}
/* modal graph tools (1-hop/2-hop + explore) */
.gtools{position:absolute;top:8px;right:10px;z-index:2;display:flex;gap:5px}
.gtools .gt{border:1px solid var(--rule2);background:var(--block);color:var(--ink2);padding:3px 9px;border-radius:3px;font-size:10px;font-weight:600}
.gtools .gt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.gholder{position:absolute;inset:0}
.ctrls button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
/* path-finding bar */
.pathbar{position:fixed;left:50%;transform:translateX(-50%);top:46px;z-index:30;display:flex;gap:5px;align-items:center;background:var(--panel);border:1px solid var(--rule2);padding:4px 6px;font-size:10px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.pathbar input{font-family:inherit;font-size:11px;border:1px solid var(--rule);background:var(--paper);color:var(--ink);padding:3px 5px;width:118px}
.pathbar button{border:1px solid var(--rule2);background:var(--block);color:var(--ink);padding:3px 9px;border-radius:3px;font-size:10px;font-weight:600}
.pathbar .arw{color:var(--muted)}
/* network explorer overlay */
#netwrap{position:fixed;inset:0;z-index:20;display:none;background:
  radial-gradient(circle at 50% 42%, color-mix(in srgb,var(--paper) 92%,#fff) 0%, var(--paper) 65%)}
#netwrap.on{display:block}
#net{width:100%;height:100%;display:block;cursor:grab}
#net.drag{cursor:grabbing}
.netedge{stroke:var(--rule2);stroke-width:1.5;fill:none}
.netedge.hl{stroke:var(--accent);stroke-width:3}
.neterel{font-size:9.5px;fill:var(--muted);paint-order:stroke;stroke:var(--paper);stroke-width:2.8px;pointer-events:none}
.neterel.hl{fill:var(--accent);font-weight:700}
.netlabel{font-size:11px;fill:var(--ink);paint-order:stroke;stroke:var(--paper);stroke-width:3.4px;cursor:pointer}
.nettitle{position:fixed;left:16px;top:14px;z-index:22;max-width:330px;display:none;background:color-mix(in srgb,var(--paper) 82%,transparent);border:1px solid var(--rule);padding:7px 10px}

Deal","label":"Takeda ← Nimbus Therapeutics","attrs":{"value":"$4.0B upfront","year":2023,"kind":"acquisition","note":"Oral TYK2 TAK-279 acquired from Nimbus.","counterparty":"Nimbus Therapeutics","acquirer":"Takeda"},"sources":[]},{"id":"deal:d2","type":"Deal","label":"Amgen ← Celgene / BMS","attrs":{"value":"$13.4B","year":2019,"kind":"acquisition","note":"Otezla divested during the BMS–Celgene merger.","counterparty":"Celgene / BMS","acquirer":"Amgen"},"sources":[]},{"id":"deal:d3","type":"Deal","label":"Johnson & Johnson ← Protagonist Therapeutics","attrs":{"value":"co-development","year":2017,"kind":"licensing","note":"Oral IL-23R peptide JNJ-2113.","counterparty":"Protagonist Therapeutics","acquirer":"Johnson & Johnson"},"sources":[]},{"id":"deal:d4","type":"Deal","label":"Organon ← Dermavant","attrs":{"value":"~$1.2B","year":2024,"kind":"acquisition","note":"Topical AhR agonist Vtama.","counterparty":"Dermavant","acquirer":"Organon"},"sources":[]},{"id":"company:organon","type":"Company","label":"Organon","attrs":{"type":"company"},"sources":[]},{"id":"deal:d5","type":"Deal","label":"Alumis ← ACELYRIN","attrs":{"value":"all-stock merger","year":2025,"kind":"merger","note":"Combined oral-immunology pipelines (ESK-001 + izokibep).","counterparty":"ACELYRIN","acquirer":"Alumis"},"sources":[]},{"id":"deal:d6","type":"Deal","label":"Eli Lilly ← DICE Therapeutics","attrs":{"value":"$2.4B","year":2023,"kind":"acquisition","note":"Oral IL-17 antagonist platform.","counterparty":"DICE Therapeutics","acquirer":"Eli Lilly"},"sources":[]},{"id":"bio:dc","type":"Biology","label":"Dendritic cell","attrs":{"kind":"cell","pos":"dc","description":"Dermal antigen-presenting cell. On activation it secretes IL-23, IL-12 and TNF, initiating and sustaining the pathogenic T-cell response that drives psoriatic plaques."},"sources":[]},{"id":"bio:th17","type":"Biology","label":"Th17 cell","attrs":{"kind":"cell","pos":"th17","description":"IL-23-dependent effector T cell. It signals intracellularly through TYK2 / JAK-STAT and secretes the effector cytokines IL-17A, IL-17F and IL-22."},"sources":[]},{"id":"bio:kera","type":"Biology","label":"Keratinocyte","attrs":{"kind":"cell","pos":"kera","description":"Epidermal cell. Under IL-17 and TNF it hyperproliferates and releases further chemokines and cytokines, closing a self-amplifying inflammatory loop that forms the scaly plaque."},"sources":[]},{"id":"bio:plaque","type":"Biology","label":"Psoriatic plaque","attrs":{"kind":"outcome","pos":"plaque","description":"The clinical lesion — a well-demarcated, thickened, scaly erythematous plaque produced by keratinocyte hyperproliferation and immune infiltration."},"sources":[]},{"id":"bio:il23","type":"Biology","label":"IL-23","attrs":{"kind":"cytokine","pos":"il23","description":"Dendritic-cell cytokine (p19 + p40) that maintains pathogenic Th17 cells — the most disease-specific and best-validated target in psoriasis."},"sources":[]},{"id":"bio:p40","type":"Biology","label":"IL-12/23 p40","attrs":{"kind":"cytokine","pos":"p40","description":"Shared subunit of IL-12 and IL-23. Blocking p40 (ustekinumab) inhibits both; selective p19 blockade has since proven more effective."},"sources":[]},{"id":"bio:il17","type":"Biology","label":"IL-17A / IL-17F","attrs":{"kind":"cytokine","pos":"il17","description":"The effector cytokines acting on keratinocytes. Neutralising them delivers the fastest, deepest skin clearance of any class."},"sources":[]},{"id":"bio:il22","type":"Biology","label":"IL-22","attrs":{"kind":"cytokine","pos":"il22","description":"Th17-derived cytokine promoting keratinocyte proliferation and epidermal acanthosis."},"sources":[]},{"id":"bio:tnf","type":"Biology","label":"TNF-α","attrs":{"kind":"cytokine","pos":"tnf","description":"Pleiotropic pro-inflammatory cytokine that amplifies the cascade at multiple points; the first successful biologic target in psoriasis."},"sources":[]},{"id":"bio:tyk2","type":"Biology","label":"TYK2","attrs":{"kind":"intracellular","pos":"tyk2","description":"Intracellular pseudokinase that transduces IL-23 (and type-I interferon) signalling — the basis of oral allosteric TYK2 inhibition."},"sources":[]},{"id":"bio:pde4","type":"Biology","label":"PDE4 / cAMP","attrs":{"kind":"intracellular","pos":"pde4","description":"Phosphodiesterase-4 regulates intracellular cAMP in immune cells; inhibiting it dampens pro-inflammatory cytokine output (apremilast, roflumilast)."},"sources":[]},{"id":"bio:il23r","type":"Biology","label":"IL-23 receptor","attrs":{"kind":"receptor","description":"Cell-surface receptor complex (IL-23R + IL-12Rβ1) on Th17 cells. Engaged by IL-23; the target of the first oral IL-23R peptide antagonist (icotrokinra)."},"sources":[]},{"id":"bio:il17r","type":"Biology","label":"IL-17RA receptor","attrs":{"kind":"receptor","description":"Keratinocyte receptor (IL-17RA/RC) for IL-17A/F. Neutralised directly by brodalumab; signals via Act1 to NF-κB."},"sources":[]},{"id":"bio:jak2","type":"Biology","label":"JAK2","attrs":{"kind":"intracellular","description":"Janus kinase paired with TYK2 beneath the IL-23 receptor; together they phosphorylate STAT3 on cytokine binding."},"sources":[]},{"id":"bio:stat3","type":"Biology","label":"STAT3","attrs":{"kind":"intracellular","description":"Transcription factor phosphorylated by TYK2/JAK2. It translocates to the nucleus and switches on the Th17 genetic programme."},"sources":[]},{"id":"bio:rorgt","type":"Biology","label":"RORγt","attrs":{"kind":"intracellular","description":"Master transcription factor of Th17 identity, induced downstream of STAT3; it drives IL-17/IL-22 production and is an emerging small-molecule target."},"sources":[]},{"id":"bio:nfkb","type":"Biology","label":"NF-κB","attrs":{"kind":"intracellular","description":"Central inflammatory transcription factor activated in keratinocytes by IL-17 and TNF, amplifying chemokine and cytokine output."},"sources":[]}],"edges":[{"type":"DEVELOPED_BY","source":"drug:guse // orthogonal elbow: horizontal stub -> vertical channel -> horizontal into the anchor, with rounded corners
function elbowPath(sx,sy,cx,ax,ay,r){
  const h1=Math.sign(cx-sx)||1, v=Math.sign(ay-sy)||1, h2=Math.sign(ax-cx)||1;
  const rr=Math.min(r,Math.abs(cx-sx)/2||r,Math.abs(ay-sy)/2||r,Math.abs(ax-cx)/2||r);
  return `M${sx},${sy} L${cx-h1*rr},${sy} Q${cx},${sy} ${cx},${sy+v*rr} L${cx},${ay-v*rr} Q${cx},${ay} ${cx+h2*rr},${ay} L${ax},${ay}`;
}
function drawConnectors(){
  WIRES.innerHTML="";

    const m=MOA[fk]; if(!m)continue; const el2=CANVAS.querySelector(`.block[data-node="${CSS.escape(m.id)}"]`); if(!el2)continue;

    const sx=left?bx+300:bx, sy=by+18; const [ax,ay]=SCH[FAM[fk].anchor]||SCH.th17;

}

/* ---------- objective mind-map (Objective -> Strategy -> Approach -> Mechanism -> Assets) ---------- */
const MMTOP=330, CENTERX=CW/2, HGAP=54;
const HW={obj:252,strat:188,appr:174,mech:198}, HH={chipH:22,mechHead:20,vGap:12,minH:26};
const DBYN={}; G.nodes.forEach(n=>{if(n.type==="Drug")DBYN[n.label.toLowerCase()]=n;});
function hMeasure(n){
  if(n.k==="mech"){const na=(n.drugs||[]).length; n._h=HH.mechHead+(n.d?15:0)+(na?na*HH.chipH+4:8); return n._h;}
  const kids=n.ch||[]; let h=0; kids.forEach((c,i)=>{h+=hMeasure(c); if(i)h+=HH.vGap;}); n._h=Math.max(h,HH.minH); return n._h;
}
function hPlace(n,depth,side,xInner,yTop){
  n._depth=depth; n._side=side; n._yTop=yTop; n._yc=yTop+n._h/2;
  const w=HW[n.k]||HW.mech; n._w=w; n._innerX=xInner; n._x=side<0?xInner-w:xInner; n._outerX=side<0?n._x:n._x+w;
  const kids=n.ch||[]; if(kids.length){
    const childInner=side<0?n._outerX-HGAP:n._outerX+HGAP;
    let kh=0; kids.forEach((c,i)=>{kh+=c._h; if(i)kh+=HH.vGap;});
    let y=n._yc-kh/2; kids.forEach(c=>{hPlace(c,depth+1,side,childInner,y); y+=c._h+HH.vGap;});
  }
}
function buildHierarchy(){
  const H=G.hierarchy||[]; if(!H.length)return;

  let ly=MMTOP; H.filter(o=>o.side==="left").forEach(o=>{hPlace(o,0,-1,CENTERX-150,ly); ly+=o._h+80;});
  let ry=MMTOP; H.filter(o=>o.side!=="left").forEach(o=>{hPlace(o,0,+1,CENTERX+150,ry); ry+=o._h+80;});
  const tint=(c,p)=>`color-mix(in srgb, ${css(c)} ${p}%, var(--block))`;
  const walk=(n,fn)=>{fn(n); (n.ch||[]).forEach(c=>walk(c,fn));};
  H.forEach(o=>{const oc=o.c||"--s1", ocv=css(oc);

  if(shape=="hexagon"){let p=[];for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;p.push(`${(x+s*Math.cos(a)).toFixed(1)},${(y+s*Math.sin(a)).toFixed(1)}`);}return p.join(" ");}
  if(shape=="pentagon"){let p=[];for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5;p.push(`${(x+s*Math.cos(a)).toFixed(1)},${(y+s*Math.sin(a)).toFixed(1)}`);}return p.join(" ");}

  else if(n.type=="Company"){const dr=iN(n.id,"DEVELOPED_BY");K(dr.length,"assets");K(new Set(dr.map(d=>(oN(d.id,"HAS_MECHANISM")[0]||{}).id)).size,"mechanisms");K(dr.filter(d=>d.attrs.highest_phase=="approved").length,"approved");}
  else if(n.type=="MoAClass"){const dr=iN(n.id,"HAS_MECHANISM");K(dr.length,"drugs");K(dr.filter(d=>d.attrs.highest_phase=="approved").length,"approved");const bp=Math.max(0,...dr.map(d=>d.attrs.p90||0));K(bp||null,"best PASI 90");}
  else if(n.type=="Target"){K(a.ot_association_score?a.ot_association_score.toFixed(2):null,"OT assoc.");K(iN(n.id,"HITS").length,"drugs");}
  else if(n.type=="Catalyst"){K(a.date,"date");K(a.kind?a.kind.replace("_"," "):null,"type");K(a.company,"company");}
  else if(n.type=="Deal"){K(a.value,"value");K(a.year,"year");K(a.kind,"type");}
  else if(n.type=="Biology"){K(a.kind,"role");const dz=biologyDrugs(n.id);K(dz.length||null,"drugs engaging");const links=(OUT[n.id]||[]).filter(e=>N[e.target]&&N[e.target].type=="Biology").length+(INC[n.id]||[]).filter(e=>N[e.source]&&N[e.source].type=="Biology").length;K(links||null,"cascade links");}
  info.append(kp);
  const d=describe(n); if(d)info.append(el("div",{cls:"desc",html:d}));
  if(n.type=="Drug"){const m=oN(n.id,"HAS_MECHANISM")[0];if(m&&m.attrs.safety)info.append(el("div",{cls:"safety",html:"<b>Class safety.</b> "+esc(m.attrs.safety)}));}
  if(n.type=="MoAClass"&&a.safety)info.append(el("div",{cls:"safety",html:"<b>Class safety.</b> "+esc(a.safety)}));
  if(n.sources&&n.sources.length)info.append(el("div",{cls:"srcs",html:"Sources: "+n.sources.map(i=>SRC[i]?`<a href="${esc(SRC[i].url||'#')}" target="_blank" rel="noopener">${esc(SRC[i].name||i)}</a>`:i).join(", ")}));}
function describe(n){const a=n.attrs;
  if(n.type=="Drug"){let s=a.note?esc(a.note):"";const m=oN(n.id,"HAS_MECHANISM")[0];if(m)s=`<b>${esc(m.label)}</b>${a.mechanism?" — "+esc(a.mechanism):""}. `+s;if(a.bios)s+=` <b>Biosimilars:</b> ${esc(a.bios)}.`;return s;}
  if(n.type=="Company")return a.positioning?esc(a.positioning):`Develops ${iN(n.id,"DEVELOPED_BY").length} psoriasis asset(s).`;
  if(n.type=="MoAClass"){let s="";if(a.rationale)s+="<b>Rationale.</b> "+esc(a.rationale)+" ";if(a.mechanism)s+="<b>Mechanism.</b> "+esc(a.mechanism);return s;}
  if(n.type=="Target")return a.rationale?esc(a.rationale):(a.name?esc(a.name):"");
  if(n.type=="Catalyst")return a.significance?esc(a.significance):"";
  if(n.type=="Deal")return a.note?esc(a.note):"";
  if(n.type=="Biology"){let s=a.description?esc(a.description):"";const dz=biologyDrugs(n.id);
    if(dz.length){const names=dz.slice(0,7).map(d=>esc(d.label)).join(", ");s+=` <b>Engaged by</b> ${dz.length} asset(s) in this landscape: ${names}${dz.length>7?", …":""}.`;}
    return s;}
  return "";}
function biologyDrugs(id){const set=new Set();
  iN(id,"PART_OF").forEach(t=>iN(t.id,"HITS").forEach(d=>set.add(d.id)));
  iN(id,"ACTS_ON").forEach(m=>{if(m.type=="MoAClass")iN(m.id,"HAS_MECHANISM").forEach(d=>set.add(d.id));});
  return [...set].map(x=>N[x]).filter(Boolean).sort((a,b)=>(PORD[a.attrs.highest_phase]-PORD[b.attrs.highest_phase]));}
const isHub=o=>o&&(o.type=="Indication"||o.type=="Modality");
function erDiagram(center,hop){hop=hop||1;const svg=svgEl("svg",{viewBox:"0 0 620 480",preserveAspectRatio:"xMidYMid meet"});
  const defs=svgEl("defs");defs.innerHTML=`<marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="${css('--muted')}"/></marker>`;svg.append(defs);
  const cx=310,cy=230;
  // draw a labelled, directional edge between two points, trimmed to the node radii
  function link(A,B,rr,rA,rB,faint){const dx=B.x-A.x,dy=B.y-A.y,L=Math.hypot(dx,dy)||1,ux=dx/L,uy=dy/L;
    const a2={x:A.x+ux*rA,y:A.y+uy*rA},b2={x:B.x-ux*rB,y:B.y-uy*rB};
    svg.append(svgEl("line",{x1:a2.x,y1:a2.y,x2:b2.x,y2:b2.y,stroke:css("--rule2"),"stroke-width":faint?1:1.4,opacity:faint?.7:1,"marker-end":"url(#ah)"}));
    const rl=svgEl("text",{x:A.x+(B.x-A.x)*0.5,y:A.y+(B.y-A.y)*0.5-2,"text-anchor":"middle",class:"erel"});rl.textContent=REL[rr]||rr.toLowerCase();svg.append(rl);}
  function node(o,x,y,r){const g=svgEl("g");g.style.cursor="pointer";g.onclick=()=>openModal(o.id);
    g.append(drawShape(tshape(o),x,y,r,tcolor(o),css("--paper")));
    const tl=svgEl("text",{x,y:y>cy?y+r+12:y-r-6,"text-anchor":"middle",class:"elabel"});tl.textContent=o.label.length>18?o.label.slice(0,17)+"…":o.label;g.append(tl);svg.append(g);}
  const neigh=neighborsOf(center.id);
  const innerCap=hop==2?10:15, shown=neigh.slice(0,innerCap), R=hop==2?135:(shown.length>10?170:150);
  const placed={};
  shown.forEach((nb,i)=>{const ang=-Math.PI/2+i*2*Math.PI/Math.max(1,shown.length),x=cx+R*Math.cos(ang),y=cy+R*Math.sin(ang),o=N[nb.other];
    placed[nb.other]={x,y,ang};
    const A=nb.dir=="out"?{x:cx,y:cy}:{x,y},B=nb.dir=="out"?{x,y}:{x:cx,y:cy};link(A,B,nb.type,17,12);
    node(o,x,y,11);});
  // second hop — neighbours-of-neighbours, each 1-hop parent gets an angular wedge (hubs not expanded, capped)
  if(hop==2){const seen=new Set([center.id,...shown.map(n=>n.other)]),wedge=2*Math.PI/Math.max(1,shown.length),kids={};
    shown.forEach(nb=>{if(isHub(N[nb.other]))return;const arr=[];
      neighborsOf(nb.other).forEach(nn=>{if(seen.has(nn.other)||isHub(N[nn.other])||arr.length>=5)return;seen.add(nn.other);arr.push(nn);});
      if(arr.length)kids[nb.other]=arr;});
    const R2=230;Object.keys(kids).forEach(pid=>{const arr=kids[pid],pang=placed[pid].ang,P=placed[pid];
      arr.forEach((nn,k)=>{const t=arr.length==1?0:(k/(arr.length-1)-0.5),ang=pang+t*wedge*0.72;
        const x=cx+R2*Math.cos(ang),y=cy+R2*Math.sin(ang),o=N[nn.other];
        const A=nn.dir=="out"?{x:P.x,y:P.y}:{x,y},B=nn.dir=="out"?{x,y}:{x:P.x,y:P.y};link(A,B,nn.type,10,9,true);
        node(o,x,y,9);});});}
  svg.append(drawShape(tshape(center),cx,cy,17,tcolor(center),css("--ink")));
  const cl=svgEl("text",{x:cx,y:cy+34,"text-anchor":"middle",class:"ecenter"});cl.textContent=center.label.length>22?center.label.slice(0,21)+"…":center.label;svg.append(cl);
  if(neigh.length>shown.length){const t=svgEl("text",{x:cx,y:474,"text-anchor":"middle",class:"erel"});t.textContent=`+${neigh.length-shown.length} more neighbours`;svg.append(t);}
  return svg;}

/* ---------- pan / zoom ---------- */
let tx=0,ty=0,sc=1;
const vp=document.getElementById("viewport");
function apply(){CANVAS.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;}
function fit(){const vw=vp.clientWidth,vh=vp.clientHeight;sc=Math.min(vw/CW,vh/CH)*0.98;tx=(vw-CW*sc)/2;ty=(vh-CH*sc)/2;apply();}
vp.addEventListener("wheel",e=>{e.preventDefault();const r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const ns=Math.min(3,Math.max(0.15,sc*(e.deltaY<0?1.12:0.89)));tx=mx-(mx-tx)*ns/sc;ty=my-(my-ty)*ns/sc;sc=ns;apply();},{passive:false});
let pan=null;
vp.addEventListener("mousedown",e=>{if(e.target.closest(".search,.pathbar,.ctrls,.backdrop"))return;pan={x:e.clientX-tx,y:e.clientY-ty};vp.classList.add("drag");});
addEventListener("mousemove",e=>{if(pan){tx=e.clientX-pan.x;ty=e.clientY-pan.y;apply();}});
addEventListener("mouseup",()=>{pan=null;vp.classList.remove("drag");});
document.getElementById("zin").onclick=()=>{sc=Math.min(3,sc*1.2);apply();};
document.getElementById("zout").onclick=()=>{sc=Math.max(0.15,sc/1.2);apply();};
document.getElementById("zfit").onclick=fit;
document.getElementById("theme").onclick=()=>{const r=document.documentElement,cur=r.getAttribute("data-theme")=="dark"?"light":"dark";r.setAttribute("data-theme",cur);rebuild();};
const search=document.getElementById("search");search.addEventListener("change",e=>{const q=e.target.value.trim().toLowerCase();const hit=G.nodes.find(n=>n.label.toLowerCase()==q)||G.nodes.find(n=>n.label.toLowerCase().includes(q));if(hit)openModal(hit.id);});
(function(){const d=document.getElementById("allnodes");G.nodes.filter(n=>["Drug","Company","MoAClass","Target","Biology"].includes(n.type)).forEach(n=>d.append(el("option",{value:n.label})));})();

/* ---------- network explorer (focused, force-directed) + path-finding ---------- */
let VIEW="poster";
const NETWRAP=document.getElementById("netwrap"), NET=document.getElementById("net"), netToggleBtn=document.getElementById("net-toggle");
let netNodes=[], netLinks=[], hlNodes=new Set(), netHover=null, netDrag=null, netPanS=null, netRAF=null, alpha=0;
let ntx=0,nty=0,nsc=1;
const REPULSE=9000, REST=96, SPRING=0.035, CENTER=0.02, DAMP=0.85, COOL=0.986;
const netKey=id=>netNodes.find(n=>n.id===id);
function addNetNode(id,x,y,seed){let n=netKey(id);if(n){if(seed)n.seed=true;return n;}
  const W=NET.clientWidth||900,H=NET.clientHeight||600;
  n={id,x:x!=null?x:W/2+(Math.random()*2-1)*70,y:y!=null?y:H/2+(Math.random()*2-1)*70,vx:0,vy:0,pinned:false,seed:!!seed};netNodes.push(n);return n;}
function addNetLink(s,t,type){if(s===t)return;if(netLinks.some(l=>(l.s===s&&l.t===t)||(l.s===t&&l.t===s)))return;netLinks.push({s,t,type,hl:false});}
function seedNetwork(id){netNodes=[];netLinks=[];hlNodes=new Set();ntx=0;nty=0;nsc=1;
  addNetNode(id,NET.clientWidth/2,NET.clientHeight/2,true);
  neighborsOf(id).forEach(nb=>{addNetNode(nb.other);addNetLink(id,nb.other,nb.type);});
  alpha=1;updateNetTitle();}
function expand(id){if(netNodes.length>=70){updateNetTitle("Display cap reached (70 nodes) — reseed or trace a path to refocus.");return;}
  const src=netKey(id);
  neighborsOf(id).forEach(nb=>{addNetNode(nb.other,src&&src.x+(Math.random()*2-1)*55,src&&src.y+(Math.random()*2-1)*55);addNetLink(id,nb.other,nb.type);});
  alpha=Math.max(alpha,0.7);updateNetTitle();}
function seedPath(ids,rels){netNodes=[];netLinks=[];hlNodes=new Set(ids);ntx=0;nty=0;nsc=1;
  const W=NET.clientWidth||900,H=NET.clientHeight||600,n=ids.length,step=Math.min(210,(W-170)/Math.max(1,n-1));
  ids.forEach((id,i)=>{const nd=addNetNode(id,85+i*step,H/2+(i%2?28:-28),i===0||i===n-1);nd.pinned=true;});
  for(let i=0;i<n-1;i++)netLinks.push({s:ids[i],t:ids[i+1],type:rels[i]||"",hl:true});
  alpha=0.4;updateNetTitle(`Traced path — ${n} nodes, ${n-1} links. Click a node to branch out from the chain.`);}
function simStep(){const W=NET.clientWidth||900,H=NET.clientHeight||600,ccx=W/2,ccy=H/2;
  for(let i=0;i<netNodes.length;i++)for(let j=i+1;j<netNodes.length;j++){const a=netNodes[i],b=netNodes[j];
    let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;if(d2<100)d2=100;const d=Math.sqrt(d2),f=REPULSE/d2,fx=dx/d*f,fy=dy/d*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
  netLinks.forEach(l=>{const a=netKey(l.s),b=netKey(l.t);if(!a||!b)return;let dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1,f=(d-REST)*SPRING,fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;});
  netNodes.forEach(n=>{n.vx+=(ccx-n.x)*CENTER;n.vy+=(ccy-n.y)*CENTER;if(n.pinned){n.vx=0;n.vy=0;return;}
    n.vx=Math.max(-45,Math.min(45,n.vx*DAMP));n.vy=Math.max(-45,Math.min(45,n.vy*DAMP));n.x+=n.vx*alpha;n.y+=n.vy*alpha;});}
function renderNet(){NET.innerHTML="";
  const defs=svgEl("defs");defs.innerHTML=`<marker id="nah" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="${css('--muted')}"/></marker>`;NET.append(defs);
  const root=svgEl("g",{transform:`translate(${ntx},${nty}) scale(${nsc})`});NET.append(root);
  netLinks.forEach(l=>{const a=netKey(l.s),b=netKey(l.t);if(!a||!b)return;
    const p=svgEl("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,class:"netedge"+(l.hl?" hl":"")});if(!l.hl)p.setAttribute("marker-end","url(#nah)");root.append(p);
    if(l.hl||netHover===l.s||netHover===l.t){const t=svgEl("text",{x:(a.x+b.x)/2,y:(a.y+b.y)/2-3,"text-anchor":"middle",class:"neterel"+(l.hl?" hl":"")});t.textContent=REL[l.type]||(l.type||"").toLowerCase();root.append(t);}});
  netNodes.forEach(n=>{const nd=N[n.id],r=n.seed?15:12,shp=drawShape(tshape(nd),n.x,n.y,r,tcolor(nd),css("--paper"));
    if(hlNodes.has(n.id)){shp.setAttribute("stroke",css("--accent"));shp.setAttribute("stroke-width","2.6");}
    else if(netHover===n.id){shp.setAttribute("stroke",css("--ink"));shp.setAttribute("stroke-width","2");}
    root.append(shp);
    const t=svgEl("text",{x:n.x,y:n.y+r+13,"text-anchor":"middle",class:"netlabel"});t.textContent=nd.label.length>22?nd.label.slice(0,21)+"…":nd.label;root.append(t);});}
function simLoop(){if(VIEW!=="network"){netRAF=null;return;}if(alpha>0.02){simStep();alpha*=COOL;}renderNet();netRAF=requestAnimationFrame(simLoop);}
function startSim(){if(!netRAF)netRAF=requestAnimationFrame(simLoop);}
function netPoint(e){const r=NET.getBoundingClientRect();return{x:(e.clientX-r.left-ntx)/nsc,y:(e.clientY-r.top-nty)/nsc};}
function nearestNode(p){let best=20*20,hit=null;netNodes.forEach(n=>{const dx=n.x-p.x,dy=n.y-p.y,d2=dx*dx+dy*dy;if(d2<best){best=d2;hit=n;}});return hit;}
NET.addEventListener("mousedown",e=>{const p=netPoint(e),hit=nearestNode(p);if(hit)netDrag={n:hit,moved:false};else netPanS={x:e.clientX-ntx,y:e.clientY-nty};NET.classList.add("drag");});
NET.addEventListener("mousemove",e=>{const p=netPoint(e);
  if(netDrag){netDrag.n.x=p.x;netDrag.n.y=p.y;netDrag.n.pinned=true;netDrag.moved=true;alpha=Math.max(alpha,0.3);}
  else if(netPanS){ntx=e.clientX-netPanS.x;nty=e.clientY-netPanS.y;}
  else{const h=nearestNode(p);netHover=h?h.id:null;}});
addEventListener("mouseup",()=>{if(netDrag){if(!netDrag.moved)expand(netDrag.n.id);netDrag=null;NET.classList.remove("drag");}if(netPanS){netPanS=null;NET.classList.remove("drag");}});
NET.addEventListener("dblclick",e=>{const hit=nearestNode(netPoint(e));if(hit)openModal(hit.id);});
NET.addEventListener("wheel",e=>{e.preventDefault();const r=NET.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,ns=Math.min(2.5,Math.max(0.3,nsc*(e.deltaY<0?1.12:0.89)));ntx=mx-(mx-ntx)*ns/nsc;nty=my-(my-nty)*ns/nsc;nsc=ns;},{passive:false});
function updateNetTitle(msg){const p=document.querySelector("#nettitle p");if(!p)return;
  p.textContent=msg||`${netNodes.length} nodes · ${netLinks.length} links. Click a node to expand · double-click for its card · drag to move · scroll to zoom.`;}
function setView(v,seed){VIEW=v;const on=v==="network";
  NETWRAP.classList.toggle("on",on);netToggleBtn.classList.toggle("on",on);
  document.getElementById("nettitle").style.display=on?"block":"none";
  document.getElementById("hintbar").style.display=on?"none":"block";
  if(on){if(seed)seedNetwork(seed);else if(!netNodes.length)seedNetwork((MOA.il23||G.nodes.find(n=>n.type==="Drug")).id);startSim();}
  else document.getElementById("ribbon").classList.remove("on");}
netToggleBtn.onclick=()=>setView(VIEW==="network"?"poster":"network");
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&!backdrop.classList.contains("on")&&VIEW==="network")setView("poster");});
// undirected adjacency + BFS shortest path (hubs excluded as intermediates)
const ADJ={};G.edges.forEach(e=>{(ADJ[e.source]=ADJ[e.source]||[]).push({o:e.target,type:e.type});(ADJ[e.target]=ADJ[e.target]||[]).push({o:e.source,type:e.type});});
function findPath(a,b){if(a===b)return{ids:[a],rels:[]};const ban=id=>id!==b&&isHub(N[id]);
  const prev={},prevE={},seen=new Set([a]),q=[a];
  while(q.length){const u=q.shift();for(const{o,type}of(ADJ[u]||[])){if(seen.has(o)||ban(o))continue;seen.add(o);prev[o]=u;prevE[o]=type;if(o===b){q.length=0;break;}q.push(o);}}
  if(!seen.has(b))return null;
  const ids=[],rels=[];let cur=b;while(cur!==undefined&&cur!==a){ids.unshift(cur);rels.unshift(prevE[cur]);cur=prev[cur];}
  if(cur!==a)return null;ids.unshift(a);return{ids,rels};}
const LBL2ID={};G.nodes.forEach(n=>{const k=n.label.toLowerCase();if(!(k in LBL2ID))LBL2ID[k]=n.id;});
function resolveLabel(v){v=(v||"").trim().toLowerCase();if(!v)return null;if(LBL2ID[v])return LBL2ID[v];const h=G.nodes.find(n=>n.label.toLowerCase().includes(v));return h?h.id:null;}
function ribbonHTML(ids,rels){return ids.map((id,i)=>`<b>${esc(N[id].label)}</b>${i<ids.length-1?` <span class="rel">—${esc(REL[rels[i]]||rels[i]||"")}→</span> `:""}`).join("");}
function tracePath(){const rib=document.getElementById("ribbon");
  const a=resolveLabel(document.getElementById("pin1").value),b=resolveLabel(document.getElementById("pin2").value);
  if(!a||!b){rib.className="pathribbon on";rib.innerHTML="Enter two entities — a drug, target, cell, cytokine or mechanism — to trace how they connect.";return;}
  const res=findPath(a,b);setView("network");
  if(!res){seedNetwork(a);rib.className="pathribbon on";rib.innerHTML=`No path between <b>${esc(N[a].label)}</b> and <b>${esc(N[b].label)}</b> that doesn't route through the shared indication.`;return;}
  seedPath(res.ids,res.rels);rib.className="pathribbon on";rib.innerHTML=ribbonHTML(res.ids,res.rels);}
document.getElementById("ptrace").onclick=tracePath;
document.getElementById("pin2").addEventListener("keydown",e=>{if(e.key==="Enter")tracePath();});

function rebuild(){[...CANVAS.querySelectorAll(".block,.panel,.mast,.node,.bandlabel,.hnode")].forEach(n=>n.remove());WIRES.innerHTML="";buildHierarchy();buildSchematic();buildPanels();}
rebuild(); fit();
