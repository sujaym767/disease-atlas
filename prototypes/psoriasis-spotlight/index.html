*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:12.5px;line-height:1.32}
button{font-family:inherit;cursor:pointer}
.tab{font-variant-numeric:tabular-nums}
/* masthead — RA-Capital poster header */
.mast{display:flex;align-items:flex-end;gap:20px;padding:14px 20px 12px;border-bottom:2px solid var(--ink)}
.mast .ttl{font-family:var(--cond);font-weight:700;font-size:30px;letter-spacing:-.01em;line-height:.95;text-transform:uppercase}
.mast .ttl small{display:block;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--accent);text-transform:uppercase;margin-top:3px}
.mast .one{max-width:440px;font-size:12px;color:var(--ink2);border-left:1px solid var(--rule2);padding-left:14px;align-self:stretch;display:flex;align-items:center}
.mast .kpis{display:flex;gap:16px;margin-left:auto;align-items:flex-end}
.kpi{text-align:right}.kpi b{font-family:var(--cond);font-size:22px;font-weight:700;letter-spacing:-.01em}.kpi span{display:block;font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.tools{display:flex;gap:6px;align-items:center;margin-left:8px}
.search{background:var(--block);border:1px solid var(--rule2);color:var(--ink);border-radius:2px;padding:6px 9px;font-size:12px;width:150px}
.gh{background:var(--block);border:1px solid var(--rule2);color:var(--ink2);border-radius:2px;padding:6px 8px;font-size:11px}
/* body: map + annotations */
.wrap{display:grid;grid-template-columns:1fr 288px;height:calc(100vh - 63px)}
.map{overflow:auto;padding:12px 16px 40px}
.side{overflow:auto;border-left:2px solid var(--ink);background:var(--block);padding:12px 13px 40px}
/* regions & blocks */
.region{margin-bottom:14px}
.rlabel{font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.03em;font-size:14px;color:var(--accent);border-bottom:1px solid var(--rule2);padding-bottom:2px;margin-bottom:8px}
.blocks{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start}
.block{border:1px solid var(--rule2);border-top:3px solid var(--fam,var(--sN));background:var(--block);width:250px;flex:0 0 auto}
.bhead{display:flex;justify-content:space-between;align-items:baseline;gap:6px;padding:5px 8px 4px;border-bottom:1px solid var(--rule)}
.bhead .bname{font-weight:700;font-size:11.5px;line-height:1.1;cursor:pointer}
.bhead .bname:hover{color:var(--accent)}
.bhead .bn{font-size:9px;color:var(--muted);white-space:nowrap}
.brows{padding:2px 0}
.drow{display:grid;grid-template-columns:22px 1fr;gap:5px;padding:3px 8px;border-bottom:1px dotted var(--rule);cursor:pointer}
.drow:last-child{border-bottom:0}
.drow:hover{background:color-mix(in srgb,var(--fam,var(--sN)) 9%,var(--block))}
.stage{font-family:var(--mono);font-size:9.5px;font-weight:700;text-align:center;padding-top:1px;letter-spacing:-.02em}
.dname{font-weight:650;font-size:11.5px;line-height:1.12}
.dmeta{font-size:9.5px;color:var(--ink2);line-height:1.15;margin-top:1px}
.dmeta b{color:var(--ink);font-weight:600}
.mk{font-size:8.5px;font-weight:800;padding:0 2px;border-radius:2px;margin-left:3px;vertical-align:1px}
.mk.bio{color:#fff;background:var(--s1)}.mk.combo{color:#fff;background:var(--s3)}.mk.warn{color:var(--s8)}
.disc .dname{text-decoration:line-through;color:var(--muted)}
/* annotation boxes */
.abox{border:1px solid var(--rule2);background:var(--panel);margin-bottom:12px}
.abox h4{margin:0;font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:12.5px;padding:5px 9px;border-bottom:1px solid var(--rule);color:var(--accent)}
.abox .ac{padding:8px 9px}
.mkt b{font-family:var(--cond);font-size:26px;font-weight:700}
.mkt .mrow{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink2);margin-top:3px}
.bench .brow{display:grid;grid-template-columns:76px 1fr 22px;gap:5px;align-items:center;font-size:10px;margin:2px 0;cursor:pointer}
.bench .lab{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink2)}
.bench .tr{height:9px;background:var(--paper);border:1px solid var(--rule)}
.bench .fi{height:100%}
.bench .vv{text-align:right;color:var(--muted);font-weight:700}
.cats .crow{display:grid;grid-template-columns:44px 1fr;gap:6px;font-size:10px;margin:3px 0;cursor:pointer}
.cats .cd{font-weight:700;color:var(--accent);font-size:9.5px}
.cats .ck{font-size:7.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.legend{font-size:10px;color:var(--ink2)}
.legend .lr{display:flex;gap:6px;flex-wrap:wrap;margin:3px 0}
.legend code{font-family:var(--mono);font-weight:700;background:var(--paper);border:1px solid var(--rule);padding:0 3px;border-radius:2px}
.legend .fam{display:inline-flex;align-items:center;gap:4px;margin:2px 6px 2px 0}
.legend .fam i{width:9px;height:9px;display:inline-block}
.companies{display:flex;flex-wrap:wrap;gap:4px}
.cchip{border:1px solid var(--rule2);background:var(--paper);border-radius:2px;padding:2px 7px;font-size:10px;cursor:pointer}
.cchip:hover{border-color:var(--accent)}.cchip .n{color:var(--muted);font-size:8.5px}
/* modal ER popup */
.backdrop{position:fixed;inset:0;background:rgba(20,15,8,.55);backdrop-filter:blur(2px);z-index:40;display:none;align-items:center;justify-content:center;padding:24px}
.backdrop.on{display:flex}
.modal{background:var(--paper);border:1px solid var(--rule2);border-top:4px solid var(--mc,var(--accent));width:min(980px,96vw);height:min(660px,92vh);box-shadow:var(--shadowmodal);display:grid;grid-template-rows:auto 1fr;overflow:hidden}
.mhead{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--rule2)}

.mhead .tt{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--mc,var(--accent))}
.mhead h2{margin:0;font-family:var(--cond);font-size:23px;font-weight:700;line-height:1;text-transform:uppercase;letter-spacing:-.01em}
.mhead .sub{font-size:11px;color:var(--muted);margin-top:1px}
.mhead .x{margin-left:auto;background:transparent;border:0;color:var(--muted);font-size:24px;line-height:1}
.mbody{display:grid;grid-template-columns:340px 1fr;min-height:0}
.minfo{overflow:auto;padding:13px 15px;border-right:1px solid var(--rule2)}
.kpis{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.kpis .k{border:1px solid var(--rule2);background:var(--block);padding:5px 9px;min-width:0}
.kpis .k b{font-family:var(--cond);font-size:17px;font-weight:700}.kpis .k span{display:block;font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.desc{font-size:12.5px;color:var(--ink2);margin:6px 0}
.desc b{color:var(--ink)}
.safety{font-size:11.5px;border:1px solid var(--rule2);border-left:3px solid var(--s4);background:color-mix(in srgb,var(--s4) 7%,var(--block));padding:7px 9px;margin:8px 0}
.srcs{font-size:10.5px;color:var(--muted);margin-top:10px}.srcs a{color:var(--s1);text-decoration:none}
.mgraph{position:relative;min-width:0;display:flex;flex-direction:column}

.mgraph .glegend{position:absolute;bottom:8px;left:10px;right:10px;display:flex;flex-wrap:wrap;gap:4px 12px;font-size:9.5px;color:var(--muted);background:color-mix(in srgb,var(--paper) 80%,transparent);padding:4px 6px}
.mgraph .glegend span{display:inline-flex;align-items:center;gap:4px}
.enode{cursor:pointer}
.elabel{font-family:var(--sans);font-size:10px;fill:var(--ink);paint-order:stroke;stroke:var(--paper);stroke-width:3px;stroke-linejoin:round}
.ecenter-label{font-family:var(--cond);font-weight:700;font-size:12px;fill:var(--ink);paint-order:stroke;stroke:var(--paper);stroke-width:3.5px}
.erel{font-family:var(--sans);font-size:8.5px;fill:var(--muted);paint-order:stroke;stroke:var(--paper);stroke-width:2.6px;text-transform:lowercase}
@media(max-width:1050px){.wrap{grid-template-columns:1fr}.side{display:none}.mbody{grid-template-columns:1fr;grid-template-rows:auto 1fr}.minfo{border-right:0;border-bottom:1px solid var(--rule2);max-height:40%}}

const TYPE={Drug:{c:"--s1",s:"circle"},Company:{c:"--s2",s:"rect"},MoAClass:{c:"--s7",s:"diamond"},Target:{c:"--s3",s:"triangle"},MarketSegment:{c:"--s4",s:"hexagon"},Catalyst:{c:"--s5",s:"pentagon"},Modality:{c:"--s6",s:"square"},Indication:{c:"--ink2",s:"rrect"}};
const NS="http://www.w3.org/2000/svg";
function shapePts(shape,x,y,s){
  if(shape=="diamond")return `${x},${y-s} ${x+s},${y} ${x},${y+s} ${x-s},${y}`;
  if(shape=="triangle")return `${x},${y-s} ${x+s*0.92},${y+s*0.62} ${x-s*0.92},${y+s*0.62}`;
  if(shape=="hexagon"){let p=[];for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;p.push(`${(x+s*Math.cos(a)).toFixed(1)},${(y+s*Math.sin(a)).toFixed(1)}`);}return p.join(" ");}
  if(shape=="pentagon"){let p=[];for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5;p.push(`${(x+s*Math.cos(a)).toFixed(1)},${(y+s*Math.sin(a)).toFixed(1)}`);}return p.join(" ");}
  return "";
}
function drawShape(shape,x,y,s,fill,stroke){
  let e;
  if(shape=="circle"){e=document.createElementNS(NS,"circle");e.setAttribute("cx",x);e.setAttribute("cy",y);e.setAttribute("r",s);}
  else if(shape=="rect"||shape=="rrect"){e=document.createElementNS(NS,"rect");e.setAttribute("x",x-s*1.25);e.setAttribute("y",y-s*0.8);e.setAttribute("width",s*2.5);e.setAttribute("height",s*1.6);e.setAttribute("rx",shape=="rrect"?7:3);}
  else if(shape=="square"){e=document.createElementNS(NS,"rect");e.setAttribute("x",x-s*0.86);e.setAttribute("y",y-s*0.86);e.setAttribute("width",s*1.72);e.setAttribute("height",s*1.72);}
  else{e=document.createElementNS(NS,"polygon");e.setAttribute("points",shapePts(shape,x,y,s));}
  e.setAttribute("fill",fill);if(stroke){e.setAttribute("stroke",stroke);e.setAttribute("stroke-width","1.5");}
  return e;
}
function shapeLegendHTML(){

}

function neighborsOf(id){
  const out=(OUT[id]||[]).map(e=>({other:e.target,type:e.type,dir:"out"}));
  const inc=(INC[id]||[]).map(e=>({other:e.source,type:e.type,dir:"in"}));
  const seen=new Set(),list=[];
  [...out,...inc].forEach(x=>{if(x.other!=id&&!seen.has(x.other)&&N[x.other]){seen.add(x.other);list.push(x);}});

  const rank=t=>({HAS_MECHANISM:0,DEVELOPED_BY:1,HITS:2,SERVES:3,HAS_CATALYST:4,DEVELOPED_IN:5,ACTS_ON:1,PARTY_TO:3,HAS_MODALITY:6}[t]??7);

}

  else if(n.type=="Company"){const dr=iN(n.id,"DEVELOPED_BY");K(dr.length,"assets");K(new Set(dr.map(d=>(oN(d.id,"HAS_MECHANISM")[0]||{}).id)).size,"mechanisms");K(dr.filter(d=>d.attrs.highest_phase=="approved").length,"approved");}
  else if(n.type=="MoAClass"){const dr=iN(n.id,"HAS_MECHANISM");K(dr.length,"drugs");K(dr.filter(d=>d.attrs.highest_phase=="approved").length,"approved");const best=Math.max(0,...dr.map(d=>d.attrs.p90||0));K(best||null,"best PASI 90");}
  else if(n.type=="Target"){K(a.ot_association_score?a.ot_association_score.toFixed(2):null,"OT assoc.");K(iN(n.id,"HITS").length,"drugs");}
  else if(n.type=="Catalyst"){K(a.date,"date");K(a.kind?a.kind.replace("_"," "):null,"type");K(a.company,"company");}
  info.append(kp);
  const desc=describe(n); if(desc)info.append(el("div",{cls:"desc",html:desc}));
  if(n.type=="Drug"){const m=oN(n.id,"HAS_MECHANISM")[0]; if(m&&m.attrs.safety)info.append(el("div",{cls:"safety",html:"<b>Class safety.</b> "+esc(m.attrs.safety)}));}
  if(n.type=="MoAClass"&&a.safety)info.append(el("div",{cls:"safety",html:"<b>Class safety.</b> "+esc(a.safety)}));
  if(n.sources&&n.sources.length)info.append(el("div",{cls:"srcs",html:"Sources: "+n.sources.map(i=>SRC[i]?`<a href="${esc(SRC[i].url||'#')}" target="_blank" rel="noopener">${esc(SRC[i].name||i)}</a>`:i).join(", ")}));
}
function describe(n){
  const a=n.attrs;
  if(n.type=="Drug"){let s=a.note?esc(a.note):"";const m=oN(n.id,"HAS_MECHANISM")[0];if(m)s=`<b>${esc(m.label)}</b>${a.mechanism?" — "+esc(a.mechanism):""}. `+s;if(a.bios)s+=` <b>Biosimilars:</b> ${esc(a.bios)}.`;return s;}
  if(n.type=="Company")return a.positioning?esc(a.positioning):`Develops ${iN(n.id,"DEVELOPED_BY").length} psoriasis asset(s).`;
  if(n.type=="MoAClass"){let s="";if(a.rationale)s+="<b>Rationale.</b> "+esc(a.rationale)+" ";if(a.mechanism)s+="<b>Mechanism.</b> "+esc(a.mechanism);return s;}
  if(n.type=="Target")return a.rationale?esc(a.rationale):(a.name?esc(a.name):"");
  if(n.type=="Catalyst")return a.significance?esc(a.significance):"";
  if(n.type=="MarketSegment")return a.note?esc(a.note):"";
  return "";
}
function erDiagram(center){
  const svg=document.createElementNS(NS,"svg"); svg.setAttribute("viewBox","0 0 620 480"); svg.setAttribute("preserveAspectRatio","xMidYMid meet");
  const defs=document.createElementNS(NS,"defs");
  defs.innerHTML=`<marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="${css('--muted')}"/></marker>`;
  svg.append(defs);
  const cx=310,cy=232, neigh=neighborsOf(center.id), M=Math.min(neigh.length,15), shown=neigh.slice(0,M);
  const R=shown.length>10?168:150;
  // edges + nodes
  shown.forEach((nb,i)=>{
    const ang=-Math.PI/2 + i*2*Math.PI/Math.max(1,shown.length);
    const x=cx+R*Math.cos(ang), y=cy+R*Math.sin(ang), o=N[nb.other], tc=css((TYPE[o.type]||{c:"--sN"}).c);
    // edge (respect direction): from -> to
    const A=nb.dir=="out"?{x:cx,y:cy}:{x,y}, B=nb.dir=="out"?{x,y}:{x:cx,y:cy};
    // shorten to shape edges
    const dx=B.x-A.x,dy=B.y-A.y,L=Math.hypot(dx,dy)||1, ux=dx/L,uy=dy/L;
    const a2={x:A.x+ux*(A.x==cx?14:13),y:A.y+uy*(A.y==cy?14:13)}, b2={x:B.x-ux*(B.x==cx?16:15),y:B.y-uy*(B.y==cy?16:15)};
    const ln=document.createElementNS(NS,"line");ln.setAttribute("x1",a2.x);ln.setAttribute("y1",a2.y);ln.setAttribute("x2",b2.x);ln.setAttribute("y2",b2.y);
    ln.setAttribute("stroke",css("--rule2"));ln.setAttribute("stroke-width","1.4");ln.setAttribute("marker-end","url(#ah)");svg.append(ln);
    const lx=A.x+(B.x-A.x)*0.52,ly=A.y+(B.y-A.y)*0.52;
    const rl=document.createElementNS(NS,"text");rl.setAttribute("x",lx);rl.setAttribute("y",ly-2);rl.setAttribute("text-anchor","middle");rl.setAttribute("class","erel");rl.textContent=REL[nb.type]||nb.type.toLowerCase();svg.append(rl);
    // neighbor node
    const g=document.createElementNS(NS,"g");g.setAttribute("class","enode");g.style.cursor="pointer";g.onclick=()=>openModal(o.id);
    g.append(drawShape((TYPE[o.type]||{s:"circle"}).s,x,y,11,tc,css("--paper")));
    const tl=document.createElementNS(NS,"text");tl.setAttribute("x",x);tl.setAttribute("y",y> cy?y+24:y-16);tl.setAttribute("text-anchor","middle");tl.setAttribute("class","elabel");tl.textContent=o.label.length>18?o.label.slice(0,17)+"…":o.label;g.append(tl);
    svg.append(g);
  });
  // center
  const tc=css((TYPE[center.type]||{c:"--s1"}).c);
  svg.append(drawShape((TYPE[center.type]||{s:"circle"}).s,cx,cy,17,tc,css("--ink")));
  const cl=document.createElementNS(NS,"text");cl.setAttribute("x",cx);cl.setAttribute("y",cy+34);cl.setAttribute("text-anchor","middle");cl.setAttribute("class","ecenter-label");cl.textContent=center.label.length>22?center.label.slice(0,21)+"…":center.label;svg.append(cl);
  if(neigh.length>M){const more=document.createElementNS(NS,"text");more.setAttribute("x",cx);more.setAttribute("y",470);more.setAttribute("text-anchor","middle");more.setAttribute("class","erel");more.textContent=`+${neigh.length-M} more relationships`;svg.append(more);}
  return svg;
}
