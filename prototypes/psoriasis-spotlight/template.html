<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
:root{
  --paper:#f2ecdd; --block:#fbf8f0; --panel:#f8f4e9; --ink:#231f18; --ink2:#5c564a; --muted:#8a8272; --rule:#cfc6b0; --rule2:#b9ad90;
  --s1:#2a78d6; --s2:#c25a1c; --s3:#1b8f68; --s4:#c98a12; --s5:#b0517f; --s6:#3f7a2e; --s7:#4a3aa7; --s8:#c0403f; --sN:#9a8f77;
  --accent:#8a2b1f; --kera:#e5c98f; --cell:#cdd8e6;
  --sans:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif; --cond:"Arial Narrow",Arial,var(--sans); --mono:ui-monospace,Menlo,Consolas,monospace;
  --shadowmodal:0 20px 60px rgba(40,30,15,.4);
}
:root[data-theme="dark"]{
  --paper:#15130f; --block:#201c16; --panel:#1c1913; --ink:#efe9db; --ink2:#c3bbab; --muted:#8a8272; --rule:#332e26; --rule2:#453d30;
  --s1:#4f92e6; --s2:#e07a3f; --s3:#31a97e; --s4:#d7a02f; --s5:#d071a0; --s6:#5aa246; --s7:#9085e9; --s8:#e06463; --sN:#9a8f77; --accent:#e0885f; --kera:#6b5a34; --cell:#2f3a49;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:12px}
button{font-family:inherit;cursor:pointer}
.tab{font-variant-numeric:tabular-nums}
#viewport{position:fixed;inset:0;overflow:hidden;cursor:grab;background:
  radial-gradient(circle at 30% 20%, color-mix(in srgb,var(--paper) 88%,#fff) 0%, var(--paper) 60%)}
#viewport.drag{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
#wires{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.node{position:absolute;cursor:pointer}
/* mechanism block */
.block{position:absolute;width:300px;background:var(--block);border:1px solid var(--rule2);border-left:4px solid var(--fam)}
.bhead{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:4px 8px;background:color-mix(in srgb,var(--fam) 14%,var(--block));border-bottom:1px solid var(--rule)}
.bhead .bn{font-weight:700;font-size:12px;line-height:1.05;color:var(--ink)}
.bhead .bc{font-size:9px;color:var(--muted);white-space:nowrap}
.bdesc{font-size:9.5px;color:var(--ink2);padding:3px 8px;border-bottom:1px solid var(--rule);font-style:italic}
.drow{display:grid;grid-template-columns:20px 1fr;gap:5px;padding:2px 8px;border-bottom:1px dotted var(--rule);cursor:pointer}
.drow:last-child{border-bottom:0}
.drow:hover{background:color-mix(in srgb,var(--fam) 10%,var(--block))}
.stage{font-family:var(--mono);font-size:9px;font-weight:700;text-align:center;color:var(--st,var(--muted));padding-top:1px}
.dn{font-weight:650;font-size:11px;line-height:1.08}
.dm{font-size:9px;color:var(--ink2);line-height:1.12}
.dm b{color:var(--ink);font-weight:600}
.mk{font-size:8px;font-weight:800;padding:0 2px;border-radius:2px;margin-left:2px;vertical-align:1px}
.mk.bio{color:#fff;background:var(--s1)}.mk.combo{color:#fff;background:var(--s3)}.mk.warn{color:var(--s8)}
.disc .dn{text-decoration:line-through;color:var(--muted)}
/* panels */
.panel{position:absolute;background:var(--panel);border:1px solid var(--rule2)}
.panel h4{margin:0;font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.03em;font-size:12.5px;color:var(--accent);padding:4px 8px;border-bottom:1px solid var(--rule)}
.panel .pc{padding:6px 8px}
.mast{position:absolute}
.mast .t{font-family:var(--cond);font-weight:700;font-size:30px;line-height:.9;text-transform:uppercase;letter-spacing:-.01em}
.mast .t small{display:block;font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:.14em;color:var(--accent);margin-top:3px}
.mast .o{font-size:11px;color:var(--ink2);max-width:520px;margin-top:6px}
.mast .k{display:inline-block;margin:7px 14px 0 0}.mast .k b{font-family:var(--cond);font-size:19px}.mast .k span{font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block}
.burden .st{display:grid;grid-template-columns:56px 1fr;gap:4px 9px;font-size:10px;align-items:baseline}
.burden .st b{font-family:var(--cond);font-size:15px;text-align:right;color:var(--accent)}
.burden .st span{color:var(--ink2)}
.burden .note{font-size:9.5px;color:var(--ink2);margin-top:5px}
.mkt .big{font-family:var(--cond);font-size:30px;font-weight:700}
.mkt .r{display:flex;justify-content:space-between;font-size:10px;color:var(--ink2);margin-top:2px}
.bench .row{display:grid;grid-template-columns:74px 1fr 20px;gap:5px;align-items:center;font-size:9.5px;margin:1.5px 0;cursor:pointer}
.bench .lab{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink2)}
.bench .tr{height:8px;background:var(--paper);border:1px solid var(--rule)}.bench .fi{height:100%}.bench .vv{text-align:right;color:var(--muted);font-weight:700}
.sites table{border-collapse:collapse;font-size:9.5px;width:100%}
.sites td{border-bottom:1px dotted var(--rule);padding:2px 4px;vertical-align:top}
.sites td:first-child{font-weight:700;white-space:nowrap}.sites td:nth-child(2){color:var(--accent);white-space:nowrap;font-weight:600}
.cats .row{display:grid;grid-template-columns:42px 1fr;gap:5px;font-size:9.5px;margin:2px 0;cursor:pointer}
.cats .d{font-weight:700;color:var(--accent);font-size:9px}.cats .k{font-size:7px;text-transform:uppercase;color:var(--muted)}
.deals .row{font-size:9.5px;margin:3px 0;cursor:pointer;border-bottom:1px dotted var(--rule);padding-bottom:2px}
.deals b{font-weight:700}.deals .v{color:var(--accent);font-weight:700}
.legend{font-size:9.5px;color:var(--ink2)}.legend code{font-family:var(--mono);font-weight:700;background:var(--paper);border:1px solid var(--rule);padding:0 3px}
.legend .lr{margin:3px 0}.legend .fam{display:inline-flex;align-items:center;gap:3px;margin:1px 6px 1px 0}.legend .fam i{width:8px;height:8px;display:inline-block}
/* schematic labels */
.schlab{font-family:var(--sans);font-weight:700;font-size:11px;fill:var(--ink)}
.schsub{font-size:8.5px;fill:var(--ink2)}
.anchor{cursor:pointer}
/* controls */
.ctrls{position:fixed;right:14px;bottom:14px;display:flex;gap:6px;z-index:30}
.ctrls button{width:32px;height:32px;border:1px solid var(--rule2);background:var(--panel);color:var(--ink);border-radius:4px;font-size:16px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.hintbar{position:fixed;left:14px;bottom:12px;z-index:30;font-size:10px;color:var(--muted);background:color-mix(in srgb,var(--paper) 80%,transparent);padding:3px 8px;border:1px solid var(--rule)}
.search{position:fixed;left:50%;transform:translateX(-50%);top:12px;z-index:30;background:var(--panel);border:1px solid var(--rule2);color:var(--ink);border-radius:3px;padding:6px 9px;font-size:12px;width:210px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
/* modal ER popup */
.backdrop{position:fixed;inset:0;background:rgba(20,15,8,.55);backdrop-filter:blur(2px);z-index:40;display:none;align-items:center;justify-content:center;padding:24px}
.backdrop.on{display:flex}
.modal{background:var(--paper);border:1px solid var(--rule2);border-top:4px solid var(--mc,var(--accent));width:min(1000px,96vw);height:min(660px,92vh);box-shadow:var(--shadowmodal);display:grid;grid-template-rows:auto 1fr;overflow:hidden}
.mhead{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--rule2)}
.mhead .shape{width:26px;height:26px;flex:none}.mhead .tt{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--mc,var(--accent))}
.mhead h2{margin:0;font-family:var(--cond);font-size:23px;font-weight:700;line-height:1;text-transform:uppercase}.mhead .sub{font-size:11px;color:var(--muted)}
.mhead .x{margin-left:auto;background:transparent;border:0;color:var(--muted);font-size:24px}
.mbody{display:grid;grid-template-columns:340px 1fr;min-height:0}
.minfo{overflow:auto;padding:13px 15px;border-right:1px solid var(--rule2)}
.kpis{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}.kpis .k{border:1px solid var(--rule2);background:var(--block);padding:5px 9px}.kpis .k b{font-family:var(--cond);font-size:17px;font-weight:700}.kpis .k span{display:block;font-size:8.5px;text-transform:uppercase;color:var(--muted)}
.desc{font-size:12.5px;color:var(--ink2);margin:6px 0}.desc b{color:var(--ink)}
.safety{font-size:11.5px;border:1px solid var(--rule2);border-left:3px solid var(--s4);background:color-mix(in srgb,var(--s4) 7%,var(--block));padding:7px 9px;margin:8px 0}
.srcs{font-size:10.5px;color:var(--muted);margin-top:10px}.srcs a{color:var(--s1);text-decoration:none}
.mgraph{position:relative;min-width:0}.mgraph svg{width:100%;height:100%}
.mgraph .glegend{position:absolute;bottom:8px;left:10px;right:10px;display:flex;flex-wrap:wrap;gap:4px 12px;font-size:9.5px;color:var(--muted);background:color-mix(in srgb,var(--paper) 80%,transparent);padding:4px 6px}
.elabel{font-size:10px;fill:var(--ink);paint-order:stroke;stroke:var(--paper);stroke-width:3px}
.ecenter{font-family:var(--cond);font-weight:700;font-size:12px;fill:var(--ink);paint-order:stroke;stroke:var(--paper);stroke-width:3.5px}
.erel{font-size:8.5px;fill:var(--muted);paint-order:stroke;stroke:var(--paper);stroke-width:2.6px}
</style></head>
<body>
<input class="search" id="search" placeholder="Find drug / company / target…" list="allnodes"><datalist id="allnodes"></datalist>
<div id="viewport"><div id="canvas"><svg id="wires"></svg></div></div>
<div class="hintbar">Drag to pan · scroll to zoom · click any entity for its relationship map</div>
<div class="ctrls"><button id="zin">+</button><button id="zout">–</button><button id="zfit">⤢</button><button id="theme">◐</button></div>
<div class="backdrop" id="backdrop"><div class="modal" id="modal"></div></div>

<script id="graph" type="application/json">__GRAPH__</script>
<script>
"use strict";
const G=JSON.parse(document.getElementById("graph").textContent);
const N=Object.fromEntries(G.nodes.map(n=>[n.id,n])), SRC=Object.fromEntries((G.sources||[]).map(s=>[s.id,s]));
const OUT={},INC={}; G.edges.forEach(e=>{(OUT[e.source]=OUT[e.source]||[]).push(e);(INC[e.target]=INC[e.target]||[]).push(e);});
const oN=(id,t)=>(OUT[id]||[]).filter(e=>!t||e.type===t).map(e=>N[e.target]);
const iN=(id,t)=>(INC[id]||[]).filter(e=>!t||e.type===t).map(e=>N[e.source]);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function el(t,a,k){const n=document.createElement(t);if(a)for(const x in a){if(x=="html")n.innerHTML=a[x];else if(x=="text")n.textContent=a[x];else if(x=="cls")n.className=a[x];else if(x[0]=="o"&&x[1]=="n")n.addEventListener(x.slice(2),a[x]);else if(a[x]!=null)n.setAttribute(x,a[x]);}for(const c of[].concat(k||[])){if(c==null)continue;n.append(c.nodeType?c:document.createTextNode(c));}return n;}
const NS="http://www.w3.org/2000/svg";
const svgEl=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const FAM=Object.fromEntries((G.families||[]).map(f=>[f.key,f]));
const MOA=Object.fromEntries(G.nodes.filter(n=>n.type=="MoAClass").map(m=>[m.attrs.family_key,m]));
const STAGE={approved:["M","--s6"],filed:["F","--s1"],phase3:["III","--s1"],phase2_3:["II/III","--s1"],phase2:["II","--s4"],phase1_2:["I/II","--s4"],phase1:["I","--s2"],preclinical:["P","--muted"],discontinued:["✕","--s8"]};
const PORD={approved:0,filed:1,phase3:2,phase2_3:3,phase2:4,phase1_2:5,phase1:6,preclinical:7,discontinued:8};
const fmt$=m=>m==null?null:(m>=1000?"$"+(m/1000).toFixed(1)+"B":"$"+m+"M");
const CANVAS=document.getElementById("canvas"), WIRES=document.getElementById("wires");
const CW=2760, CH=1480; CANVAS.style.width=CW+"px"; CANVAS.style.height=CH+"px"; WIRES.setAttribute("width",CW); WIRES.setAttribute("height",CH);

/* ---------- schematic (IL-23 / IL-17 immune cascade) ---------- */
const SCH={ // anchor node canvas coords
  dc:[1200,470], p40:[1330,430], il23:[1330,540], tcell:[1470,560], tyk2:[1520,640],
  il17:[1470,690], tnf:[1300,720], pde4:[1230,610], kera:[1660,600], plaque:[1790,600]
};
function buildSchematic(){
  const g=el("div",{cls:"node",style:`left:1080px;top:360px;width:820px;height:470px`});
  const s=svgEl("svg",{viewBox:"0 0 820 470",width:"820",height:"470"});
  const off=(p)=>[SCH[p][0]-1080,SCH[p][1]-360];
  // helper draw arrow
  function arrow(a,b,col,dash){const [x1,y1]=off(a),[x2,y2]=off(b);const l=svgEl("line",{x1,y1,x2,y2,stroke:col||css("--rule2"),"stroke-width":2.4,"marker-end":"url(#sah)"});if(dash)l.setAttribute("stroke-dasharray","4 3");s.append(l);}
  s.append((()=>{const d=svgEl("defs");d.innerHTML=`<marker id="sah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="${css('--ink2')}"/></marker>`;return d;})());
  // cells
  function cell(p,r,fill,label,sub){const [x,y]=off(p);
    s.append(svgEl("circle",{cx:x,cy:y,r,fill,stroke:css("--rule2"),"stroke-width":1.5}));
    const t=svgEl("text",{x,y:y-r-4,"text-anchor":"middle",class:"schlab"});t.textContent=label;s.append(t);
    if(sub){const t2=svgEl("text",{x,y:y+r+11,"text-anchor":"middle",class:"schsub"});t2.textContent=sub;s.append(t2);}}
  // arrows of the cascade
  arrow("dc","il23",css("--s1")); arrow("il23","tcell",css("--s1")); arrow("tcell","il17",css("--s2"));
  arrow("il17","kera",css("--s2")); arrow("kera","plaque",css("--accent")); arrow("tnf","kera",css("--s5"),true);
  arrow("kera","dc",css("--muted"),true); // feedback loop
  cell("dc",26,css("--cell"),"Dendritic cell","antigen / IL-23, IL-12, TNF");
  cell("tcell",26,css("--cell"),"Th17 cell","IL-23R · TYK2 signalling");
  cell("kera",30,css("--kera"),"Keratinocyte","hyperproliferation");
  const [px,py]=off("plaque"); s.append(svgEl("rect",{x:px-14,y:py-16,width:28,height:32,rx:3,fill:css("--accent"),opacity:.85}));
  const pt=svgEl("text",{x:px,y:py+30,"text-anchor":"middle",class:"schsub"});pt.textContent="plaque";s.append(pt);
  // cytokine / target anchor nodes (clickable -> focus the mechanism family)
  const TN={p40:["p40","IL12B"],il23:["IL-23","IL23A"],il17:["IL-17A/F","IL17A"],tnf:["TNF","TNF"],tyk2:["TYK2","TYK2"],pde4:["PDE4","PDE4"]};
  for(const k in TN){const [x,y]=off(k);const grp=svgEl("g",{class:"anchor"});grp.style.cursor="pointer";
    grp.append(svgEl("circle",{cx:x,cy:y,r:15,fill:css("--paper"),stroke:css(FAM[Object.keys(FAM).find(fk=>FAM[fk].anchor==k)||"il23"]?.colorVar||"--sN"),"stroke-width":2.2}));
    const t=svgEl("text",{x,y:y+3,"text-anchor":"middle","font-size":"8.5","font-weight":"700",fill:css("--ink")});t.textContent=TN[k][0];grp.append(t);
    const tgt=N["target:"+TN[k][1]]; grp.onclick=()=>openModal(tgt?tgt.id:(MOA[Object.keys(FAM).find(fk=>FAM[fk].anchor==k)]||{}).id);
    s.append(grp);}
  // title inside schematic
  const tt=svgEl("text",{x:410,y:20,"text-anchor":"middle",class:"schlab","font-size":"13"});tt.textContent="THE IL-23 / IL-17 IMMUNE CASCADE";s.append(tt);
  g.append(s); CANVAS.append(g);
}

/* ---------- mechanism blocks + connectors ---------- */
const LAYOUT={ // family -> {x,y} top-left of block
  il23:[30,440], tnf:[30,720], conv:[30,900],
  novel:[360,560], hist:[360,840],
  il17:[2430,230], kinase:[2430,610],
  pde4:[2110,230], topical:[2110,420], steroid:[2110,630],
};
const DESC={il23:"Block IL-23 (p19) or p40 to starve Th17 cells.",il17:"Neutralise the effector cytokine IL-17A/F or its receptor.",
  tnf:"Neutralise TNF-α — the original biologic target.",kinase:"Oral inhibition of intracellular TYK2 / JAK signalling.",
  pde4:"Raise cAMP to dampen cytokine output (oral & topical).",topical:"Non-steroidal keratinocyte-normalising topicals.",
  steroid:"Anti-inflammatory topical corticosteroids.",conv:"Low-cost legacy oral systemics.",
  novel:"Emerging / experimental mechanisms.",hist:"Withdrawn or discontinued agents."};
function buildBlocks(){
  for(const fk in LAYOUT){
    const m=MOA[fk]; if(!m)continue; const col=css(FAM[fk].colorVar||"--sN");
    const drugs=iN(m.id,"HAS_MECHANISM").sort((a,b)=>(PORD[a.attrs.highest_phase]-PORD[b.attrs.highest_phase])||((b.attrs.annual_sales_usd_m||0)-(a.attrs.annual_sales_usd_m||0)));
    const [x,y]=LAYOUT[fk];
    const blk=el("div",{cls:"block",style:`left:${x}px;top:${y}px;--fam:${col}`,"data-node":m.id});
    blk.append(el("div",{cls:"bhead",onclick:()=>openModal(m.id)},[el("div",{cls:"bn",text:m.label}),el("div",{cls:"bc",text:drugs.length+" · "+((MOA[fk].attrs.validation_status)||"")})]));
    blk.append(el("div",{cls:"bdesc",text:DESC[fk]||""}));
    drugs.forEach(d=>blk.append(drow(d,col)));
    CANVAS.append(blk);
  }
}
function drow(d,col){
  const a=d.attrs, st=STAGE[a.highest_phase]||["?","--muted"], comp=oN(d.id,"DEVELOPED_BY")[0];
  const meta=[]; if(comp)meta.push("<b>"+esc(comp.label)+"</b>");
  if(a.route)meta.push(esc(a.route)+(a.dose?" "+esc(a.dose):""));
  if(a.p90!=null)meta.push("P90 "+a.p90); if(a.annual_sales_usd_m)meta.push(fmt$(a.annual_sales_usd_m));
  let mk=""; if(a.bios)mk+='<span class="mk bio" title="'+esc(a.bios)+'">B</span>'; if(a.combo)mk+='<span class="mk combo">+</span>'; if((a.note||"").toLowerCase().includes("boxed warning"))mk+='<span class="mk warn">⚠</span>';
  const r=el("div",{cls:"drow"+(a.highest_phase=="discontinued"?" disc":""),"data-node":d.id},[
    el("span",{cls:"stage",style:`--st:${css(st[1])}`,text:st[0]}),
    el("div",{},[el("div",{cls:"dn",html:esc(d.label)+mk}),el("div",{cls:"dm",html:meta.join(" · ")})])]);
  r.onclick=e=>{e.stopPropagation();openModal(d.id);}; return r;
}
function drawConnectors(){
  WIRES.innerHTML="";
  for(const fk in LAYOUT){
    const m=MOA[fk]; if(!m)continue; const el2=CANVAS.querySelector(`.block[data-node="${CSS.escape(m.id)}"]`); if(!el2)continue;
    const [bx,by]=LAYOUT[fk]; const h=el2.offsetHeight, left=bx<CW/2;
    const sx=left?bx+300:bx, sy=by+18; const [ax,ay]=SCH[FAM[fk].anchor]||SCH.tcell;
    const midx=left?(sx+ax)/2:(sx+ax)/2;
    const p=svgEl("path",{d:`M${sx},${sy} C${midx},${sy} ${midx},${ay} ${ax},${ay}`,fill:"none",stroke:css(FAM[fk].colorVar||"--sN"),"stroke-width":1.8,opacity:.65});
    WIRES.append(p);
    WIRES.append(svgEl("circle",{cx:ax,cy:ay,r:3,fill:css(FAM[fk].colorVar||"--sN")}));
  }
}

/* ---------- panels ---------- */
function panel(x,y,w,title,bodyFn){const p=el("div",{cls:"panel",style:`left:${x}px;top:${y}px;width:${w}px`});if(title)p.append(el("h4",{text:title}));const c=el("div",{cls:"pc"});bodyFn(c);p.append(c);CANVAS.append(p);return p;}
function buildPanels(){
  // masthead
  const mast=el("div",{cls:"mast",style:"left:30px;top:24px;width:560px"});
  mast.append(el("div",{cls:"t",html:esc(G.meta.focus)+"<small>DISEASE ATLAS · "+esc(G.meta.as_of||"")+" · "+G.nodes.filter(n=>n.type=="Drug").length+" ASSETS</small>"}));
  mast.append(el("div",{cls:"o",text:G.meta.one_liner||""}));
  const kb=el("div"); (G.meta.headline_stats||[]).slice(0,3).forEach(s=>kb.append(el("span",{cls:"k"},[el("b",{text:s.value}),el("span",{text:s.label})]))); mast.append(kb);
  CANVAS.append(mast);
  // patient burden (top-left, under masthead)
  const e=G.epi||{};
  panel(30,196,340,"Patient burden",c=>{
    const st=el("div",{cls:"st"}); (e.stats||[]).forEach(([v,l])=>st.append(el("b",{text:v}),el("span",{text:l}))); c.append(st);

/* ---------- entity shapes + ER popup (reused) ---------- */
const TYPE={Drug:{c:"--s1",s:"circle"},Company:{c:"--s2",s:"rect"},MoAClass:{c:"--s7",s:"diamond"},Target:{c:"--s3",s:"triangle"},MarketSegment:{c:"--s4",s:"hexagon"},Catalyst:{c:"--s5",s:"pentagon"},Modality:{c:"--s6",s:"square"},Deal:{c:"--accent",s:"star"},Indication:{c:"--ink2",s:"rrect"}};
function shapePts(shape,x,y,s){
  if(shape=="diamond")return `${x},${y-s} ${x+s},${y} ${x},${y+s} ${x-s},${y}`;
  if(shape=="triangle")return `${x},${y-s} ${x+s*0.92},${y+s*0.62} ${x-s*0.92},${y+s*0.62}`;
  if(shape=="hexagon"){let p=[];for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;p.push(`${(x+s*Math.cos(a)).toFixed(1)},${(y+s*Math.sin(a)).toFixed(1)}`);}return p.join(" ");}
  if(shape=="pentagon"){let p=[];for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5;p.push(`${(x+s*Math.cos(a)).toFixed(1)},${(y+s*Math.sin(a)).toFixed(1)}`);}return p.join(" ");}
  if(shape=="star"){let p=[];for(let i=0;i<10;i++){const rr=i%2?s*0.45:s;const a=-Math.PI/2+i*Math.PI/5;p.push(`${(x+rr*Math.cos(a)).toFixed(1)},${(y+rr*Math.sin(a)).toFixed(1)}`);}return p.join(" ");}
  return "";
}
function drawShape(shape,x,y,s,fill,stroke){let e;
  if(shape=="circle")e=svgEl("circle",{cx:x,cy:y,r:s});
  else if(shape=="rect"||shape=="rrect")e=svgEl("rect",{x:x-s*1.25,y:y-s*0.8,width:s*2.5,height:s*1.6,rx:shape=="rrect"?7:3});
  else if(shape=="square")e=svgEl("rect",{x:x-s*0.86,y:y-s*0.86,width:s*1.72,height:s*1.72});
  else e=svgEl("polygon",{points:shapePts(shape,x,y,s)});
  e.setAttribute("fill",fill); if(stroke){e.setAttribute("stroke",stroke);e.setAttribute("stroke-width","1.5");} return e;}
function shapeLegendHTML(){const m={Drug:"●drug",Company:"▭company",MoAClass:"◆mechanism",Target:"▲target",MarketSegment:"⬡segment",Catalyst:"⬠catalyst",Deal:"★deal"};
  return Object.entries(m).map(([t,l])=>`<span style="color:${css(TYPE[t].c)};font-weight:700">${l[0]}</span>${l.slice(1)}`).join(" · ");}
const REL={DEVELOPED_BY:"developed by",HAS_MECHANISM:"has mechanism",HITS:"targets",HAS_MODALITY:"modality",DEVELOPED_IN:"studied in",SERVES:"serves",HAS_CATALYST:"catalyst",ACTS_ON:"acts on",PARTY_TO:"party to",INVOLVES:"involves"};
const backdrop=document.getElementById("backdrop"), modal=document.getElementById("modal");
backdrop.onclick=e=>{if(e.target==backdrop)modal.dispatchEvent(new Event("close"));};
modal.addEventListener("close",()=>backdrop.classList.remove("on"));
document.addEventListener("keydown",e=>{if(e.key=="Escape")backdrop.classList.remove("on");});
function neighborsOf(id){const out=(OUT[id]||[]).map(e=>({other:e.target,type:e.type,dir:"out"})),inc=(INC[id]||[]).map(e=>({other:e.source,type:e.type,dir:"in"}));
  const seen=new Set(),list=[];[...out,...inc].forEach(x=>{if(x.other!=id&&!seen.has(x.other)&&N[x.other]){seen.add(x.other);list.push(x);}});
  const rank=t=>({HAS_MECHANISM:0,DEVELOPED_BY:1,ACTS_ON:1,HITS:2,SERVES:3,PARTY_TO:3,INVOLVES:3,HAS_CATALYST:4,DEVELOPED_IN:5,HAS_MODALITY:6}[t]??7);
  return list.sort((a,b)=>rank(a.type)-rank(b.type));}
function openModal(id){const n=N[id]; if(!n)return; const tc=css((TYPE[n.type]||{c:"--accent"}).c);
  modal.style.setProperty("--mc",tc); modal.innerHTML="";
  const hd=el("div",{cls:"mhead"}); const sh=svgEl("svg",{viewBox:"0 0 28 28",class:"shape"}); sh.append(drawShape((TYPE[n.type]||{s:"circle"}).s,14,14,10,tc,css("--ink"))); hd.append(sh);
  hd.append(el("div",{},[el("div",{cls:"tt",text:n.type=="MoAClass"?"Mechanism":n.type}),el("h2",{text:n.label}),el("div",{cls:"sub",text:[n.attrs.brand,n.attrs.sub_class,n.attrs.type,n.attrs.value].filter(Boolean).join(" · ")})]));
  hd.append(el("button",{cls:"x",text:"×",onclick:()=>backdrop.classList.remove("on")}));
  const info=el("div",{cls:"minfo"}); fillInfo(info,n);
  const gw=el("div",{cls:"mgraph"}); gw.append(erDiagram(n)); gw.append(el("div",{cls:"glegend",html:shapeLegendHTML()}));
  modal.append(hd,el("div",{cls:"mbody"},[info,gw])); backdrop.classList.add("on");}
function fillInfo(info,n){const a=n.attrs,kp=el("div",{cls:"kpis"}),K=(v,l)=>{if(v!=null&&v!=="")kp.append(el("div",{cls:"k"},[el("b",{text:v}),el("span",{text:l})]));};
  if(n.type=="Drug"){K((a.highest_phase||"").replace("phase","Ph "),"phase");K(a.annual_sales_usd_m?fmt$(a.annual_sales_usd_m):null,"sales "+(a.sales_year||""));K(a.p90!=null?a.p90+"%":null,"PASI 90");K(a.route&&a.dose?a.route+" "+a.dose:a.route,"route/dose");K(a.appr,"approved");}
  else if(n.type=="Company"){const dr=iN(n.id,"DEVELOPED_BY");K(dr.length,"assets");K(new Set(dr.map(d=>(oN(d.id,"HAS_MECHANISM")[0]||{}).id)).size,"mechanisms");K(dr.filter(d=>d.attrs.highest_phase=="approved").length,"approved");}
  else if(n.type=="MoAClass"){const dr=iN(n.id,"HAS_MECHANISM");K(dr.length,"drugs");K(dr.filter(d=>d.attrs.highest_phase=="approved").length,"approved");const bp=Math.max(0,...dr.map(d=>d.attrs.p90||0));K(bp||null,"best PASI 90");}
  else if(n.type=="Target"){K(a.ot_association_score?a.ot_association_score.toFixed(2):null,"OT assoc.");K(iN(n.id,"HITS").length,"drugs");}
  else if(n.type=="Catalyst"){K(a.date,"date");K(a.kind?a.kind.replace("_"," "):null,"type");K(a.company,"company");}
  else if(n.type=="Deal"){K(a.value,"value");K(a.year,"year");K(a.kind,"type");}
  info.append(kp);
  const d=describe(n); if(d)info.append(el("div",{cls:"desc",html:d}));
  if(n.type=="Drug"){const m=oN(n.id,"HAS_MECHANISM")[0];if(m&&m.attrs.safety)info.append(el("div",{cls:"safety",html:"<b>Class safety.</b> "+esc(m.attrs.safety)}));}
  if(n.type=="MoAClass"&&a.safety)info.append(el("div",{cls:"safety",html:"<b>Class safety.</b> "+esc(a.safety)}));
  if(n.sources&&n.sources.length)info.append(el("div",{cls:"srcs",html:"Sources: "+n.sources.map(i=>SRC[i]?`<a href="${esc(SRC[i].url||'#')}" target="_blank" rel="noopener">${esc(SRC[i].name||i)}</a>`:i).join(", ")}));}
function describe(n){const a=n.attrs;
  if(n.type=="Drug"){let s=a.note?esc(a.note):"";const m=oN(n.id,"HAS_MECHANISM")[0];if(m)s=`<b>${esc(m.label)}</b>${a.mechanism?" — "+esc(a.mechanism):""}. `+s;if(a.bios)s+=` <b>Biosimilars:</b> ${esc(a.bios)}.`;return s;}
  if(n.type=="Company")return a.positioning?esc(a.positioning):`Develops ${iN(n.id,"DEVELOPED_BY").length} psoriasis asset(s).`;
  if(n.type=="MoAClass"){let s="";if(a.rationale)s+="<b>Rationale.</b> "+esc(a.rationale)+" ";if(a.mechanism)s+="<b>Mechanism.</b> "+esc(a.mechanism);return s;}
  if(n.type=="Target")return a.rationale?esc(a.rationale):(a.name?esc(a.name):"");
  if(n.type=="Catalyst")return a.significance?esc(a.significance):"";
  if(n.type=="Deal")return a.note?esc(a.note):"";
  return "";}
function erDiagram(center){const svg=svgEl("svg",{viewBox:"0 0 620 480",preserveAspectRatio:"xMidYMid meet"});
  const defs=svgEl("defs");defs.innerHTML=`<marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="${css('--muted')}"/></marker>`;svg.append(defs);
  const cx=310,cy=230,neigh=neighborsOf(center.id),shown=neigh.slice(0,15),R=shown.length>10?170:150;
  shown.forEach((nb,i)=>{const ang=-Math.PI/2+i*2*Math.PI/Math.max(1,shown.length),x=cx+R*Math.cos(ang),y=cy+R*Math.sin(ang),o=N[nb.other],tc=css((TYPE[o.type]||{c:"--sN"}).c);
    const A=nb.dir=="out"?{x:cx,y:cy}:{x,y},B=nb.dir=="out"?{x,y}:{x:cx,y:cy},dx=B.x-A.x,dy=B.y-A.y,L=Math.hypot(dx,dy)||1,ux=dx/L,uy=dy/L;
    const a2={x:A.x+ux*(A.x==cx?15:12),y:A.y+uy*(A.y==cy?15:12)},b2={x:B.x-ux*(B.x==cx?17:14),y:B.y-uy*(B.y==cy?17:14)};
    svg.append(svgEl("line",{x1:a2.x,y1:a2.y,x2:b2.x,y2:b2.y,stroke:css("--rule2"),"stroke-width":1.4,"marker-end":"url(#ah)"}));
    const rl=svgEl("text",{x:A.x+(B.x-A.x)*0.52,y:A.y+(B.y-A.y)*0.52-2,"text-anchor":"middle",class:"erel"});rl.textContent=REL[nb.type]||nb.type.toLowerCase();svg.append(rl);
    const g=svgEl("g");g.style.cursor="pointer";g.onclick=()=>openModal(o.id);g.append(drawShape((TYPE[o.type]||{s:"circle"}).s,x,y,11,tc,css("--paper")));
    const tl=svgEl("text",{x,y:y>cy?y+24:y-16,"text-anchor":"middle",class:"elabel"});tl.textContent=o.label.length>18?o.label.slice(0,17)+"…":o.label;g.append(tl);svg.append(g);});
  const tc=css((TYPE[center.type]||{c:"--s1"}).c);svg.append(drawShape((TYPE[center.type]||{s:"circle"}).s,cx,cy,17,tc,css("--ink")));
  const cl=svgEl("text",{x:cx,y:cy+34,"text-anchor":"middle",class:"ecenter"});cl.textContent=center.label.length>22?center.label.slice(0,21)+"…":center.label;svg.append(cl);
  if(neigh.length>shown.length){const t=svgEl("text",{x:cx,y:472,"text-anchor":"middle",class:"erel"});t.textContent=`+${neigh.length-shown.length} more`;svg.append(t);}
  return svg;}

/* ---------- pan / zoom ---------- */
let tx=0,ty=0,sc=1;
const vp=document.getElementById("viewport");
function apply(){CANVAS.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;}
function fit(){const vw=vp.clientWidth,vh=vp.clientHeight;sc=Math.min(vw/CW,vh/CH)*0.98;tx=(vw-CW*sc)/2;ty=(vh-CH*sc)/2;apply();}
vp.addEventListener("wheel",e=>{e.preventDefault();const r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const ns=Math.min(3,Math.max(0.15,sc*(e.deltaY<0?1.12:0.89)));tx=mx-(mx-tx)*ns/sc;ty=my-(my-ty)*ns/sc;sc=ns;apply();},{passive:false});
let pan=null;
vp.addEventListener("mousedown",e=>{if(e.target.closest(".search,.ctrls,.backdrop"))return;pan={x:e.clientX-tx,y:e.clientY-ty};vp.classList.add("drag");});
addEventListener("mousemove",e=>{if(pan){tx=e.clientX-pan.x;ty=e.clientY-pan.y;apply();}});
addEventListener("mouseup",()=>{pan=null;vp.classList.remove("drag");});
document.getElementById("zin").onclick=()=>{sc=Math.min(3,sc*1.2);apply();};
document.getElementById("zout").onclick=()=>{sc=Math.max(0.15,sc/1.2);apply();};
document.getElementById("zfit").onclick=fit;
document.getElementById("theme").onclick=()=>{const r=document.documentElement,cur=r.getAttribute("data-theme")=="dark"?"light":"dark";r.setAttribute("data-theme",cur);rebuild();};
const search=document.getElementById("search");search.addEventListener("change",e=>{const q=e.target.value.trim().toLowerCase();const hit=G.nodes.find(n=>n.label.toLowerCase()==q)||G.nodes.find(n=>n.label.toLowerCase().includes(q));if(hit)openModal(hit.id);});
(function(){const d=document.getElementById("allnodes");G.nodes.filter(n=>["Drug","Company","MoAClass","Target"].includes(n.type)).forEach(n=>d.append(el("option",{value:n.label})));})();

function rebuild(){[...CANVAS.querySelectorAll(".block,.panel,.mast,.node")].forEach(n=>n.remove());buildSchematic();buildBlocks();buildPanels();requestAnimationFrame(drawConnectors);}
rebuild(); fit();
