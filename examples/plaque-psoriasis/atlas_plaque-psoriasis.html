<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plaque psoriasis — Disease Atlas</title>
<style>
:root{
  --bg:#f7f8fa; --panel:#ffffff; --ink:#1a1f2b; --muted:#5b6472; --faint:#8b95a5;
  --line:#e3e7ee; --accent:#2f6df6; --accent-soft:#e9f0ff;
  --v-validated:#1f9d6b; --v-emerging:#c98a12; --v-unproven:#7a86f0; --v-failed:#c0504d;
  --chip:#eef1f6; --shadow:0 1px 2px rgba(20,30,50,.06),0 3px 12px rgba(20,30,50,.05);
  --radius:12px; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --bg:#0e1116; --panel:#161b22; --ink:#e7ecf3; --muted:#9aa4b2; --faint:#6b7688;
  --line:#242c38; --accent:#4d84ff; --accent-soft:#16233f; --chip:#1d2430;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 3px 14px rgba(0,0,0,.3);
}}
:root[data-theme="dark"]{
  --bg:#0e1116; --panel:#161b22; --ink:#e7ecf3; --muted:#9aa4b2; --faint:#6b7688;
  --line:#242c38; --accent:#4d84ff; --accent-soft:#16233f; --chip:#1d2430;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 3px 14px rgba(0,0,0,.3);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;font-size:15px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
h1,h2,h3,h4{line-height:1.25;margin:0 0 .4em}
h2{font-size:1.35rem;letter-spacing:-.01em}
h3{font-size:1.05rem}
code{font-family:var(--mono);font-size:.85em}
.wrap{display:grid;grid-template-columns:230px minmax(0,1fr);gap:0;max-width:1280px;margin:0 auto}
/* header */
header.top{grid-column:1/-1;position:sticky;top:0;z-index:30;background:var(--panel);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:12px 20px}
header.top .title{font-weight:700;font-size:1.05rem}
header.top .sub{color:var(--muted);font-size:.82rem}
header.top .spacer{flex:1}
#search{background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:8px;
  padding:7px 11px;font-size:.85rem;width:210px;font-family:var(--sans)}
.btn{background:var(--bg);border:1px solid var(--line);color:var(--muted);border-radius:8px;
  padding:7px 10px;cursor:pointer;font-size:.8rem}
.btn:hover{color:var(--ink)}
/* nav */
nav.side{position:sticky;top:57px;align-self:start;height:calc(100vh - 57px);overflow:auto;
  padding:16px 10px 40px;border-right:1px solid var(--line)}
nav.side a{display:block;color:var(--muted);padding:7px 12px;border-radius:8px;font-size:.86rem;margin-bottom:1px}
nav.side a:hover{background:var(--chip);text-decoration:none;color:var(--ink)}
nav.side a.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
main{padding:26px 30px 80px;min-width:0}
section.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 24px;margin-bottom:22px;box-shadow:var(--shadow);scroll-margin-top:70px}
section.panel>.eyebrow{color:var(--faint);font-size:.72rem;letter-spacing:.09em;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.lead{color:var(--muted);font-size:.96rem}
p{margin:.5em 0}
.prose p:first-child{margin-top:0}
/* headline stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:6px}
.stat{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px 15px}
.stat .v{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
.stat .l{color:var(--muted);font-size:.78rem;margin-top:2px}
.stat .d{color:var(--faint);font-size:.72rem;margin-top:3px}
/* chips & tags */
.tag{display:inline-block;background:var(--chip);color:var(--muted);border-radius:999px;
  padding:2px 9px;font-size:.72rem;margin:2px 4px 2px 0;white-space:nowrap}
.tag.phase{font-weight:600}
sup.cite{font-size:.65em;font-weight:700}
sup.cite a{background:var(--accent-soft);color:var(--accent);border-radius:4px;padding:0 4px;margin-left:2px}
.est{color:var(--v-emerging);font-size:.7rem;font-weight:700;border:1px solid currentColor;border-radius:4px;padding:0 4px;margin-left:5px;vertical-align:middle}
/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:6px}
.tbl th{text-align:left;color:var(--faint);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;
  border-bottom:1px solid var(--line);padding:8px 10px;position:sticky;top:57px;background:var(--panel);cursor:pointer}
.tbl td{border-bottom:1px solid var(--line);padding:8px 10px;vertical-align:top}
.tbl tr:hover td{background:var(--bg)}
.scroll{overflow-x:auto;max-width:100%}
.tall{max-height:520px;overflow:auto}
/* moa cards */
.moa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:8px}
.moa{border:1px solid var(--line);border-left-width:4px;border-radius:10px;padding:14px 15px;background:var(--bg)}
.moa.validated{border-left-color:var(--v-validated)} .moa.emerging{border-left-color:var(--v-emerging)}
.moa.unproven{border-left-color:var(--v-unproven)} .moa.failed{border-left-color:var(--v-failed)}
.moa h4{margin:0 0 2px;font-size:.98rem}
.moa .vstatus{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.moa.validated .vstatus{color:var(--v-validated)} .moa.emerging .vstatus{color:var(--v-emerging)}
.moa.unproven .vstatus{color:var(--v-unproven)} .moa.failed .vstatus{color:var(--v-failed)}
.moa .mech{color:var(--muted);font-size:.82rem;margin:6px 0}
.moa .pc{display:flex;gap:10px;font-size:.76rem;margin-top:6px}
.moa .pc div{flex:1}
.moa .pc b{color:var(--muted);font-weight:600}
/* matrix */
.matrix{border-collapse:collapse;font-size:.78rem;margin-top:8px}
.matrix th,.matrix td{border:1px solid var(--line);padding:5px 8px;text-align:center;min-width:38px}
.matrix th.rowh,.matrix td.rowh{text-align:left;font-weight:600;white-space:nowrap;position:sticky;left:0;background:var(--panel)}
.matrix td .n{display:inline-block;min-width:20px;border-radius:5px;padding:1px 5px;font-weight:600}
/* bars */
.bar{display:flex;align-items:center;gap:10px;margin:5px 0;font-size:.83rem}
.bar .lab{width:190px;flex:none;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .track{flex:1;background:var(--chip);border-radius:6px;height:16px;position:relative;overflow:hidden}
.bar .fill{background:var(--accent);height:100%;border-radius:6px}
.bar .val{width:90px;flex:none;text-align:right;font-variant-numeric:tabular-nums}
/* timeline */
.tl{border-left:2px solid var(--line);margin-left:8px;padding-left:16px}
.tl .ev{position:relative;margin-bottom:14px}
.tl .ev::before{content:"";position:absolute;left:-23px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--accent)}
.tl .ev .when{font-size:.74rem;color:var(--accent);font-weight:700}
.tl .ev .what{font-weight:600;font-size:.9rem}
.tl .ev .why{color:var(--muted);font-size:.82rem}
/* swot */
.swot{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.swot .q{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:var(--bg)}
.swot .q h4{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em}
.swot ul{margin:6px 0 0;padding-left:18px;font-size:.85rem;color:var(--muted)}
.empty{color:var(--faint);font-style:italic;font-size:.86rem;padding:6px 0}
ul.clean{margin:.4em 0;padding-left:20px}
ul.clean li{margin:3px 0}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.filters select,.filters input{background:var(--bg);border:1px solid var(--line);color:var(--ink);
  border-radius:8px;padding:6px 9px;font-size:.82rem;font-family:var(--sans)}
.count{color:var(--faint);font-size:.78rem;margin-left:auto;align-self:center}
.legend{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px 20px;font-size:.8rem}
.legend div{color:var(--muted)}
.legend b{color:var(--ink);font-family:var(--mono);font-size:.78rem}
.srclist{font-size:.82rem}
.srclist li{margin:5px 0;color:var(--muted)}
.disc{color:var(--faint);font-size:.78rem;border-top:1px solid var(--line);margin-top:16px;padding-top:12px}
.hl{background:rgba(255,220,80,.35);border-radius:3px}
@media(max-width:820px){
  .wrap{grid-template-columns:1fr}
  nav.side{display:none}
  main{padding:18px 14px 60px}
  #search{width:130px}
  .swot{grid-template-columns:1fr}
}
@media print{
  nav.side,header.top .btn,header.top #search,.filters{display:none}
  section.panel{break-inside:avoid;box-shadow:none}
  body{background:#fff}
}
</style>
</head>

<script id="atlas-data" type="application/json">{"schema_version":"1.0","meta":{"disease":"Plaque psoriasis","aliases":["psoriasis vulgaris","chronic plaque psoriasis","psoriasis"],"scope":"indication","generated":"2026-07-23","generator":"disease-atlas skill v0.1","one_liner":"Chronic, immune-mediated skin disease driven by the IL-23 → Th17 → IL-17 axis; a maturing, ~$21B market where injectable IL-23/IL-17 biologics dominate efficacy and the next battle is oral, biologic-grade therapy.","coverage_note":"Pipeline and mechanism data from ClinicalTrials.gov (901 interventional studies) and Open Targets (167 drug candidates, 85 mechanism groups); approved-drug/label data from openFDA. Market size, product sales, epidemiology, deals and catalysts are from cited web sources (company filings/press releases, GBD 2021, peer-reviewed prevalence studies, named analyst reports). Sales figures are FY2024 unless noted. Some emerging-asset details (e.g. Oruka programs) have thin public data and are flagged."},"headline_stats":[{"label":"US prevalence","value":"~7.5M adults","detail":"~3% of US adults ≥20y; plaque type ~80–90% of cases","value_num":7550000,"is_estimate":false,"sources":["s8"]},{"label":"Global prevalence","value":"~43–125M","detail":"GBD 2021 counts ~43M; WHO estimates >60M; higher-end figures include all severities","value_num":43000000,"is_estimate":true,"sources":["s7"]},{"label":"Moderate-to-severe","value":"~20–25%","detail":"share of patients eligible for systemic/biologic therapy","value_num":21.5,"is_estimate":true,"sources":["s8"]},{"label":"Global drug market (2024)","value":"$21.1B","detail":"→ ~$39B by 2030 (10.9% CAGR); biologics ~46% of value","value_num":21116,"is_estimate":false,"sources":["s5"]},{"label":"Approved systemic/biologic classes","value":"6+","detail":"TNF, IL-12/23, IL-17, IL-23, PDE4, TYK2 — plus first oral IL-23R (2026)","is_estimate":false,"sources":["s1","s2"]},{"label":"Active clinical-stage assets","value":"~180 Ph1–Ph3","detail":"188 assets seen at Phase 3, 266 at Phase 2 across trials","value_num":180,"is_estimate":true,"sources":["s1"]},{"label":"Leading product (Skyrizi)","value":"$11.7B","detail":"FY2024 global net revenue; ~$17.5B in 2025","value_num":11718,"is_estimate":false,"sources":["s6"]},{"label":"Best-in-class skin clearance","value":"PASI 90 ~60–70%","detail":"at wk16 for IL-17/IL-23 biologics vs ~5% placebo","value_num":65,"is_estimate":true,"sources":["s_lit1"]}],"overview":{"definition":"Plaque psoriasis (psoriasis vulgaris) is a chronic, relapsing, immune-mediated inflammatory skin disease characterized by well-demarcated, raised, erythematous plaques with silvery scale, typically on the extensor surfaces (elbows, knees), scalp, and lower back. It is the most common form of psoriasis, accounting for roughly 80–90% of cases.","pathophysiology":"The disease is driven by a dysregulated adaptive immune response in genetically predisposed individuals. Activated dendritic cells release IL-23, which sustains pathogenic T-helper-17 (Th17) cells; these secrete IL-17A/F and IL-22, driving keratinocyte hyperproliferation, neutrophil recruitment, and a self-amplifying inflammatory loop. TNF-α and the intracellular kinase TYK2 (upstream of IL-23 signaling) are additional validated nodes. This 'IL-23/IL-17 axis' is the organizing principle of both the biology and the drug landscape.","state_of_play":"Psoriasis is one of the great success stories of translational immunology: over two decades the field moved from broad immunosuppression (methotrexate, cyclosporine) to TNF inhibitors, then to highly selective IL-17 and IL-23 antibodies that routinely deliver PASI 90 (90% skin clearance) — a bar unthinkable 20 years ago. The clinical problem of 'can we clear skin?' is largely solved for patients who can access biologics. The frontier has shifted to three questions: (1) can an ORAL drug match biologic efficacy and tolerability (the oral TYK2 and oral IL-23R race — the March 2026 approval of icotrokinra/Icotyde, the first oral IL-23 receptor antagonist, is the landmark event); (2) can therapy be made more durable and convenient (half-life-extended antibodies, less-frequent dosing); and (3) how does the market absorb the coming biosimilar erosion (Stelara's cliff hit in 2025; Cosentyx/Taltz follow ~2028–2029). The strategic tension is no longer efficacy but access, route, and price.","sources":["s1","s2","s5","s7","s15"]},"epidemiology":{"summary":"Psoriasis affects an estimated 2–3% of adults worldwide, with marked geographic variation (higher in high-SDI regions — Western Europe, North America). Prevalence has risen over three decades as populations age and diagnosis improves. Plaque psoriasis is the dominant subtype. The commercially and clinically decisive segmentation is severity: the ~20–25% with moderate-to-severe disease drive nearly all systemic and biologic use.","measures":[{"label":"US adult prevalence","value":"~7.55M (~3%)","value_num":7550000,"year":2021,"geography":"United States","is_estimate":false,"sources":["s8"]},{"label":"Global prevalence (GBD 2021)","value":"~43M","value_num":42980000,"year":2021,"geography":"Global","is_estimate":false,"sources":["s7"]},{"label":"Global prevalence (WHO estimate)","value":">60M","value_num":60000000,"year":2023,"geography":"Global","is_estimate":true,"sources":["s7"]},{"label":"Plaque subtype share","value":"~80–90% of psoriasis","value_num":85,"year":2023,"geography":"Global","is_estimate":true,"sources":["s2"]},{"label":"Moderate-to-severe share","value":"~21.5%","value_num":21.5,"year":2021,"geography":"United States","is_estimate":true,"sources":["s8"]},{"label":"30-yr prevalence growth","value":"~23M → 43M (1990→2021)","value_num":86,"year":2021,"geography":"Global","is_estimate":false,"sources":["s7"]}],"segments":[{"name":"Mild (topical-managed)","share":"~75–80%","share_pct":78,"note":"Limited body-surface-area involvement; managed with topical corticosteroids, vitamin D analogs, and combinations. Large population, low per-patient drug spend.","sources":["s8"]},{"name":"Moderate-to-severe (systemic-eligible)","share":"~20–25%","share_pct":22,"note":"≥3 palms / ≥10% BSA, or special-site or high-impact disease. The economic engine: candidates for biologics, oral systemics (apremilast, deucravacitinib), and phototherapy.","sources":["s8"]},{"name":"Difficult-to-treat sites","share":"subset","share_pct":30,"note":"Scalp, nail, genital, palmoplantar involvement — higher QoL impact, often undertreated; a differentiation battleground (e.g. icotrokinra scalp/genital data).","sources":["s19"]},{"name":"Psoriatic arthritis overlap","share":"~20–30% of psoriasis","share_pct":25,"note":"Up to a third develop psoriatic arthritis; drives choice toward agents with joint efficacy (IL-17, IL-23, TNF, TYK2).","sources":["s22"]}],"demographics":"Bimodal onset (peaks ~20–30y and ~50–60y); roughly equal sex distribution. Strong genetic component (HLA-C*06:02) and heritability. Key comorbidities — psoriatic arthritis, cardiometabolic disease, obesity, depression — add to burden and inform the emerging interest in metabolic agents (GLP-1) as adjuncts.","unmet_need":"Despite excellent biologics, real-world unmet need persists: (1) most patients still receive no systemic therapy due to access, cost, or needle aversion — an oral, biologic-grade option addresses a huge underserved base; (2) durability/relapse after discontinuation; (3) difficult sites (scalp, nails, genitals) and PsA prevention; (4) safety concerns limiting JAK-class uptake; (5) the ~30–40% who do not reach complete clearance (PASI 100) on current agents.","patient_journey":[{"stage":"Onset & diagnosis","description":"Clinical diagnosis by appearance; often delayed or self-managed. Genetic and environmental triggers (infection, stress, trauma — Koebner phenomenon)."},{"stage":"Topical era","description":"First-line for mild disease: corticosteroids + vitamin D analogs (± nonsteroidal tapinarof/roflumilast). Many patients cycle here for years."},{"stage":"Systemic escalation","description":"Moderate-to-severe or topical-refractory disease steps up to phototherapy, oral systemics (methotrexate, apremilast, deucravacitinib), or biologics."},{"stage":"Biologic optimization","description":"IL-23 or IL-17 biologics for durable clearance; switching between classes on loss of response; matching to comorbidities (PsA, IBD)."},{"stage":"Maintenance & relapse","description":"Chronic, lifelong management; relapse on discontinuation; evolving question of drug holidays and disease modification."}],"sources":["s7","s8","s2","s19","s22"]},"biology":{"summary":"Psoriasis biology converges on a single dominant circuit: dendritic-cell-derived IL-23 licenses pathogenic Th17 cells, whose effector cytokines (IL-17A, IL-17F, IL-22) drive keratinocyte activation, neutrophilic inflammation, and epidermal hyperplasia. TNF-α amplifies the loop, and the intracellular kinase TYK2 transduces IL-23 (and type-I-IFN) signaling — making each step a validated, sequentially drugged target. This clean, well-mapped pathway is why psoriasis has the most target-validated pipeline in immunology.","pathways":[{"name":"IL-23 / Th17 axis","role":"Central disease driver. IL-23 (p19/p40) maintains Th17 cells; blocking IL-23 (p19) collapses the downstream cascade with high durability — the most successful modern target.","sources":["s2"]},{"name":"IL-17 effector signaling","role":"IL-17A/F act on keratinocytes via IL-17RA to drive the clinical plaque; direct blockade gives the fastest, deepest skin clearance.","sources":["s2"]},{"name":"TNF-α signaling","role":"Amplifies inflammation; the original biologic target, now a mature/biosimilar class, still relevant for PsA and cross-indication.","sources":["s2"]},{"name":"TYK2 / JAK-STAT","role":"TYK2 transduces IL-23 and IL-12 signaling intracellularly; selective allosteric TYK2 inhibition (deucravacitinib) enables oral targeting of the axis without broad JAK toxicity.","sources":["s2"]},{"name":"PDE4 / cAMP","role":"PDE4 inhibition raises intracellular cAMP, dampening pro-inflammatory cytokine output — the mechanism of oral apremilast and topical roflumilast.","sources":["s2"]},{"name":"IL-36 / innate","role":"IL-36 signaling drives the pustular/innate arm (pivotal in generalized pustular psoriasis; spesolimab); less central to plaque disease but mechanistically distinct.","sources":["s2"]},{"name":"AhR & retinoid/vitamin-D nuclear receptors","role":"Aryl hydrocarbon receptor (tapinarof) and VDR/RAR agonism normalize keratinocyte differentiation — the basis of modern nonsteroidal topicals.","sources":["s2"]}],"targets":[{"symbol":"IL23A","name":"Interleukin-23 subunit p19","rationale":"Apex driver of the pathogenic circuit; p19 blockade gives durable clearance with infrequent dosing.","tractability":"clinically drugged (mAb approved; first oral 2026)","sources":["s2"]},{"symbol":"IL17A","name":"Interleukin-17A","rationale":"Key effector cytokine; direct blockade gives fastest/deepest clearance.","tractability":"clinically drugged (mAb)","sources":["s2"]},{"symbol":"IL17F","name":"Interleukin-17F","rationale":"Co-driver with IL-17A; dual A/F blockade (bimekizumab) raises the efficacy ceiling.","tractability":"clinically drugged (mAb)","sources":["s2"]},{"symbol":"IL17RA","name":"IL-17 receptor A","rationale":"Blocks signaling of multiple IL-17 family members (brodalumab).","tractability":"clinically drugged (mAb)","sources":["s2"]},{"symbol":"TYK2","name":"Tyrosine kinase 2","rationale":"Intracellular node for IL-23/IL-12; allosteric (pseudokinase-domain) inhibition enables oral, selective targeting.","tractability":"clinically drugged (oral small molecule)","sources":["s2"]},{"symbol":"IL12B","name":"IL-12/23 subunit p40","rationale":"Shared p40 blockade (ustekinumab) hits both IL-12 and IL-23; first-generation validated target.","tractability":"clinically drugged (mAb)","sources":["s2"]},{"symbol":"TNF","name":"Tumor necrosis factor-α","rationale":"Amplifier cytokine; foundational biologic target, now biosimilar-eroded.","tractability":"clinically drugged (mAb/fusion)","sources":["s2"]},{"symbol":"PDE4B","name":"Phosphodiesterase 4B","rationale":"cAMP regulator; oral (apremilast) and topical (roflumilast) anti-inflammatory.","tractability":"clinically drugged (small molecule)","sources":["s2"]},{"symbol":"AHR","name":"Aryl hydrocarbon receptor","rationale":"Modulates keratinocyte differentiation and Th17 balance; basis of tapinarof.","tractability":"clinically drugged (topical)","sources":["s2"]},{"symbol":"IL1RL2","name":"IL-36 receptor","rationale":"Innate/pustular arm; spesolimab validated in GPP.","tractability":"clinically drugged (mAb)","sources":["s2"]}],"subtypes":[{"name":"Chronic plaque (vulgaris)","description":"The dominant phenotype targeted by nearly all systemic development.","biomarker":"HLA-C*06:02 (associated; also predicts some IL-12/23 response)"},{"name":"Scalp / nail / genital / palmoplantar","description":"Site-specific, high-impact variants used for differentiation.","biomarker":"clinical"},{"name":"Pustular (incl. GPP)","description":"Innate IL-36-driven; distinct biology and drugs (spesolimab).","biomarker":"IL36RN mutations (in GPP)"}],"schematic":null},"standard_of_care":{"paradigm":"Treatment is stratified by severity and site. MILD disease: topical corticosteroids ± vitamin D analogs, with nonsteroidal tapinarof (AhR) and roflumilast (PDE4) as steroid-sparing options. MODERATE-TO-SEVERE: step to phototherapy or systemic therapy. Oral systemics — methotrexate (cheap, legacy), apremilast (PDE4), and deucravacitinib (oral TYK2, the modern oral of choice) — sit below biologics. BIOLOGICS are the efficacy standard: IL-23 inhibitors (risankizumab, guselkumab, tildrakizumab) and IL-17 inhibitors (secukinumab, ixekizumab, bimekizumab, brodalumab) deliver PASI 90 in the majority; TNF inhibitors and IL-12/23 (ustekinumab) are older lines now facing biosimilars. The 2026 arrival of oral IL-23R antagonist icotrokinra (Icotyde) begins to blur the oral/biologic line at the top of the funnel.","lines":[{"line":"First-line (mild)","options":["topical corticosteroids","vitamin D analogs (calcipotriene)","tapinarof (Vtama)","roflumilast (Zoryve)"],"note":"Most patients; low drug cost. Nonsteroidals reduce steroid-related atrophy."},{"line":"Moderate-to-severe, oral/conventional","options":["methotrexate","apremilast (Otezla)","deucravacitinib (Sotyktu)","acitretin","cyclosporine (short-term)"],"note":"Deucravacitinib is displacing apremilast as the preferred modern oral; methotrexate remains a global cost anchor."},{"line":"Moderate-to-severe, biologic (IL-23)","options":["risankizumab (Skyrizi)","guselkumab (Tremfya)","tildrakizumab (Ilumya)"],"note":"Preferred for durability and infrequent (q8–12w) dosing; excellent long-term safety."},{"line":"Moderate-to-severe, biologic (IL-17)","options":["secukinumab (Cosentyx)","ixekizumab (Taltz)","bimekizumab (Bimzelx)","brodalumab (Siliq)"],"note":"Fastest/deepest clearance; bimekizumab (dual IL-17A/F) sets the PASI-100 ceiling. Caution in IBD; candidiasis risk."},{"line":"Legacy biologic (TNF / IL-12-23)","options":["adalimumab (Humira)","etanercept (Enbrel)","ustekinumab (Stelara)","certolizumab (Cimzia)"],"note":"Mature classes, biosimilar-eroded; still used for PsA and in pregnancy (certolizumab)."},{"line":"First oral IL-23R (new)","options":["icotrokinra (Icotyde)"],"note":"Approved Mar 2026; oral peptide positioned for first-line systemic use, especially needle-averse and difficult-site patients."}],"top_products":[{"brand":"Skyrizi","generic":"risankizumab","company":"AbbVie","moa_class":"IL-23 inhibitor","modality":"mAb","approval_year":2019,"key_indications":["plaque psoriasis","psoriatic arthritis","Crohn's","UC"],"annual_sales_usd_m":11718,"sales_year":2024,"note":"Market leader; ~45% of US psoriasis biologic new-Rx share in Q4 2024. Cross-indication franchise; ~$17.5B in 2025.","sources":["s6"]},{"brand":"Stelara","generic":"ustekinumab","company":"Johnson & Johnson","moa_class":"IL-12/23 inhibitor","modality":"mAb","approval_year":2009,"key_indications":["plaque psoriasis","psoriatic arthritis","Crohn's","UC"],"annual_sales_usd_m":10360,"sales_year":2024,"note":"Global sales ~$10.4B in 2024 but declining ~14% as US biosimilars launched from Jan 2025 (loss of exclusivity).","sources":["s9","s20"]},{"brand":"Cosentyx","generic":"secukinumab","company":"Novartis","moa_class":"IL-17A inhibitor","modality":"mAb","approval_year":2015,"key_indications":["plaque psoriasis","psoriatic arthritis","axSpA","HS"],"annual_sales_usd_m":6140,"sales_year":2024,"note":"~$6.1B, +24% cc; broad label. US core patent ~2029.","sources":["s11"]},{"brand":"Tremfya","generic":"guselkumab","company":"Johnson & Johnson","moa_class":"IL-23 inhibitor","modality":"mAb","approval_year":2017,"key_indications":["plaque psoriasis","psoriatic arthritis","UC"],"annual_sales_usd_m":3670,"sales_year":2024,"note":"+16.6% YoY; J&J's designated growth engine to offset Stelara erosion.","sources":["s9"]},{"brand":"Taltz","generic":"ixekizumab","company":"Eli Lilly","moa_class":"IL-17A inhibitor","modality":"mAb","approval_year":2016,"key_indications":["plaque psoriasis","psoriatic arthritis","axSpA"],"annual_sales_usd_m":3200,"sales_year":2024,"note":"US patent expiry ~2028.","sources":["s10"]},{"brand":"Otezla","generic":"apremilast","company":"Amgen","moa_class":"PDE4 inhibitor","modality":"small_molecule","approval_year":2014,"key_indications":["plaque psoriasis","psoriatic arthritis","oral ulcers of Behçet's"],"annual_sales_usd_m":2200,"sales_year":2024,"note":"Oral incumbent; sales down ~3–4% on price/competition from Sotyktu.","sources":["s12"]},{"brand":"Bimzelx","generic":"bimekizumab","company":"UCB","moa_class":"IL-17A/F inhibitor","modality":"mAb","approval_year":2023,"key_indications":["plaque psoriasis","psoriatic arthritis","axSpA","HS"],"annual_sales_usd_m":716,"sales_year":2024,"note":"Dual IL-17A/F; highest PASI-100 rates. Fast launch — €607M ($716M) 2024 → ~$2.6B 2025.","sources":["s13"]},{"brand":"Sotyktu","generic":"deucravacitinib","company":"Bristol Myers Squibb","moa_class":"TYK2 inhibitor","modality":"small_molecule","approval_year":2022,"key_indications":["plaque psoriasis","psoriatic arthritis (2026)"],"annual_sales_usd_m":null,"sales_year":2024,"note":"First oral selective TYK2; US demand +21% in 2024 (exact FY revenue not separately disclosed here). PsA approval added 2026.","sources":["s14","s22"]},{"brand":"Humira","generic":"adalimumab","company":"AbbVie","moa_class":"TNF inhibitor","modality":"mAb","approval_year":2008,"key_indications":["plaque psoriasis","psoriatic arthritis","RA","IBD"],"annual_sales_usd_m":null,"sales_year":2024,"note":"Foundational TNF; heavily biosimilar-eroded since 2023 in the US. Psoriasis now a small fraction of use.","sources":["s1"]},{"brand":"Icotyde","generic":"icotrokinra","company":"Johnson & Johnson","moa_class":"IL-23 receptor antagonist (oral)","modality":"peptide","approval_year":2026,"key_indications":["moderate-to-severe plaque psoriasis (≥12y)"],"annual_sales_usd_m":null,"sales_year":2026,"note":"First-in-class oral IL-23R antagonist, approved Mar 18 2026; once-daily pill positioned for first-line systemic use.","sources":["s15"]}],"class_share":[{"class":"IL-23 inhibitors","share_pct":34,"basis":"approx. share of psoriasis biologic value, 2024 (Skyrizi+Tremfya+Ilumya)","sources":["s6","s9"]},{"class":"IL-17 inhibitors","share_pct":30,"basis":"approx. share of psoriasis biologic value, 2024 (Cosentyx+Taltz+Bimzelx+Siliq)","sources":["s11","s10","s13"]},{"class":"IL-12/23 (ustekinumab)","share_pct":14,"basis":"declining on biosimilars from 2025","sources":["s9","s20"]},{"class":"Oral systemics (PDE4/TYK2)","share_pct":12,"basis":"Otezla + Sotyktu","sources":["s12","s14"]},{"class":"TNF inhibitors","share_pct":6,"basis":"biosimilar-eroded legacy","sources":["s1"]}],"guidelines":[{"name":"AAD-NPF Guidelines of Care for Psoriasis (2019–2021)","note":"US joint American Academy of Dermatology / National Psoriasis Foundation guidelines spanning biologics, systemics, topicals, phototherapy, and comorbidity screening.","url":"https://www.aad.org/member/clinical-quality/guidelines/psoriasis"},{"name":"NPF treat-to-target","note":"Target of ≤1% BSA (or PASI response) within 3 months of therapy initiation.","url":"https://www.psoriasis.org"}],"sources":["s6","s9","s11","s10","s12","s13","s14","s15","s20","s1"]},"moa_landscape":[{"class":"IL-23 inhibitors (anti-p19 mAb)","target":"IL23A (p19 subunit)","rationale":"IL-23 is the apex cytokine sustaining pathogenic Th17 cells; blocking it upstream collapses the whole IL-17 cascade with exceptional durability.","mechanism":"Monoclonal antibodies bind the p19 subunit of IL-23, preventing receptor engagement and Th17 maintenance.","modality":"mAb","validation_status":"validated","pros":["durable, deep clearance (PASI 90+)","infrequent q8–12w dosing","best-in-class long-term safety","strong cross-indication (IBD, PsA)"],"cons":["parenteral (SC injection)","high cost","slower onset than IL-17"],"key_players":["AbbVie","Johnson & Johnson","Sun Pharma / Almirall","Eli Lilly"],"drugs":["d_risankizumab","d_guselkumab","d_tildrakizumab","d_mirikizumab"],"sources":["s2","s6","s9"]},{"class":"Oral IL-23 receptor antagonists","target":"IL23R","rationale":"Deliver the durable, safe IL-23 mechanism in an ORAL format — addressing the huge needle-averse / access-limited moderate-to-severe base at the top of the funnel.","mechanism":"Targeted oral peptide selectively blocks the IL-23 receptor, disrupting IL-23 signaling without a systemic antibody.","modality":"peptide","validation_status":"validated","pros":["once-daily oral","biologic-like selectivity/safety","first-line positioning","adolescent label"],"cons":["skin clearance modestly below best injectables","new class — long-term/real-world data maturing"],"key_players":["Johnson & Johnson","Protagonist Therapeutics","Oruka Therapeutics"],"drugs":["d_icotrokinra","d_orka001"],"sources":["s15","s19"]},{"class":"IL-17A inhibitors","target":"IL17A","rationale":"Direct blockade of the key effector cytokine gives the fastest and deepest skin clearance.","mechanism":"mAbs neutralize IL-17A, blocking keratinocyte activation and neutrophilic inflammation.","modality":"mAb","validation_status":"validated","pros":["rapid onset","deep clearance","strong PsA/axSpA data"],"cons":["mucocutaneous candidiasis","contraindicated/caution in IBD","more frequent dosing"],"key_players":["Novartis","Eli Lilly"],"drugs":["d_secukinumab","d_ixekizumab"],"sources":["s2","s11","s10","s_lit1"]},{"class":"IL-17A/F dual inhibitors","target":"IL17A + IL17F","rationale":"Neutralizing both IL-17A and IL-17F raises the efficacy ceiling to the highest PASI-100 rates seen.","mechanism":"Single mAb binds both IL-17A and IL-17F homo/heterodimers.","modality":"mAb","validation_status":"validated","pros":["highest complete-clearance (PASI 100) rates","superiority vs adalimumab, secukinumab, ustekinumab in head-to-heads"],"cons":["higher candidiasis rates","IBD caution"],"key_players":["UCB"],"drugs":["d_bimekizumab"],"sources":["s2","s13"]},{"class":"IL-17 receptor A antagonists","target":"IL17RA","rationale":"Blocking the shared receptor inhibits signaling of multiple IL-17 family members.","mechanism":"mAb against IL-17RA.","modality":"mAb","validation_status":"validated","pros":["broad IL-17 blockade","rapid clearance"],"cons":["boxed warning for suicidal ideation/behavior (brodalumab) — REMS","candidiasis"],"key_players":["Bausch Health","Kyowa Kirin"],"drugs":["d_brodalumab"],"sources":["s2","s1"]},{"class":"IL-12/23 (p40) inhibitors","target":"IL12B (p40)","rationale":"First-generation axis blockade hitting shared p40 of IL-12 and IL-23; proof-of-concept for the whole modern era.","mechanism":"mAb against the p40 subunit.","modality":"mAb","validation_status":"validated","pros":["long track record","q12w dosing","cross-indication"],"cons":["superseded on efficacy by selective IL-23","now biosimilar-eroded"],"key_players":["Johnson & Johnson"],"drugs":["d_ustekinumab"],"sources":["s2","s9","s20"]},{"class":"Oral TYK2 inhibitors (allosteric)","target":"TYK2 (pseudokinase domain)","rationale":"TYK2 transduces IL-23/IL-12 signaling intracellularly; allosteric (non-ATP-site) inhibition gives oral, selective axis blockade without broad JAK toxicity.","mechanism":"Small molecules bind the regulatory pseudokinase domain, locking TYK2 in an inactive state.","modality":"small_molecule","validation_status":"validated","pros":["oral, once-daily","cleaner safety than pan-JAK (no boxed JAK warning class effect to date)","next-gen agents rival biologic efficacy"],"cons":["skin clearance historically below top biologics (first-gen)","long-term class safety still accruing"],"key_players":["Bristol Myers Squibb","Takeda","Alumis","InnoCare"],"drugs":["d_deucravacitinib","d_zasocitinib","d_esk001","d_icp488"],"sources":["s2","s14","s16","s18"]},{"class":"Oral IL-17 antagonists (small molecule/peptide)","target":"IL17A","rationale":"Bring the potent IL-17 effector mechanism into an oral format.","mechanism":"Orally bioavailable small molecules / macrocyclic peptides that block IL-17A signaling.","modality":"small_molecule","validation_status":"emerging","pros":["oral IL-17 blockade","potential biologic-like efficacy in a pill"],"cons":["early clinical","Lilly deprioritized lead DC-806, pivoting to follow-on — class execution risk"],"key_players":["Eli Lilly (ex-DICE)"],"drugs":["d_dc806"],"sources":["s17","s1"]},{"class":"TNF-α inhibitors","target":"TNF","rationale":"Amplifier cytokine of the inflammatory loop; the original biologic breakthrough.","mechanism":"mAbs / receptor-fusion neutralize TNF-α.","modality":"mAb","validation_status":"validated","pros":["decades of data","cheap (biosimilars)","PsA and pregnancy (certolizumab) use"],"cons":["lower skin clearance than IL-17/23","infection/reactivation risk","commoditized"],"key_players":["AbbVie","Amgen","UCB","Johnson & Johnson"],"drugs":["d_adalimumab","d_etanercept","d_certolizumab","d_infliximab"],"sources":["s2","s1"]},{"class":"PDE4 inhibitors","target":"PDE4B/D","rationale":"Raising intracellular cAMP broadly dampens pro-inflammatory cytokine output — an oral or topical non-biologic option.","mechanism":"Inhibit PDE4, elevating cAMP in immune cells and keratinocytes.","modality":"small_molecule","validation_status":"validated","pros":["oral (apremilast) and topical (roflumilast) options","no lab monitoring","good safety"],"cons":["modest efficacy vs biologics","GI tolerability (oral)"],"key_players":["Amgen","Arcutis"],"drugs":["d_apremilast","d_roflumilast"],"sources":["s2","s12"]},{"class":"Nonsteroidal nuclear-receptor topicals (AhR / retinoid / vitamin D)","target":"AHR, RAR, VDR","rationale":"Normalize keratinocyte differentiation and local immune tone — steroid-sparing topical control for mild disease and maintenance.","mechanism":"AhR agonism (tapinarof), retinoid-receptor agonism (tazarotene), and VDR agonism (calcipotriene).","modality":"small_molecule","validation_status":"validated","pros":["steroid-free","chronic-use friendly","large mild-disease population"],"cons":["local irritation","modest as monotherapy in severe disease"],"key_players":["Organon / Dermavant","Almirall","Leo Pharma"],"drugs":["d_tapinarof","d_tazarotene","d_calcipotriene"],"sources":["s2","s1"]},{"class":"Conventional oral systemics (DHFR / calcineurin / retinoid)","target":"DHFR, calcineurin, RAR","rationale":"Broad immunomodulation; the global cost anchor and pre-biologic legacy.","mechanism":"Methotrexate (antifolate), cyclosporine (calcineurin), acitretin (systemic retinoid).","modality":"small_molecule","validation_status":"validated","pros":["low cost, oral","widely available globally"],"cons":["organ toxicity / monitoring (hepatic, renal)","teratogenic (MTX, acitretin) — boxed warnings","modest clearance"],"key_players":["generic"],"drugs":["d_methotrexate","d_cyclosporine","d_acitretin"],"sources":["s3","s1"]},{"class":"IL-36 receptor antagonists","target":"IL1RL2 (IL-36R)","rationale":"Targets the innate/pustular arm; transformative in generalized pustular psoriasis, mechanistically distinct from plaque disease.","mechanism":"mAb blocks the IL-36 receptor.","modality":"mAb","validation_status":"validated","pros":["disease-defining efficacy in GPP","novel innate mechanism"],"cons":["limited role in ordinary plaque psoriasis"],"key_players":["Boehringer Ingelheim"],"drugs":["d_spesolimab"],"sources":["s2"]},{"class":"Half-life-extended / high-affinity next-gen antibodies","target":"IL23A, IL17A/F","rationale":"Engineer IL-23/IL-17 antibodies for far less frequent dosing (potentially 1–2×/year) to defend the injectable franchise against orals and biosimilars.","mechanism":"Fc/affinity engineering to extend half-life and lower dose frequency.","modality":"mAb","validation_status":"emerging","pros":["convenience (very infrequent dosing)","differentiation vs biosimilars","retains biologic efficacy"],"cons":["early clinical","must beat entrenched, soon-cheap incumbents"],"key_players":["Oruka Therapeutics","AbbVie","Johnson & Johnson"],"drugs":["d_orka001"],"sources":["s1"]},{"class":"Metabolic adjuncts (GLP-1 / GIP agonists)","target":"GLP1R, GIPR","rationale":"Obesity worsens psoriasis and blunts biologic response; incretin agonists are in trials as weight/inflammation-directed adjuncts.","mechanism":"GLP-1 / dual GIP-GLP-1 receptor agonism (semaglutide, tirzepatide).","modality":"peptide","validation_status":"unproven","pros":["addresses cardiometabolic comorbidity","potential adjunct benefit"],"cons":["not a psoriasis therapy per se","efficacy on skin unproven"],"key_players":["Novo Nordisk","Eli Lilly"],"drugs":["d_semaglutide","d_tirzepatide"],"sources":["s2"]},{"class":"A3 adenosine receptor agonists","target":"ADORA3","rationale":"Oral small-molecule immunomodulation via A3AR; a differentiated non-cytokine oral mechanism in late development.","mechanism":"Agonism of the A3 adenosine receptor on inflammatory cells.","modality":"small_molecule","validation_status":"emerging","pros":["oral","novel mechanism","clean safety in trials"],"cons":["modest efficacy signal","small developer"],"key_players":["Can-Fite BioPharma"],"drugs":["d_piclidenoson"],"sources":["s1"]},{"class":"Pan-JAK inhibitors (deprioritized in plaque)","target":"JAK1/2/3","rationale":"Broad JAK blockade is efficacious but carries class safety warnings; largely bypassed in plaque psoriasis in favor of selective TYK2.","mechanism":"ATP-competitive inhibition of JAK family kinases (tofacitinib, others).","modality":"small_molecule","validation_status":"failed","pros":["oral, potent"],"cons":["boxed warnings (thrombosis, MACE, malignancy) — unfavorable risk/benefit vs selective TYK2 in a skin-only disease","not pursued to plaque approval"],"key_players":["Pfizer"],"drugs":["d_tofacitinib"],"sources":["s1","s2"]},{"class":"Alefacept / T-cell costimulation (historical, withdrawn)","target":"CD2 / LFA-3","rationale":"Early biologic targeting memory T cells; a strategic signal of a failed approach.","mechanism":"LFA-3/Fc fusion depletes CD2+ memory-effector T cells.","modality":"protein","validation_status":"failed","pros":["proof-of-concept for T-cell targeting"],"cons":["modest efficacy; withdrawn from market. Efalizumab (anti-CD11a) withdrawn for PML risk"],"key_players":["Astellas (hist.)","Genentech (hist.)"],"drugs":["d_alefacept","d_efalizumab"],"sources":["s2","s1"]}],"pipeline":{"summary":"The clinical-stage landscape is unusually deep and target-validated. Approved anchors span TNF, IL-12/23, IL-17, IL-23, PDE4, TYK2, and (from 2026) oral IL-23R. The active frontier is overwhelmingly ORAL: next-gen oral TYK2 inhibitors (zasocitinib, ESK-001) racing to match biologics, oral IL-23R peptides (icotrokinra :"Taltz (IL-17) incumbent; betting on ORAL immunology via the DICE acquisition (oral IL-17) and metabolic-immunology crossover (tirzepatide).","moa_classes":["IL-17A inhibitor","Oral IL-17 antagonist","IL-23 inhibitor"],"assets":["d_ixekizumab","d_dc806","d_mirikizumab","d_tirzepatide"],"deals":[{"type":"acquisition","counterparty":"DICE Therapeutics","value":"$2.4B","year":2023,"note":"Acquired for oral IL-17 antagonists (DC-806/DC-853); lead later deprioritized in favor of a follow-on.","sources":["s17"]}],"sources":["s10","s17"]},{"name":"UCB","type":"large pharma","positioning":"Bimzelx (dual IL-17A/F) is the efficacy-ceiling biologic — fastest immunology launch, crossing blockbuster in 2025; broad label (pso, PsA, axSpA, HS).","moa_classes":["IL-17A/F inhibitor","TNF inhibitor"],"assets":["d_bimekizumab","d_certolizumab"],"deals":[],"sources":["s13"]},{"name":"Bristol Myers Squibb","type":"large pharma","positioning":"Category creator of oral selective TYK2 with Sotyktu (deucravacitinib); expanding into psoriatic arthritis (approved 2026). Faces next-gen TYK2 competition.","moa_classes":["TYK2 inhibitor"],"assets":["d_deucravacitinib"],"deals":[],"sources":["s14","s22"]},{"name":"Takeda","type":"large pharma","positioning":"Chasing best-in-class oral TYK2 with zasocitinib (TAK-279); Phase 3 positive and beat Sotyktu head-to-head; FDA filing planned 2026; guided $3–6B peak.","moa_classes":["TYK2 inhibitor"],"assets":["d_zasocitinib"],"deals":[{"type":"acquisition","counterparty":"Nimbus Therapeutics (subsidiary)","value":"$4B","year":2022,"note":"Acquired Nimbus Lakshmi to obtain TAK-279 (zasocitinib) after positive Phase 2.","sources":["s16"]}],"sources":["s16"]},{"name":"Amgen","type":"large pharma","positioning":"Otezla (oral PDE4) incumbent under pricing/competitive pressure; also a leading Stelara-biosimilar player (Wezlana).","moa_classes":["PDE4 inhibitor","TNF inhibitor"],"assets":["d_apremilast","d_etanercept"],"deals":[],"sources":["s12","s20"]},{"name":"Alumis","type":"biotech","positioning":"Next-gen oral TYK2 (ESK-001) in Phase 3 ONWARD; merged with ACELYRIN (2025) to bolster late-stage immunology scale and cash.","moa_classes":["TYK2 inhibitor"],"assets":["d_esk001"],"deals":[{"type":"merger","counterparty":"ACELYRIN","value":"stock-for-stock","year":2025,"note":"All-stock merger creating a late-stage immunology company; ESK-001 Ph3 topline expected 1Q2026.","sources":["s18"]}],"sources":["s18"]},{"name":"Oruka Therapeutics","type":"biotech","positioning":"Convenience-focused: half-life-extended anti-IL-23 (ORKA-001) and anti-IL-17 (ORKA-002) engineered for 1–2×/year dosing — aiming to out-convenience biosimilars. Early clinical; limited public disclosure.","moa_classes":["IL-23 inhibitor"],"assets":["d_orka001"],"deals":[],"sources":["s1"]},{"name":"Arcutis Biotherapeutics","type":"biotech","positioning":"Topical innovator; Zoryve (roflumilast) is a leading nonsteroidal topical for plaque psoriasis, scalp, and beyond.","moa_classes":["PDE4 inhibitor"],"assets":["d_roflumilast"],"deals":[],"sources":["s1"]}],"market":{"summary":"The psoriasis drug market was ~$21B in 2024 and is forecast to reach ~$39B by 2030 (10.9% CAGR per Grand View Research), driven by biologic adoption, label expansion, and new orals. Biologics account for ~46% of value and North America ~39%. The market's defining dynamics are (1) intense IL-23 vs IL-17 competition at the premium end (Skyrizi leading), (2) a wave of biosimilar erosion — Stelara from 2025, Humira ongoing, Cosentyx/Taltz ~2028–2029 — which compresses value even as volumes rise, and (3) an oral-therapy inflection (TYK2, oral IL-23R) that could expand the treated population by pulling systemic therapy earlier and to needle-averse patients.","current_size":{"value_usd_m":21116,"value":"$21.1B","year":2024,"geography":"Global","is_estimate":false,"sources":["s5"]},"forecast":[{"year":2030,"value_usd_m":39114,"value":"$39.1B","is_estimate":true,"sources":["s5"]}],"cagr_pct":10.9,"drivers":["Continued shift from topicals/conventional systemics to biologics and targeted orals","Label expansion into PsA, HS, and pediatric/adolescent use","Oral TYK2 and oral IL-23R broadening the systemic-treated population","Rising diagnosed prevalence in aging, higher-SDI populations","Offsetting headwind: biosimilar erosion of TNF, IL-12/23, then IL-17 franchises"],"top_products_forecast":[{"product":"Skyrizi","value_usd_m":17500,"year":2025,"sources":["s6"]},{"product":"Bimzelx","value_usd_m":2600,"year":2025,"sources":["s13"]}],"pricing_access":"Biologics carry high US list prices (tens of thousands/yr) with substantial rebating; access is gated by step therapy through conventional systemics and payer formularies. Biosimilars (Stelara, Humira, and eventually IL-17s) are the primary price-compression force. BMS has notably discounted Sotyktu's list price to compete on access. An approved oral (icotrokinra) with a favorable convenience/safety profile could shift step-therapy economics by displacing older orals and pulling systemic treatment earlier.","opportunity":[{"title":"Biologic-grade efficacy in a pill","rationale":"The largest prize: an oral matching IL-23/IL-17 clearance with clean safety captures the needle-averse and access-limited majority of moderate-to-severe patients. Next-gen oral TYK2 (zasocitinib) and oral IL-23R (icotrokinra) are the front-runners.","segment":"moderate-to-severe, systemic-naïve","sources":["s15","s16"]},{"title":"Convenience / durability differentiation","rationale":"As IL-23/IL-17 antibodies commoditize toward biosimilars, ultra-infrequent dosing (1–2×/year, half-life-extended antibodies) or true drug-free remission becomes the differentiator.","segment":"biologic-experienced maintenance","sources":["s1"]},{"title":"Complete clearance (PASI 100)","rationale":"~30–40% still fall short of total clearance; dual IL-17A/F (bimekizumab) raised the ceiling and defines the aspiration for next agents.","segment":"high-expectation patients","sources":["s13"]},{"title":"Difficult sites & PsA prevention","rationale":"Scalp, nail, genital, palmoplantar disease and preventing progression to psoriatic arthritis are under-addressed differentiators (icotrokinra scalp/genital data; IL-23/IL-17/TYK2 joint benefit).","segment":"special-site / at-PsA-risk","sources":["s19","s22"]},{"title":"Post-cliff value migration","rationale":"Stelara/Humira/Cosentyx/Taltz losses of exclusivity free share and payer budget — whoever owns the best oral or most convenient biologic captures the switchers.","segment":"switch market","sources":["s20","s11"]}],"sources":["s5","s6","s13","s15","s16","s20","s11"]},"catalysts":[{"date":"2026-03","event":"FDA approval of icotrokinra (Icotyde)","asset":"icotrokinra","company":"Johnson & Johnson","type":"approval","significance":"First oral IL-23 receptor antagonist — opens a new oral, first-line systemic category and pressures both orals (Otezla, Sotyktu) and injectable biologics.","sources":["s15"]},{"date":"2026-01","event":"Sotyktu approved for psoriatic arthritis (US/EU)","asset":"deucravacitinib","company":"Bristol Myers Squibb","type":"approval","significance":"Expands the oral TYK2 franchise into joints, strengthening its position vs orals and biologics.","sources":["s22"]},{"date":"2026-Q1","event":"ESK-001 Phase 3 ONWARD topline (psoriasis)","asset":"ESK-001","company":"Alumis","type":"readout","significance":"Key test of next-gen oral TYK2 efficacy/safety; a strong result validates the higher-exposure TYK2 thesis.","sources":["s18"]},{"date":"2026","event":"Zasocitinib (TAK-279) regulatory submissions","asset":"zasocitinib","company":"Takeda","type":"pdufa","significance":"Phase 3 positive and superior to Sotyktu head-to-head; filing sets up a potential best-in-class oral TYK2 launch (guided $3–6B peak).","sources":["s16"]},{"date":"2025+","event":"Stelara biosimilar wave (US)","asset":"ustekinumab","company":"multiple (Amgen, Teva, Sandoz/Samsung Bioepis, Celltrion, Biocon)","type":"patent_expiry","significance":"Loss of exclusivity from Jan 2025; multibillion-dollar value migration and payer-budget release toward newer agents.","sources":["s20"]},{"date":"2028–2029","event":"Taltz (~2028) and Cosentyx (~2029) US patent expiries","asset":"ixekizumab / secukinumab","company":"Eli Lilly / Novartis","type":"patent_expiry","significance":"IL-17 class begins its biosimilar cliff; accelerates the shift of premium value to orals and next-gen biologics.","sources":["s10","s11"]},{"date":"2026–2027","event":"Icotrokinra head-to-head vs ustekinumab & continued ICONIC readouts","asset":"icotrokinra","company":"Johnson & Johnson","type":"data","significance":"First trial designed to show an oral pill superior to an injectable biologic — would be a paradigm signal for oral-first treatment.","sources":["s19"]}],"evidence":{"summary":"Psoriasis has an unusually clean efficacy hierarchy anchored on PASI response (% patients achieving 75/90/100% skin-lesion improvement) at week ~16. Dual IL-17A/F and the best IL-23 agents sit at the top (PASI 90 ~60–70%+), IL-17A and IL-23 next, oral TYK2 in the middle, and PDE4/conventional systemics lower. Head-to-head trials (a hallmark of this field) repeatedly rank newer selective agents above older ones (e.g., bimekizumab > secukinumab/adalimumab/ustekinumab; risankizumab > ustekinumab/adalimumab; deucravacitinib > apremilast; zasocitinib > deucravacitinib). Safety differentiators: IL-17 candidiasis and IBD caution; brodalumab suicidality boxed warning; JAK-class warnings that selective TYK2 has so far avoided.","landmark_trials":[{"name":"ERASURE / FIXTURE","nct_id":"NCT01365455","intervention":"secukinumab (IL-17A)","endpoint":"PASI 75 (wk12)","result":"~77–82% vs ~4% placebo; superior to etanercept","sources":["s_lit1"]},{"name":"UltIMMa-1/2","nct_id":"NCT02684370","intervention":"risankizumab (IL-23)","endpoint":"PASI 90 (wk16)","result":"~75% vs ~5% placebo and superior to ustekinumab","sources":["s1"]},{"name":"BE VIVID / BE RADIANT","nct_id":"NCT03370133","intervention":"bimekizumab (IL-17A/F)","endpoint":"PASI 100 (wk16)","result":"Highest complete-clearance rates; superior to ustekinumab and secukinumab","sources":["s1","s13"]},{"name":"POETYK PSO-1/2","nct_id":"NCT03624127","intervention":"deucravacitinib (oral TYK2)","endpoint":"PASI 75 (wk16)","result":"~58–69% vs ~9% placebo; superior to apremilast","sources":["s14"]},{"name":"ICONIC-LEAD / ADVANCE / TOTAL","nct_id":"NCT06095102","intervention":"icotrokinra (oral IL-23R)","endpoint":"IGA 0/1 (wk24)","result":"~65–74% clear/almost-clear — industry-leading for an oral, durable to wk52","sources":["s19"]},{"name":"Zasocitinib Phase 3 (plaque psoriasis)","nct_id":"","intervention":"zasocitinib (oral TYK2)","endpoint":"PASI 90 (wk16)","result":"~52–61% PASI 90; superior to Sotyktu in head-to-head","sources":["s16"]}],"benchmarks":[{"metric":"PASI 90 at wk16 (approx.)","unit":"%","by":[{"label":"bimekizumab (IL-17A/F)","value":85},{"label":"risankizumab (IL-23)","value":75},{"label":"ixekizumab (IL-17A)","value":71},{"label":"guselkumab (IL-23)","value":70},{"label":"secukinumab (IL-17A)","value":65},{"label":"zasocitinib (oral TYK2)","value":57},{"label":"deucravacitinib (oral TYK2)","value":35},{"label":"apremilast (PDE4)","value":20}],"sources":["s_lit1","s13","s14","s16","s1"]}]},"swot":{"strengths":["Exceptionally well-validated biology (IL-23/IL-17 axis) — the deepest target-validated pipeline in immunology","Multiple high-efficacy classes already approved; PASI 90 routine","Large, growing, well-diagnosed patient base with clear severity segmentation"],"weaknesses":["Efficacy problem largely solved — differentiation is now incremental and crowded","Chronic, relapsing disease with no cure/durable remission after stopping","Access, cost, and injection burden leave much of the eligible population untreated"],"opportunities":["Oral biologic-grade therapy (TYK2, IL-23R) to expand and pull-forward the treated population","Convenience/durability (1–2×/year dosing) as antibodies commoditize","Value migration from the 2025–2029 biosimilar cliff (Stelara → Humira → IL-17s)"],"threats":["Biosimilar erosion compressing market value even as volumes grow","Payer step-therapy and pricing pressure","Class-safety overhangs (JAK warnings; IL-17 IBD/candidiasis) shaping positioning"],"sources":["s5","s15","s16","s20"]},"sources":[{"id":"s1","type":"api","name":"ClinicalTrials.gov","title":"Interventional studies for plaque psoriasis (API v2)","url":"https://clinicaltrials.gov/api/v2/studies?query.cond=plaque%20psoriasis","accessed":"2026-07-23","note":"901 interventional studies; assets, phases, sponsors, statuses."},{"id":"s2","type":"api","name":"Open Targets Platform","title":"Psoriasis (EFO_1001494) — associated targets & drug candidates","url":"https://platform.opentargets.org/disease/EFO_1001494","accessed":"2026-07-23","note":"167 drug candidates, 85 mechanism-of-action groups; target list for biology panel."},{"id":"s3","type":"label","name":"openFDA","title":"Drug labels & Drugs@FDA mentioning psoriasis","url":"https://api.fda.gov/drug/label.json?search=indications_and_usage:%22psoriasis%22","accessed":"2026-07-23","note":"Approved products, routes, boxed warnings (acitretin, methotrexate, adalimumab)."},{"id":"s_lit1","type":"publication","name":"Europe PMC / NEJM","title":"Langley et al., Secukinumab in plaque psoriasis — results of two phase 3 trials (ERASURE/FIXTURE)","url":"https://europepmc.org/article/MED/25007392","accessed":"2026-07-23","note":"Landmark IL-17A pivotal efficacy (PASI 75 benchmark)."},{"id":"s5","type":"web","name":"Grand View Research","title":"Psoriasis Drugs Market Size & Share, Industry Report 2030","url":"https://www.grandviewresearch.com/industry-analysis/psoriasis-drugs-market","accessed":"2026-07-23","note":"Market $21.1B (2024) → $39.1B (2030), 10.9% CAGR; biologics ~46%; NA ~39%."},{"id":"s6","type":"filing","name":"AbbVie","title":"AbbVie Reports Full-Year and Fourth-Quarter 2024 Financial Results","url":"https://www.prnewswire.com/news-releases/abbvie-reports-full-year-and-fourth-quarter-2024-financial-results-302364968.html","accessed":"2026-07-23","note":"Skyrizi FY2024 net revenue $11.718B; ~$17.5B in 2025."},{"id":"s7","type":"publication","name":"GBD 2021 (PMC)","title":"Global Trends and Future Predictions of Psoriasis Burden: Insights from GBD 2021","url":"https://pmc.ncbi.nlm.nih.gov/articles/PMC12744867/","accessed":"2026-07-23","note":"Global prevalence ~23M (1990) → ~43M (2021); higher in high-SDI regions."},{"id":"s8","type":"publication","name":"JAMA Dermatology (PMC)","title":"Psoriasis Prevalence in Adults in the United States","url":"https://pmc.ncbi.nlm.nih.gov/articles/PMC8246333/","accessed":"2026-07-23","note":"~7.55M US adults ≥20y (~3%); ~21.5% report moderate-to-severe."},{"id":"s9","type":"filing","name":"Johnson & Johnson","title":"Johnson & Johnson Form 10-K FY2024 (immunology sales)","url":"https://www.sec.gov/Archives/edgar/data/200406/000020040625000038/jnj-20241229.htm","accessed":"2026-07-23","note":"Tremfya $3.67B (+16.6%); Stelara ~$10.4B global, declining on biosimilars."},{"id":"s10","type":"web","name":"DelveInsight / drugpatentwatch","title":"Taltz market ascent; Taltz patent expiry","url":"https://www.globenewswire.com/news-release/2025/02/24/3031431/0/en/TALTZ-s-Rapid-Market-Ascent-Reflects-its-Unparalleled-Ability-to-Transform-the-Treatment-Landscape-for-Autoimmune-Diseases-DelveInsight.html","accessed":"2026-07-23","note":"Taltz FY2024 ~$3.2B; US patent expiry ~2028."},{"id":"s11","type":"web","name":"Grand View Research (market trends)","title":"Secukinumab (Cosentyx): Navigating the Patent Cliff","url":"https://www.grandviewresearch.com/market-trends/secukinumab-navigating-patent-cliff-strategic-implications","accessed":"2026-07-23","note":"Cosentyx ~$6.14B (2024); US core patent ~2029."},{"id":"s12","type":"filing","name":"Amgen","title":"Amgen Reports Fourth Quarter and Full Year 2024 Financial Results","url":"https://www.prnewswire.com/news-releases/amgen-reports-fourth-quarter-and-full-year-2024-financial-results-302367906.html","accessed":"2026-07-23","note":"Otezla FY2024 ~$2.2B; down ~3–4% on price/competition."},{"id":"s13","type":"web","name":"FiercePharma / UCB","title":"UCB Bimzelx crosses blockbuster threshold","url":"https://www.fiercepharma.com/pharma/ucbs-fast-growing-powerhouse-bimzelx-crosses-blockbuster-sales-threshold-back-heavy-hitting","accessed":"2026-07-23","note":"Bimzelx €607M ($716M) 2024 → €2.22B ($2.6B) 2025."},{"id":"s14","type":"filing","name":"Bristol Myers Squibb","title":"Bristol Myers Squibb Form 10-K FY2024 (Sotyktu)","url":"https://www.sec.gov/Archives/edgar/data/14272/000001427225000039/bmy-20241231.htm","accessed":"2026-07-23","note":"Sotyktu US revenues +21% in 2024; oral selective TYK2; list-price discounting for access."},{"id":"s15","type":"web","name":"Johnson & Johnson","title":"FDA approval of ICOTYDE (icotrokinra) — first oral IL-23R antagonist","url":"https://www.jnj.com/media-center/press-releases/fda-approval-of-icotyde-icotrokinra-ushers-in-new-era-for-first-line-systemic-treatment-of-plaque-psoriasis-with-a-targeted-oral-peptide","accessed":"2026-07-23","note":"Approved Mar 18 2026 for moderate-to-severe plaque psoriasis (≥12y, ≥40kg)."},{"id":"s16","type":"web","name":"BioPharma Dive","title":"Takeda says $4B TYK2 drug (zasocitinib) succeeds in large psoriasis studies","url":"https://www.biopharmadive.com/news/takeda-zasocitinib-tyk2-psoriasis-drug-results-nimbus/808237/","accessed":"2026-07-23","note":"TAK-279 Ph3 positive (PASI 90 ~52–61%); beat Sotyktu head-to-head; filings 2026; from $4B Nimbus deal (2022)."},{"id":"s17","type":"web","name":"Eli Lilly / BioPharma Dive","title":"Lilly to Acquire DICE Therapeutics ($2.4B)","url":"https://www.prnewswire.com/news-releases/lilly-to-acquire-dice-therapeutics-to-advance-innovation-in-immunology-301854537.html","accessed":"2026-07-23","note":"2023 $2.4B acquisition for oral IL-17 antagonists (DC-806/DC-853); lead later deprioritized."},{"id":"s18","type":"web","name":"Alumis","title":"Alumis and ACELYRIN to Merge; ESK-001 Phase 3 ONWARD","url":"https://investors.alumis.com/news-releases/news-release-details/alumis-and-acelyrin-merge-creating-late-stage-clinical-biopharma","accessed":"2026-07-23","note":"All-stock merger (2025); ESK-001 oral TYK2 Ph3 topline expected 1Q2026."},{"id":"s19","type":"web","name":"Johnson & Johnson","title":"Icotrokinra Phase 3 ICONIC results (LEAD/ADVANCE/TOTAL)","url":"https://www.jnj.com/media-center/press-releases/icotrokinra-results-show-potential-to-set-a-new-standard-of-treatment-in-plaque-psoriasis","accessed":"2026-07-23","note":"IGA 0/1 ~65–74% at wk24; durable to wk52; scalp/genital efficacy; head-to-head vs ustekinumab initiated."},{"id":"s20","type":"web","name":"Managed Healthcare Executive","title":"Stelara biosimilars launch (2025)","url":"https://www.managedhealthcareexecutive.com/view/second-biosimilar-of-stelara-launches","accessed":"2026-07-23","note":"US loss of exclusivity 2025; multiple biosimilars (Wezlana, Selarsdi, Pyzchiva, Yesintek, Steqeyma)."},{"id":"s22","type":"web","name":"Bristol Myers Squibb","title":"US FDA Approves Sotyktu (deucravacitinib) for Active Psoriatic Arthritis","url":"https://news.bms.com/news/corporate-financial/2026/U-S--FDA-Approves-Bristol-Myers-Squibbs-Sotyktu-deucravacitinib-for-the-Treatment-of-Adults-with-Active-Psoriatic-Arthritis/default.aspx","accessed":"2026-07-23","note":"Sotyktu PsA approval (2026); label expansion beyond plaque psoriasis."}],"disclaimers":["Informational only. Not medical or investment advice.","Generated from public data and cited web research as of 2026-07-23; verify before relying on any figure.","Efficacy benchmarks are approximate, drawn from separate pivotal trials with differing populations/designs — cross-trial comparisons are indicative, not head-to-head unless stated.","Sales are reported full-year 2024 unless noted; some figures are global and some US-only per the cited source."]}</script>
<script>
"use strict";
const ATLAS = JSON.parse(document.getElementById("atlas-data").textContent || "{}");
const SRC = Object.fromEntries((ATLAS.sources||[]).map(s=>[s.id,s]));

// ---------- tiny DOM helper ----------
function el(tag, attrs, kids){
  const n=document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==="html") n.innerHTML=attrs[k];
    else if(k==="text") n.textContent=attrs[k];
    else if(k==="class") n.className=attrs[k];
    else if(k.startsWith("on")&&typeof attrs[k]==="function") n.addEventListener(k.slice(2),attrs[k]);
    else if(attrs[k]!=null) n.setAttribute(k,attrs[k]);
  }
  for(const c of [].concat(kids||[])){ if(c==null) continue; n.append(c.nodeType?c:document.createTextNode(c)); }
  return n;
}
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const nonEmpty=v=>v!=null && !(Array.isArray(v)&&!v.length) && !(typeof v==="object"&&!Array.isArray(v)&&!Object.keys(v).length) && v!=="";

// citation superscripts from a list of source ids
function cites(refs){
  if(!refs||!refs.length) return "";
  const seen=[];
  return "<sup class='cite'>"+refs.filter(r=>SRC[r]).map(r=>{
    const i=(ATLAS.sources.findIndex(s=>s.id===r))+1;
    return `<a href="#src-${esc(r)}" title="${esc(SRC[r].name||"")}: ${esc(SRC[r].title||"")}">${i}</a>`;
  }).join("")+"</sup>";
}
const estTag=o=>o&&o.is_estimate?"<span class='est'>est</span>":"";

// phase display
const PHASE_LABEL={preclinical:"Preclin",phase1:"Ph1",phase1_2:"Ph1/2",phase2:"Ph2",phase2_3:"Ph2/3",phase3:"Ph3",filed:"Filed",approved:"Approved",discontinued:"Disc"};
const PHASE_ORDER=["approved","filed","phase3","phase2_3","phase2","phase1_2","phase1","preclinical","discontinued"];

// ---------- panel registry ----------
const panels=[];
function panel(id,title,fn){ panels.push({id,title,fn}); }

function sectionEl(id,title,eyebrow){
  const s=el("section",{class:"panel",id});
  if(eyebrow) s.append(el("div",{class:"eyebrow",text:eyebrow}));
  s.append(el("h2",{text:title}));
  return s;
}
function prose(text,refs){ const p=el("div",{class:"prose"}); if(text) p.innerHTML=esc(text).replace(/\n\n+/g,"</p><p>").replace(/^/,"<p>").replace(/$/,"</p>")+(refs?cites(refs):""); return p; }
function emptyNote(t){ return el("div",{class:"empty",text:t||"Insufficient public data for this section."}); }

// ---- Overview ----
panel("overview","Overview",()=>{
  const o=ATLAS.overview||{}, stats=ATLAS.headline_stats||[];
  if(!nonEmpty(o)&&!stats.length) return null;
  const s=sectionEl("overview","Overview · the big picture","");
  if(ATLAS.meta&&ATLAS.meta.one_liner) s.append(el("p",{class:"lead",html:esc(ATLAS.meta.one_liner)}));
  if(stats.length){
    const g=el("div",{class:"stats"});
    stats.forEach(st=>g.append(el("div",{class:"stat"},[
      el("div",{class:"v",html:esc(st.value)+estTag(st)+cites(st.sources)}),
      el("div",{class:"l",text:st.label||""}),
      st.detail?el("div",{class:"d",text:st.detail}):null
    ])));
    s.append(g);
  }
  if(o.definition) s.append(el("h3",{text:"Definition"}),prose(o.definition,o.sources));
  if(o.pathophysiology) s.append(el("h3",{text:"Pathophysiology"}),prose(o.pathophysiology));
  if(o.state_of_play) s.append(el("h3",{text:"State of play"}),prose(o.state_of_play));
  return s;
});

// ---- Epidemiology ----
panel("epidemiology","Patient burden",()=>{
  const e=ATLAS.epidemiology; if(!nonEmpty(e)) return null;
  const s=sectionEl("epidemiology","Patient burden & epidemiology","who & how many");
  if(e.summary) s.append(prose(e.summary,e.sources));
  if((e.measures||[]).length){
    const t=el("table",{class:"tbl"});
    t.append(el("thead",{},el("tr",{},["Measure","Value","Geography","Year",""].map(h=>el("th",{text:h})))));
    const tb=el("tbody");
    e.measures.forEach(m=>tb.append(el("tr",{},[
      el("td",{text:m.label||""}),
      el("td",{html:esc(m.value)+estTag(m)}),
      el("td",{text:m.geography||"—"}),
      el("td",{text:m.year||"—"}),
      el("td",{html:cites(m.sources)})
    ])));
    t.append(tb); s.append(el("div",{class:"scroll"},t));
  }
  if((e.segments||[]).length){
    s.append(el("h3",{text:"Segmentation"}));
    e.segments.forEach(g=>s.append(el("div",{class:"bar"},[
      el("div",{class:"lab",text:g.name}),
      el("div",{class:"track"},el("div",{class:"fill",style:`width:${Math.min(100,g.share_pct||0)}%`})),
      el("div",{class:"val",html:esc(g.share||(g.share_pct!=null?g.share_pct+"%":""))})
    ])));
  }
  if(e.unmet_need){ s.append(el("h3",{text:"Unmet need"}),prose(e.unmet_need)); }
  if((e.patient_journey||[]).length){
    s.append(el("h3",{text:"Patient journey"}));
    const ul=el("ul",{class:"clean"});
    e.patient_journey.forEach(j=>ul.append(el("li",{html:"<b>"+esc(j.stage)+"</b> — "+esc(j.description)})));
    s.append(ul);
  }
  return s;
});

// ---- Biology ----
panel("biology","Disease biology",()=>{
  const b=ATLAS.biology; if(!nonEmpty(b)) return null;
  const s=sectionEl("biology","Disease biology","mechanism & targets");
  if(b.summary) s.append(prose(b.summary,b.sources));
  if((b.pathways||[]).length){ s.append(el("h3",{text:"Key pathways"}));
    const ul=el("ul",{class:"clean"}); b.pathways.forEach(p=>ul.append(el("li",{html:"<b>"+esc(p.name)+"</b> — "+esc(p.role||"")+cites(p.sources)}))); s.append(ul);}
  if((b.targets||[]).length){
    s.append(el("h3",{text:"Druggable targets"}));
    const t=el("table",{class:"tbl"});
    t.append(el("thead",{},el("tr",{},["Target","Name","Rationale / tractability"].map(h=>el("th",{text:h})))));
    const tb=el("tbody");
    b.targets.slice(0,40).forEach(g=>tb.append(el("tr",{},[
      el("td",{html:"<code>"+esc(g.symbol||"")+"</code>"}),
      el("td",{text:g.name||""}),
      el("td",{text:g.rationale||g.tractability||""})
    ])));
    t.append(tb); s.append(el("div",{class:"scroll tall"},t));
  }
  if((b.subtypes||[]).length){ s.append(el("h3",{text:"Subtypes & biomarkers"}));
    const ul=el("ul",{class:"clean"}); b.subtypes.forEach(x=>ul.append(el("li",{html:"<b>"+esc(x.name)+"</b> — "+esc(x.description||"")+(x.biomarker?" <span class='tag'>"+esc(x.biomarker)+"</span>":"")}))); s.append(ul);}
  return s;
});

// ---- Standard of care ----
panel("soc","Standard of care",()=>{
  const c=ATLAS.standard_of_care; if(!nonEmpty(c)) return null;
  const s=sectionEl("soc","Standard of care","how it's treated today");
  if(c.paradigm) s.append(prose(c.paradigm,c.sources));
  if((c.lines||[]).length){ s.append(el("h3",{text:"Treatment paradigm"}));
    const ul=el("ul",{class:"clean"}); c.lines.forEach(l=>ul.append(el("li",{html:"<b>"+esc(l.line)+"</b> — "+esc([].concat(l.options||[]).join(", "))+(l.note?" · "+esc(l.note):"")}))); s.append(ul);}
  if((c.top_products||[]).length){
    s.append(el("h3",{text:"Top marketed products"}));
    const t=el("table",{class:"tbl"});
    t.append(el("thead",{},el("tr",{},["Brand","Generic","Company","MoA class","Appr.","Sales","" ].map(h=>el("th",{text:h})))));
    const tb=el("tbody");
    c.top_products.forEach(p=>tb.append(el("tr",{},[
      el("td",{html:"<b>"+esc(p.brand||"")+"</b>"}),
      el("td",{text:p.generic||""}),
      el("td",{text:p.company||""}),
      el("td",{text:p.moa_class||""}),
      el("td",{text:p.approval_year||"—"}),
      el("td",{html:p.annual_sales_usd_m!=null?("$"+ (p.annual_sales_usd_m>=1000?(p.annual_sales_usd_m/1000).toFixed(1)+"B":p.annual_sales_usd_m+"M")):"—"}),
      el("td",{html:cites(p.sources)})
    ])));
    t.append(tb); s.append(el("div",{class:"scroll"},t));
  }
  if((c.class_share||[]).length){
    s.append(el("h3",{text:"Market share by class"}));
    const mx=Math.max(...c.class_share.map(x=>x.share_pct||0),1);
    c.class_share.forEach(g=>s.append(el("div",{class:"bar"},[
      el("div",{class:"lab",text:g.class}),
      el("div",{class:"track"},el("div",{class:"fill",style:`width:${(g.share_pct||0)/mx*100}%`})),
      el("div",{class:"val",html:(g.share_pct!=null?g.share_pct+"%":"")+cites(g.sources)})
    ])));
  }
  if((c.guidelines||[]).length){ s.append(el("h3",{text:"Guidelines"}));
    const ul=el("ul",{class:"clean"}); c.guidelines.forEach(g=>ul.append(el("li",{html:(g.url?`<a href="${esc(g.url)}" target="_blank" rel="noopener">${esc(g.name)}</a>`:esc(g.name))+(g.note?" — "+esc(g.note):"")}))); s.append(ul);}
  return s;
});

// ---- MoA landscape ----
panel("moa","MoA landscape",()=>{
  const m=ATLAS.moa_landscape; if(!(m&&m.length)) return null;
  const s=sectionEl("moa","Mechanism-of-action landscape","every approach");
  s.append(el("p",{class:"lead",text:"The core map: all therapeutic approaches, grouped by clinical validation. Border colour marks status."}));
  const order={validated:0,emerging:1,unproven:2,failed:3};
  const grid=el("div",{class:"moa-grid",id:"moa-grid"});
  m.slice().sort((a,b)=>(order[a.validation_status]??9)-(order[b.validation_status]??9)).forEach(c=>{
    const vs=c.validation_status||"unproven";
    const drugs=(c.drugs||[]).map(id=>ASSET_BY_ID[id]).filter(Boolean);
    const card=el("div",{class:"moa "+vs,"data-search":((c.class||"")+" "+(c.mechanism||"")+" "+(c.target||"")+" "+(c.key_players||[]).join(" ")+" "+drugs.map(d=>d.name).join(" ")).toLowerCase()},[
      el("div",{class:"vstatus",text:vs}),
      el("h4",{html:esc(c.class)+cites(c.sources)}),
      c.target?el("div",{class:"tag",text:c.target}):null,
      c.modality?el("div",{class:"tag",text:c.modality}):null,
      c.mechanism?el("div",{class:"mech",text:c.mechanism}):null,
      c.rationale?el("div",{class:"mech",html:"<b>Rationale:</b> "+esc(c.rationale)}):null,
    ]);
    if((c.pros&&c.pros.length)||(c.cons&&c.cons.length)) card.append(el("div",{class:"pc"},[
      el("div",{html:"<b>Pros</b><br>"+esc((c.pros||[]).join("; ")||"—")}),
      el("div",{html:"<b>Cons</b><br>"+esc((c.cons||[]).join("; ")||"—")})
    ]));
    if((c.key_players||[]).length) card.append(el("div",{class:"mech",html:"<b>Players:</b> "+esc(c.key_players.join(", "))}));
    if(drugs.length){ const wrap=el("div",{class:"mech"}); wrap.innerHTML="<b>Drugs:</b> ";
      drugs.slice(0,12).forEach(d=>wrap.append(el("span",{class:"tag phase",text:(d.name||"?")+" · "+(PHASE_LABEL[d.phase]||d.phase||"")})));
      card.append(wrap);}
    grid.append(card);
  });
  s.append(grid);
  return s;
});

// ---- Pipeline ----
let ASSET_BY_ID={};
panel("pipeline","Clinical pipeline",()=>{
  const p=ATLAS.pipeline||{}, assets=p.assets||[];
  if(!assets.length) return null;
  const s=sectionEl("pipeline","Clinical pipeline","what's coming");
  if(p.summary) s.append(prose(p.summary));
  // filters
  const modalities=[...new Set(assets.map(a=>a.modality).filter(Boolean))].sort();
  const companies=[...new Set(assets.map(a=>a.company).filter(Boolean))].sort();
  const bar=el("div",{class:"filters"});
  const fPhase=el("select",{},[el("option",{value:"",text:"All phases"})].concat(PHASE_ORDER.map(p=>el("option",{value:p,text:PHASE_LABEL[p]}))));
  const fMod=el("select",{},[el("option",{value:"",text:"All modalities"})].concat(modalities.map(m=>el("option",{value:m,text:m}))));
  const fCo=el("select",{},[el("option",{value:"",text:"All companies"})].concat(companies.map(c=>el("option",{value:c,text:c}))));
  const cnt=el("span",{class:"count"});
  bar.append(fPhase,fMod,fCo,cnt); s.append(bar);
  // matrix
  s.append(buildMatrix(assets));
  // table
  const t=el("table",{class:"tbl"});
  const cols=[["name","Drug"],["company","Company"],["moa_class","MoA class"],["modality","Modality"],["phase","Phase"],["route","Route"],["indications","Indications"]];
  t.append(el("thead",{},el("tr",{},cols.map(c=>el("th",{text:c[1]})).concat(el("th",{text:""})))));
  const tb=el("tbody"); t.append(tb);
  function render(){
    const fp=fPhase.value,fm=fMod.value,fc=fCo.value;
    tb.innerHTML=""; let n=0;
    assets.slice().sort((a,b)=>(b.phase_num||0)-(a.phase_num||0)).forEach(a=>{
      if(fp&&a.phase!==fp) return; if(fm&&a.modality!==fm) return; if(fc&&a.company!==fc) return;
      n++;
      tb.append(el("tr",{"data-search":((a.name||"")+" "+(a.company||"")+" "+(a.moa_class||"")+" "+(a.target||"")).toLowerCase()},[
        el("td",{html:"<b>"+esc(a.name)+"</b>"+(a.brand?" <span class='tag'>"+esc(a.brand)+"</span>":"")+cites(a.sources)}),
        el("td",{text:a.company||""}),
        el("td",{text:a.moa_class||""}),
        el("td",{text:a.modality||""}),
        el("td",{html:"<span class='tag phase'>"+esc(PHASE_LABEL[a.phase]||a.phase||"")+"</span>"}),
        el("td",{text:a.route||""}),
        el("td",{text:[].concat(a.indications||[]).slice(0,3).join(", ")})
      ]));
    });
    cnt.textContent=n+" / "+assets.length+" assets";
  }
  [fPhase,fMod,fCo].forEach(x=>x.addEventListener("change",render));
  render();
  s.append(el("div",{class:"scroll tall"},t));
  return s;
});

function buildMatrix(assets){
  // classes x phase counts
  const classes={};
  assets.forEach(a=>{ const k=a.moa_class||"Other"; (classes[k]=classes[k]||{})[a.phase]=(classes[k][a.phase]||0)+1; });
  const phs=PHASE_ORDER.filter(p=>assets.some(a=>a.phase===p));
  const top=Object.entries(classes).map(([k,v])=>[k,Object.values(v).reduce((x,y)=>x+y,0)]).sort((a,b)=>b[1]-a[1]).slice(0,16);
  const wrap=el("div",{class:"scroll"}); const t=el("table",{class:"matrix"});
  t.append(el("thead",{},el("tr",{},[el("th",{class:"rowh",text:"MoA class ↓ / Phase →"})].concat(phs.map(p=>el("th",{text:PHASE_LABEL[p]}))))));
  const tb=el("tbody");
  const maxv=Math.max(1,...top.flatMap(([k])=>phs.map(p=>(classes[k][p]||0))));
  top.forEach(([k])=>{
    const tr=el("tr",{},[el("td",{class:"rowh",text:k})]);
    phs.forEach(p=>{ const v=classes[k][p]||0; const alpha=v?(0.15+0.85*v/maxv):0;
      tr.append(el("td",{},v?el("span",{class:"n",style:`background:rgba(47,109,246,${alpha.toFixed(2)});color:${alpha>0.55?"#fff":"var(--ink)"}`,text:v}):"·"));});
    tb.append(tr);
  });
  t.append(tb); wrap.append(el("h3",{text:"Phase × MoA-class matrix"}),t); return wrap;
}

// ---- Companies ----
panel("companies","Competitive landscape",()=>{
  const co=ATLAS.companies; if(!(co&&co.length)) return null;

  const t=el("table",{class:"tbl"});

  const tb=el("tbody");
  co.forEach(c=>tb.append(el("tr",{"data-search":((c.name||"")+" "+(c.moa_classes||[]).join(" ")).toLowerCase()},[
    el("td",{html:"<b>"+esc(c.name)+"</b>"}),
    el("td",{text:c.type||""}),
    el("td",{text:c.positioning||""}),
    el("td",{text:[].concat(c.moa_classes||[]).join(", ")}),

    const ul=el("ul",{class:"clean"}); deals.forEach(d=>ul.append(el("li",{html:"<b>"+esc(d.co)+"</b> — "+esc([d.type,d.counterparty,d.value,d.year].filter(Boolean).join(" · "))+(d.note?" — "+esc(d.note):"")+cites(d.sources)}))); s.append(ul);}
  return s;
});

// ---- Market ----
panel("market","Market & opportunity",()=>{
  const m=ATLAS.market; if(!nonEmpty(m)) return null;
  const s=sectionEl("market","Market & opportunity","how big is the prize");
  if(m.summary) s.append(prose(m.summary,m.sources));
  const g=el("div",{class:"stats"});
  if(m.current_size&&nonEmpty(m.current_size)) g.append(el("div",{class:"stat"},[
    el("div",{class:"v",html:esc(m.current_size.value||("$"+m.current_size.value_usd_m+"M"))+estTag(m.current_size)+cites(m.current_size.sources)}),
    el("div",{class:"l",text:"Market size"+(m.current_size.year?" ("+m.current_size.year+")":"")}),
    m.current_size.geography?el("div",{class:"d",text:m.current_size.geography}):null]));
  if(m.cagr_pct!=null) g.append(el("div",{class:"stat"},[el("div",{class:"v",text:m.cagr_pct+"%"}),el("div",{class:"l",text:"CAGR"})]));
  if(g.children.length) s.append(g);
  if((m.forecast||[]).length){
    s.append(el("h3",{text:"Forecast"}));
    const all=[m.current_size,...m.forecast].filter(x=>x&&x.value_usd_m!=null);
    const mx=Math.max(...all.map(x=>x.value_usd_m),1);
    all.sort((a,b)=>(a.year||0)-(b.year||0)).forEach(f=>s.append(el("div",{class:"bar"},[
      el("div",{class:"lab",text:f.year||""}),
      el("div",{class:"track"},el("div",{class:"fill",style:`width:${f.value_usd_m/mx*100}%`})),
      el("div",{class:"val",html:esc(f.value||("$"+(f.value_usd_m>=1000?(f.value_usd_m/1000).toFixed(1)+"B":f.value_usd_m+"M")))+estTag(f)})
    ])));
  }
  if((m.drivers||[]).length){ s.append(el("h3",{text:"Growth drivers"})); const ul=el("ul",{class:"clean"}); m.drivers.forEach(d=>ul.append(el("li",{text:d}))); s.append(ul);}
  if(m.pricing_access){ s.append(el("h3",{text:"Pricing & access"}),prose(m.pricing_access)); }
  if((m.opportunity||[]).length){
    s.append(el("h3",{text:"Opportunity & whitespace"}));
    const ul=el("ul",{class:"clean"});
    m.opportunity.forEach(o=>ul.append(el("li",{html:"<b>"+esc(o.title)+"</b>"+(o.segment?" <span class='tag'>"+esc(o.segment)+"</span>":"")+" — "+esc(o.rationale||"")+cites(o.sources)})));
    s.append(ul);
  }
  return s;
});

// ---- Catalysts ----
panel("catalysts","Catalysts",()=>{
  const c=ATLAS.catalysts; if(!(c&&c.length)) return null;

  ])));

// ---- Evidence ----
panel("evidence","Evidence",()=>{
  const e=ATLAS.evidence; if(!nonEmpty(e)) return null;
  const s=sectionEl("evidence","Evidence","the hard data");
  if(e.summary) s.append(prose(e.summary));

  const w=ATLAS.swot; if(!nonEmpty(w)) return null;

// ---- Sources & methods (always) ----
panel("sources","Sources & methods",()=>{
  const s=sectionEl("sources","Sources & methods","provenance");
  const m=ATLAS.meta||{};
  if(m.coverage_note) s.append(prose(m.coverage_note));
  s.append(el("p",{class:"lead",html:"Generated "+esc(m.generated||"")+(m.generator?" · "+esc(m.generator):"")+" · "+(ATLAS.sources||[]).length+" sources."}));
  // legend
  const lg=el("div",{class:"legend"});
  PHASE_ORDER.forEach(p=>lg.append(el("div",{html:"<b>"+PHASE_LABEL[p]+"</b> "+({approved:"Approved / marketed",filed:"Filed",phase3:"Phase 3",phase2_3:"Phase 2/3",phase2:"Phase 2",phase1_2:"Phase 1/2",phase1:"Phase 1",preclinical:"Preclinical",discontinued:"Discontinued"}[p])})));
  s.append(el("h3",{text:"Legend"}),lg);
  if((ATLAS.sources||[]).length){
    s.append(el("h3",{text:"Sources"}));
    const ol=el("ol",{class:"srclist"});
    ATLAS.sources.forEach(src=>ol.append(el("li",{id:"src-"+src.id,html:
      (src.url?`<a href="${esc(src.url)}" target="_blank" rel="noopener">${esc(src.title||src.name||src.url)}</a>`:esc(src.title||src.name||""))+
      (src.name&&src.title?` — <i>${esc(src.name)}</i>`:"")+(src.type?` <span class="tag">${esc(src.type)}</span>`:"")+(src.accessed?` <span class="d" style="color:var(--faint)">accessed ${esc(src.accessed)}</span>`:"")})));
    s.append(ol);
  } else s.append(emptyNote("No sources recorded — this atlas is a stub."));
  if((ATLAS.disclaimers||[]).length){ const d=el("div",{class:"disc"}); ATLAS.disclaimers.forEach(x=>d.append(el("div",{text:x}))); s.append(d);}
  return s;
});

// ---------- build ----------
ASSET_BY_ID=Object.fromEntries(((ATLAS.pipeline||{}).assets||[]).map(a=>[a.id,a]));
const meta=ATLAS.meta||{};
document.getElementById("h-title").textContent=(meta.disease||"Disease")+" — Atlas";
document.getElementById("h-sub").textContent=[meta.scope==="therapeutic_area"?"Therapeutic area":"Indication",meta.generated&&("generated "+meta.generated)].filter(Boolean).join(" · ");
const nav=document.getElementById("nav"), main=document.getElementById("main");
panels.forEach(p=>{ const node=p.fn(); if(node){ main.append(node); nav.append(el("a",{href:"#"+p.id,text:p.title})); }});

// scroll-spy
const links=[...nav.querySelectorAll("a")];
const spy=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.toggle("active",l.getAttribute("href")==="#"+e.target.id));}});},{rootMargin:"-30% 0px -60% 0px"});
main.querySelectorAll("section.panel").forEach(s=>spy.observe(s));

// theme toggle
const root=document.documentElement;
document.getElementById("theme").addEventListener("click",()=>{
  const cur=root.getAttribute("data-theme")|| (matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  root.setAttribute("data-theme",cur==="dark"?"light":"dark");
});

// global search: highlight + filter rows/cards
const search=document.getElementById("search");
search.addEventListener("input",()=>{
  const q=search.value.trim().toLowerCase();
  document.querySelectorAll("[data-search]").forEach(n=>{
    const hit=!q||n.getAttribute("data-search").includes(q);
    n.style.display=hit?"":"none";
  });
});
