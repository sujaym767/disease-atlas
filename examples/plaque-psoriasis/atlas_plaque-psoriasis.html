<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plaque psoriasis — Disease Atlas</title>
<style>
:root{
  --bg:#f7f8fa; --panel:#ffffff; --ink:#1a1f2b; --muted:#5b6472; --faint:#8b95a5;
  --line:#e3e7ee; --accent:#2f6df6; --accent-soft:#e9f0ff;
  --v-validated:#1f9d6b; --v-emerging:#c98a12; --v-unproven:#7a86f0; --v-failed:#c0504d;
  --chip:#eef1f6; --shadow:0 1px 2px rgba(20,30,50,.06),0 3px 12px rgba(20,30,50,.05);
  --radius:12px; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --bg:#0e1116; --panel:#161b22; --ink:#e7ecf3; --muted:#9aa4b2; --faint:#6b7688;
  --line:#242c38; --accent:#4d84ff; --accent-soft:#16233f; --chip:#1d2430;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 3px 14px rgba(0,0,0,.3);
}}
:root[data-theme="dark"]{
  --bg:#0e1116; --panel:#161b22; --ink:#e7ecf3; --muted:#9aa4b2; --faint:#6b7688;
  --line:#242c38; --accent:#4d84ff; --accent-soft:#16233f; --chip:#1d2430;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 3px 14px rgba(0,0,0,.3);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;font-size:15px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
h1,h2,h3,h4{line-height:1.25;margin:0 0 .4em}
h2{font-size:1.35rem;letter-spacing:-.01em}
h3{font-size:1.05rem}
code{font-family:var(--mono);font-size:.85em}
.wrap{display:grid;grid-template-columns:230px minmax(0,1fr);gap:0;max-width:1280px;margin:0 auto}
/* header */
header.top{grid-column:1/-1;position:sticky;top:0;z-index:30;background:var(--panel);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:12px 20px}
header.top .title{font-weight:700;font-size:1.05rem}
header.top .sub{color:var(--muted);font-size:.82rem}
header.top .spacer{flex:1}
#search{background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:8px;
  padding:7px 11px;font-size:.85rem;width:210px;font-family:var(--sans)}
.btn{background:var(--bg);border:1px solid var(--line);color:var(--muted);border-radius:8px;
  padding:7px 10px;cursor:pointer;font-size:.8rem}
.btn:hover{color:var(--ink)}
/* nav */
nav.side{position:sticky;top:57px;align-self:start;height:calc(100vh - 57px);overflow:auto;
  padding:16px 10px 40px;border-right:1px solid var(--line)}
nav.side a{display:block;color:var(--muted);padding:7px 12px;border-radius:8px;font-size:.86rem;margin-bottom:1px}
nav.side a:hover{background:var(--chip);text-decoration:none;color:var(--ink)}
nav.side a.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
main{padding:26px 30px 80px;min-width:0}
section.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 24px;margin-bottom:22px;box-shadow:var(--shadow);scroll-margin-top:70px}
section.panel>.eyebrow{color:var(--faint);font-size:.72rem;letter-spacing:.09em;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.lead{color:var(--muted);font-size:.96rem}
p{margin:.5em 0}
.prose p:first-child{margin-top:0}
/* headline stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:6px}
.stat{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px 15px}
.stat .v{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
.stat .l{color:var(--muted);font-size:.78rem;margin-top:2px}
.stat .d{color:var(--faint);font-size:.72rem;margin-top:3px}
/* chips & tags */
.tag{display:inline-block;background:var(--chip);color:var(--muted);border-radius:999px;
  padding:2px 9px;font-size:.72rem;margin:2px 4px 2px 0;white-space:nowrap}
.tag.phase{font-weight:600}
sup.cite{font-size:.65em;font-weight:700}
sup.cite a{background:var(--accent-soft);color:var(--accent);border-radius:4px;padding:0 4px;margin-left:2px}
.est{color:var(--v-emerging);font-size:.7rem;font-weight:700;border:1px solid currentColor;border-radius:4px;padding:0 4px;margin-left:5px;vertical-align:middle}
/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:6px}
.tbl th{text-align:left;color:var(--faint);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;
  border-bottom:1px solid var(--line);padding:8px 10px;position:sticky;top:57px;background:var(--panel);cursor:pointer}
.tbl td{border-bottom:1px solid var(--line);padding:8px 10px;vertical-align:top}
.tbl tr:hover td{background:var(--bg)}
.scroll{overflow-x:auto;max-width:100%}
.tall{max-height:520px;overflow:auto}
/* moa cards */
.moa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:8px}
.moa{border:1px solid var(--line);border-left-width:4px;border-radius:10px;padding:14px 15px;background:var(--bg)}
.moa.validated{border-left-color:var(--v-validated)} .moa.emerging{border-left-color:var(--v-emerging)}
.moa.unproven{border-left-color:var(--v-unproven)} .moa.failed{border-left-color:var(--v-failed)}
.moa h4{margin:0 0 2px;font-size:.98rem}
.moa .vstatus{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.moa.validated .vstatus{color:var(--v-validated)} .moa.emerging .vstatus{color:var(--v-emerging)}
.moa.unproven .vstatus{color:var(--v-unproven)} .moa.failed .vstatus{color:var(--v-failed)}
.moa .mech{color:var(--muted);font-size:.82rem;margin:6px 0}
.moa .pc{display:flex;gap:10px;font-size:.76rem;margin-top:6px}
.moa .pc div{flex:1}
.moa .pc b{color:var(--muted);font-weight:600}
/* matrix */
.matrix{border-collapse:collapse;font-size:.78rem;margin-top:8px}
.matrix th,.matrix td{border:1px solid var(--line);padding:5px 8px;text-align:center;min-width:38px}
.matrix th.rowh,.matrix td.rowh{text-align:left;font-weight:600;white-space:nowrap;position:sticky;left:0;background:var(--panel)}
.matrix td .n{display:inline-block;min-width:20px;border-radius:5px;padding:1px 5px;font-weight:600}
/* bars */
.bar{display:flex;align-items:center;gap:10px;margin:5px 0;font-size:.83rem}
.bar .lab{width:190px;flex:none;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .track{flex:1;background:var(--chip);border-radius:6px;height:16px;position:relative;overflow:hidden}
.bar .fill{background:var(--accent);height:100%;border-radius:6px}
.bar .val{width:90px;flex:none;text-align:right;font-variant-numeric:tabular-nums}
/* timeline */
.tl{border-left:2px solid var(--line);margin-left:8px;padding-left:16px}
.tl .ev{position:relative;margin-bottom:14px}
.tl .ev::before{content:"";position:absolute;left:-23px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--accent)}
.tl .ev .when{font-size:.74rem;color:var(--accent);font-weight:700}
.tl .ev .what{font-weight:600;font-size:.9rem}
.tl .ev .why{color:var(--muted);font-size:.82rem}
/* swot */
.swot{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.swot .q{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:var(--bg)}
.swot .q h4{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em}
.swot ul{margin:6px 0 0;padding-left:18px;font-size:.85rem;color:var(--muted)}
.empty{color:var(--faint);font-style:italic;font-size:.86rem;padding:6px 0}
ul.clean{margin:.4em 0;padding-left:20px}
ul.clean li{margin:3px 0}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.filters select,.filters input{background:var(--bg);border:1px solid var(--line);color:var(--ink);
  border-radius:8px;padding:6px 9px;font-size:.82rem;font-family:var(--sans)}
.count{color:var(--faint);font-size:.78rem;margin-left:auto;align-self:center}
.legend{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px 20px;font-size:.8rem}
.legend div{color:var(--muted)}
.legend b{color:var(--ink);font-family:var(--mono);font-size:.78rem}
.srclist{font-size:.82rem}
.srclist li{margin:5px 0;color:var(--muted)}
.disc{color:var(--faint);font-size:.78rem;border-top:1px solid var(--line);margin-top:16px;padding-top:12px}
.hl{background:rgba(255,220,80,.35);border-radius:3px}
@media(max-width:820px){
  .wrap{grid-template-columns:1fr}
  nav.side{display:none}
  main{padding:18px 14px 60px}
  #search{width:130px}
  .swot{grid-template-columns:1fr}
}
@media print{
  nav.side,header.top .btn,header.top #search,.filters{display:none}
  section.panel{break-inside:avoid;box-shadow:none}
  body{background:#fff}
}
</style>

<script id="atlas-data" type="application/json">{"schema_version":"1.0","meta":{"disease":"Plaque psoriasis","aliases":["psoriasis vulgaris","chronic plaque psoriasis"],"scope":"indication","generated":"2026-07-23","generator":"disease-atlas skill v0.1","one_liner":"Chronic, immune-mediated inflammatory skin disease driven by the IL-23 / IL-17 axis; a mature, biologics-led market now moving toward oral targeted therapy.","coverage_note":"Demonstration atlas. Built in an egress-restricted environment where the live public-API fetchers (ClinicalTrials.gov, Open Targets, openFDA) were blocked by network policy, so the pipeline, standard-of-care and MoA content reflect established public knowledge of the psoriasis landscape rather than a fresh API pull; epidemiology, market and sales figures are from the cited web sources. Regenerate in a network-permitted environment for a fully API-sourced, dated snapshot. Efficacy percentages are approximate, cross-trial figures unless a head-to-head is cited."},"headline_stats":[{"label":"Worldwide prevalence","value":"~125M","detail":"~2–3% of the global population","value_num":125000000,"sources":["npf","gbd"]},{"label":"US adults affected","value":"~7.5M","detail":"~3.0% of adults ≥20y","value_num":7500000,"sources":["npf","usprev"]},{"label":"Global market (2024)","value":"$27–33B","detail":"treatment market, estimate range","is_estimate":true,"sources":["fbi","smr"]},{"label":"Approved MoA classes","value":"8+","detail":"TNF, IL-12/23, IL-17, IL-23, PDE4, TYK2, AhR, topicals","sources":["fda"]},{"label":"Moderate-to-severe","value":"~20%","detail":"of patients; biologic-eligible","is_estimate":true,"sources":["npf"]},{"label":"Top product (2023)","value":"$10.9B","detail":"Stelara WW (incl. IBD); Skyrizi $7.8B","value_num":10858,"sources":["xtalks"]}],"overview":{"definition":"Plaque psoriasis is a chronic, immune-mediated inflammatory disease that produces well-demarcated, scaly erythematous plaques, most commonly on the scalp, elbows, knees and trunk. It accounts for ~80–90% of psoriasis cases and is frequently accompanied by psoriatic arthritis and cardiometabolic comorbidity.","pathophysiology":"Aberrant activation of the IL-23 / IL-17 axis drives keratinocyte hyperproliferation and inflammation. Dendritic-cell–derived IL-23 sustains pathogenic Th17 cells, which release IL-17A/F and TNF, amplifying the inflammatory loop that maintains plaques.","state_of_play":"Psoriasis is one of the great success stories of targeted immunology: selective IL-23 and IL-17 biologics now deliver near-clear skin (PASI 90) in the majority of moderate-to-severe patients. The frontier has shifted from efficacy to (1) convenience and cost — oral targeted agents (TYK2, oral IL-23) challenging injectables — and (2) access, with the field still under-treated. TNF biosimilars and, from 2025, Stelara biosimilars are reshaping economics.","sources":["npf","gbd"]},"epidemiology":{"summary":"Psoriasis affects roughly 125 million people worldwide (2–3% of the population) with marked geographic variation (higher in high-latitude, high-income regions). In the US it affects ~3.0% of adults (>7.5 million), rising with age and highest in White populations.","measures":[{"label":"Global prevalence","value":"≈125M (2–3%)","value_num":125000000,"geography":"Global","year":2023,"is_estimate":true,"sources":["npf","gbd"]},{"label":"US adult prevalence","value":"~7.5M (3.0%)","value_num":7500000,"geography":"United States","year":2021,"sources":["npf","usprev"]},{"label":"Undiagnosed (US)","value":"~600k adults","geography":"United States","is_estimate":true,"sources":["npf"]},{"label":"Peak age prevalence","value":"4.3% (age 50–59)","geography":"United States","sources":["npf"]}],"segments":[{"name":"Mild (topical-managed)","share":"~80%","share_pct":80,"note":"limited body-surface area; managed with topicals ± phototherapy","sources":["npf"]},{"name":"Moderate-to-severe (systemic-eligible)","share":"~20%","share_pct":20,"note":"the biologic/oral-systemic opportunity","is_estimate":true,"sources":["npf"]}],"demographics":"Bimodal onset (peaks ~20s and ~50s); affects sexes roughly equally; highest prevalence in White populations (US 3.6%) vs Asian (2.5%) and Black (1.5%). ~30% of patients develop psoriatic arthritis; elevated cardiovascular, metabolic and depression risk.","unmet_need":"Despite excellent biologics, a large share of moderate-to-severe patients remain untreated or under-treated (cost, access, injection aversion, specialist bottlenecks). Oral options with biologic-like efficacy, durable remission/disease modification, and treatment of hard-to-treat sites (scalp, nails, palmoplantar, genital) remain the key gaps.","patient_journey":[{"stage":"Onset & diagnosis","description":"Clinical diagnosis by dermatologist/PCP; often delayed; comorbidity screening (PsA, cardiometabolic) frequently missed."},{"stage":"First-line (mild)","description":"Topical corticosteroids, vitamin D analogs, and non-steroidals (roflumilast, tapinarof); phototherapy for wider disease."},{"stage":"Systemic step-up","description":"Moderate-to-severe patients escalate to oral systemics (apremilast, deucravacitinib, methotrexate) or biologics."},{"stage":"Biologic maintenance","description":"IL-23 / IL-17 biologics give durable near-clearance; switching driven by loss of response, access or comorbidity (e.g. concurrent PsA/IBD)."}],"sources":["npf","gbd","usprev"]},"biology":{"summary":"The IL-23 / IL-17 axis is the validated core of psoriasis pathogenesis. IL-23 (p19/p40) from dendritic cells maintains pathogenic Th17 cells; downstream IL-17A/F and TNF drive keratinocyte activation. Intracellular TYK2 transmits IL-23 (and type-I IFN) signalling — the basis of oral TYK2 inhibition.","pathways":[{"name":"IL-23 → Th17 → IL-17 axis","role":"Central pathogenic loop; target of the most effective biologics.","sources":["ot"]},{"name":"TNF signalling","role":"Amplifies inflammation; the first successful biologic target.","sources":["ot"]},{"name":"TYK2 / JAK-STAT","role":"Intracellular transducer of IL-23 and type-I IFN; drugged orally (allosteric TYK2).","sources":["ot"]},{"name":"cAMP / PDE4","role":"Immunomodulatory; PDE4 inhibition raises cAMP to dampen cytokine output (oral & topical).","sources":["ot"]}],"targets":[{"symbol":"IL23A","name":"Interleukin-23 subunit p19","rationale":"Selective IL-23 blockade = best-in-class efficacy + durable, infrequent dosing.","tractability":"clinically drugged (mAb; oral peptide emerging)","sources":["ot"]},{"symbol":"IL17A","name":"Interleukin-17A","rationale":"Rapid, high skin clearance; the effector cytokine.","tractability":"clinically drugged (mAb, nanobody)","sources":["ot"]},{"symbol":"IL12B","name":"IL-12/23 subunit p40","rationale":"First IL-23-pathway target (ustekinumab); now bettered by selective p19.","tractability":"clinically drugged","sources":["ot"]},{"symbol":"TNF","name":"Tumor necrosis factor","rationale":"Legacy target; broad but less skin-selective; biosimilar era.","tractability":"clinically drugged","sources":["ot"]},{"symbol":"TYK2","name":"Tyrosine kinase 2","rationale":"Enables oral targeting of the IL-23 pathway with biologic-adjacent efficacy.","tractability":"clinically drugged (oral, allosteric)","sources":["ot"]},{"symbol":"PDE4","name":"Phosphodiesterase 4B","rationale":"Oral and topical immunomodulation; modest efficacy, good convenience/safety.","tractability":"clinically drugged","sources":["ot"]},{"symbol":"IL17RA","name":"IL-17 receptor A","rationale":"Blocks IL-17A/C/E/F signalling (brodalumab).","tractability":"clinically drugged","sources":["ot"]},{"symbol":"AHR","name":"Aryl hydrocarbon receptor","rationale":"Topical non-steroidal mechanism (tapinarof).","tractability":"clinically drugged (topical)","sources":["ot"]}],"subtypes":[{"name":"Plaque (vulgaris)","description":"~80–90% of cases; the focus of this atlas.","biomarker":"clinical"},{"name":"Guttate / inverse / erythrodermic","description":"Less common morphologies; different triggers and management.","biomarker":"clinical"},{"name":"Pustular (GPP)","description":"Rare, severe; distinct IL-36 biology — adjacent indication (spesolimab).","biomarker":"IL36RN"},{"name":"With psoriatic arthritis","description":"~30% comorbidity; steers drug choice toward agents with joint efficacy.","biomarker":"clinical/imaging"}]},"standard_of_care":{"paradigm":"Care is severity-driven. Mild disease (~80%) is managed topically (corticosteroids, vitamin D analogs, and newer non-steroidals roflumilast and tapinarof) ± phototherapy. Moderate-to-severe disease steps up to oral systemics (deucravacitinib, apremilast, methotrexate) or biologics, where selective IL-23 and IL-17 agents are now preferred for their durable near-clearance. Drug choice is shaped by comorbidity — PsA favours IL-17/TNF/IL-23 with joint data; concurrent IBD favours IL-23 and avoids IL-17.","lines":[{"line":"First-line (mild/localised)","options":["topical corticosteroids","vitamin D analogs","tapinarof","topical roflumilast"],"note":"± phototherapy for wider BSA"},{"line":"Oral systemic (moderate)","options":["deucravacitinib (TYK2)","apremilast (PDE4)","methotrexate"],"note":"oral convenience; step before/alongside biologics"},{"line":"Biologic (moderate-to-severe)","options":["IL-23 (risankizumab, guselkumab)","IL-17 (ixekizumab, bimekizumab, secukinumab)","TNF (biosimilars)"],"note":"IL-23/IL-17 preferred; choice tuned to comorbidity"}],"top_products":[{"brand":"Stelara","generic":"ustekinumab","company":"Johnson & Johnson","moa_class":"IL-12/23 inhibitor","modality":"mAb","approval_year":2009,"key_indications":["plaque psoriasis","PsA","IBD"],"annual_sales_usd_m":10858,"sales_year":2023,"note":"WW sales incl. IBD; biosimilars from 2025","sources":["xtalks"]},{"brand":"Skyrizi","generic":"risankizumab","company":"AbbVie","moa_class":"IL-23 inhibitor","modality":"mAb","approval_year":2019,"key_indications":["plaque psoriasis","PsA","Crohn's"],"an       ]));

  [fPhase,fMod,fCo].forEach(x=>x.addEventListener("change",render));
  render();

function buildMatrix(assets){
  // classes x phase counts
  const classes={};
  assets.forEach(a=>{ const k=a.moa_class||"Other"; (classes[k]=classes[k]||{})[a.phase]=(classes[k][a.phase]||0)+1; });
  const phs=PHASE_ORDER.filter(p=>assets.some(a=>a.phase===p));
  const top=Object.entries(classes).map(([k,v])=>[k,Object.values(v).reduce((x,y)=>x+y,0)]).sort((a,b)=>b[1]-a[1]).slice(0,16);
  const wrap=el("div",{class:"scroll"}); const t=el("table",{class:"matrix"});
  t.append(el("thead",{},el("tr",{},[el("th",{class:"rowh",text:"MoA class ↓ / Phase →"})].concat(phs.map(p=>el("th",{text:PHASE_LABEL[p]}))))));
  const tb=el("tbody");
  const maxv=Math.max(1,...top.flatMap(([k])=>phs.map(p=>(classes[k][p]||0))));
  top.forEach(([k])=>{
    const tr=el("tr",{},[el("td",{class:"rowh",text:k})]);
    phs.forEach(p=>{ const v=classes[k][p]||0; const alpha=v?(0.15+0.85*v/maxv):0;
      tr.append(el("td",{},v?el("span",{class:"n",style:`background:rgba(47,109,246,${alpha.toFixed(2)});color:${alpha>0.55?"#fff":"var(--ink)"}`,text:v}):"·"));});
    tb.append(tr);
  });
  t.append(tb); wrap.append(el("h3",{text:"Phase × MoA-class matrix"}),t); return wrap;
}

    s.append(el("h3",{text:"Sources"}));
    const ol=el("ol",{class:"srclist"});
    ATLAS.sources.forEach(src=>ol.append(el("li",{id:"src-"+src.id,html:
      (src.url?`<a href="${esc(src.url)}" target="_blank" rel="noopener">${esc(src.title||src.name||src.url)}</a>`:esc(src.title||src.name||""))+
      (src.name&&src.title?` — <i>${esc(src.name)}</i>`:"")+(src.type?` <span class="tag">${esc(src.type)}</span>`:"")+(src.accessed?` <span class="d" style="color:var(--faint)">accessed ${esc(src.accessed)}</span>`:"")})));
    s.append(ol);
  } else s.append(emptyNote("No sources recorded — this atlas is a stub."));
  if((ATLAS.disclaimers||[]).length){ const d=el("div",{class:"disc"}); ATLAS.disclaimers.forEach(x=>d.append(el("div",{text:x}))); s.append(d);}
  return s;
});

// ---------- build ----------
ASSET_BY_ID=Object.fromEntries(((ATLAS.pipeline||{}).assets||[]).map(a=>[a.id,a]));
const meta=ATLAS.meta||{};
document.getElementById("h-title").textContent=(meta.disease||"Disease")+" — Atlas";
document.getElementById("h-sub").textContent=[meta.scope==="therapeutic_area"?"Therapeutic area":"Indication",meta.generated&&("generated "+meta.generated)].filter(Boolean).join(" · ");
const nav=document.getElementById("nav"), main=document.getElementById("main");
panels.forEach(p=>{ const node=p.fn(); if(node){ main.append(node); nav.append(el("a",{href:"#"+p.id,text:p.title})); }});

// scroll-spy
const links=[...nav.querySelectorAll("a")];
const spy=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.toggle("active",l.getAttribute("href")==="#"+e.target.id));}});},{rootMargin:"-30% 0px -60% 0px"});
main.querySelectorAll("section.panel").forEach(s=>spy.observe(s));

// theme toggle
const root=document.documentElement;
document.getElementById("theme").addEventListener("click",()=>{
  const cur=root.getAttribute("data-theme")|| (matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  root.setAttribute("data-theme",cur==="dark"?"light":"dark");
});

// global search: highlight + filter rows/cards
const search=document.getElementById("search");
search.addEventListener("input",()=>{
  const q=search.value.trim().toLowerCase();
  document.querySelectorAll("[data-search]").forEach(n=>{
    const hit=!q||n.getAttribute("data-search").includes(q);
    n.style.display=hit?"":"none";
  });
});
</script>
</body>
