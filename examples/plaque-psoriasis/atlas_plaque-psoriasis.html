  function node(o,x,y,r){const g=svgEl("g");g.style.cursor="pointer";g.onclick=()=>openModal(o.id);
    g.append(drawShape(tshape(o),x,y,r,tcolor(o),css("--paper")));
    const tl=svgEl("text",{x,y:y>cy?y+r+12:y-r-6,"text-anchor":"middle",class:"elabel"});tl.textContent=o.label.length>18?o.label.slice(0,17)+"…":o.label;g.append(tl);svg.append(g);}
  const neigh=neighborsOf(center.id);
  const innerCap=hop==2?10:15, shown=neigh.slice(0,innerCap), R=hop==2?135:(shown.length>10?170:150);
  const placed={};
  shown.forEach((nb,i)=>{const ang=-Math.PI/2+i*2*Math.PI/Math.max(1,shown.length),x=cx+R*Math.cos(ang),y=cy+R*Math.sin(ang),o=N[nb.other];
    placed[nb.other]={x,y,ang};
    const A=nb.dir=="out"?{x:cx,y:cy}:{x,y},B=nb.dir=="out"?{x,y}:{x:cx,y:cy};link(A,B,nb.type,17,12);
    node(o,x,y,11);});
  // second hop — neighbours-of-neighbours, each 1-hop parent gets an angular wedge (hubs not expanded, capped)
  if(hop==2){const seen=new Set([center.id,...shown.map(n=>n.other)]),wedge=2*Math.PI/Math.max(1,shown.length),kids={};
    shown.forEach(nb=>{if(isHub(N[nb.other]))return;const arr=[];
      neighborsOf(nb.other).forEach(nn=>{if(seen.has(nn.other)||isHub(N[nn.other])||arr.length>=5)return;seen.add(nn.other);arr.push(nn);});
      if(arr.length)kids[nb.other]=arr;});
    const R2=230;Object.keys(kids).forEach(pid=>{const arr=kids[pid],pang=placed[pid].ang,P=placed[pid];
      arr.forEach((nn,k)=>{const t=arr.length==1?0:(k/(arr.length-1)-0.5),ang=pang+t*wedge*0.72;
        const x=cx+R2*Math.cos(ang),y=cy+R2*Math.sin(ang),o=N[nn.other];
        const A=nn.dir=="out"?{x:P.x,y:P.y}:{x,y},B=nn.dir=="out"?{x,y}:{x:P.x,y:P.y};link(A,B,nn.type,10,9,true);
        node(o,x,y,9);});});}
  svg.append(drawShape(tshape(center),cx,cy,17,tcolor(center),css("--ink")));
  const cl=svgEl("text",{x:cx,y:cy+34,"text-anchor":"middle",class:"ecenter"});cl.textContent=center.label.length>22?center.label.slice(0,21)+"…":center.label;svg.append(cl);
  if(neigh.length>shown.length){const t=svgEl("text",{x:cx,y:474,"text-anchor":"middle",class:"erel"});t.textContent=`+${neigh.length-shown.length} more neighbours`;svg.append(t);}
  return svg;}

/* ---------- pan / zoom ---------- */
let tx=0,ty=0,sc=1;
const vp=document.getElementById("viewport");
function apply(){CANVAS.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;}
// open framed on the top region (masthead + strategy map); the market-research bands are a pan/zoom down
function fit(){const vw=vp.clientWidth,vh=vp.clientHeight;const FH=Math.min(ADAPT_CH||CH,2160);sc=Math.min(vw/CW,vh/FH)*0.98;tx=(vw-CW*sc)/2;ty=12;apply();}
vp.addEventListener("wheel",e=>{e.preventDefault();const r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const ns=Math.min(3,Math.max(0.15,sc*(e.deltaY<0?1.12:0.89)));tx=mx-(mx-tx)*ns/sc;ty=my-(my-ty)*ns/sc;sc=ns;apply();},{passive:false});
let pan=null;
vp.addEventListener("mousedown",e=>{if(e.target.closest(".search,.pathbar,.ctrls,.backdrop"))return;pan={x:e.clientX-tx,y:e.clientY-ty};vp.classList.add("drag");});
addEventListener("mousemove",e=>{if(pan){tx=e.clientX-pan.x;ty=e.clientY-pan.y;apply();}});
addEventListener("mouseup",()=>{pan=null;vp.classList.remove("drag");});
document.getElementById("zin").onclick=()=>{sc=Math.min(3,sc*1.2);apply();};
document.getElementById("zout").onclick=()=>{sc=Math.max(0.15,sc/1.2);apply();};
document.getElementById("zfit").onclick=fit;
document.getElementById("theme").onclick=()=>{const r=document.documentElement,cur=r.getAttribute("data-theme")=="dark"?"light":"dark";r.setAttribute("data-theme",cur);rebuild();};
const search=document.getElementById("search");search.addEventListener("change",e=>{const q=e.target.value.trim().toLowerCase();const hit=G.nodes.find(n=>n.label.toLowerCase()==q)||G.nodes.find(n=>n.label.toLowerCase().includes(q));if(hit)openModal(hit.id);});
(function(){const d=document.getElementById("allnodes");G.nodes.filter(n=>["Drug","Company","MoAClass","Target","Biology"].includes(n.type)).forEach(n=>d.append(el("option",{value:n.label})));})();

/* ---------- network explorer (focused, force-directed) + path-finding ---------- */
let VIEW="poster";
const NETWRAP=document.getElementById("netwrap"), NET=document.getElementById("net"), netToggleBtn=document.getElementById("net-toggle");
let netNodes=[], netLinks=[], hlNodes=new Set(), netHover=null, netDrag=null, netPanS=null, netRAF=null, alpha=0;
let ntx=0,nty=0,nsc=1;
const REPULSE=9000, REST=96, SPRING=0.035, CENTER=0.02, DAMP=0.85, COOL=0.986;
const netKey=id=>netNodes.find(n=>n.id===id);
function addNetNode(id,x,y,seed){let n=netKey(id);if(n){if(seed)n.seed=true;return n;}
  const W=NET.clientWidth||900,H=NET.clientHeight||600;
  n={id,x:x!=null?x:W/2+(Math.random()*2-1)*70,y:y!=null?y:H/2+(Math.random()*2-1)*70,vx:0,vy:0,pinned:false,seed:!!seed};netNodes.push(n);return n;}
function addNetLink(s,t,type){if(s===t)return;if(netLinks.some(l=>(l.s===s&&l.t===t)||(l.s===t&&l.t===s)))return;netLinks.push({s,t,type,hl:false});}
function seedNetwork(id){netNodes=[];netLinks=[];hlNodes=new Set();ntx=0;nty=0;nsc=1;
  addNetNode(id,NET.clientWidth/2,NET.clientHeight/2,true);
  neighborsOf(id).forEach(nb=>{addNetNode(nb.other);addNetLink(id,nb.other,nb.type);});
  alpha=1;updateNetTitle();}
function expand(id){if(netNodes.length>=70){updateNetTitle("Display cap reached (70 nodes) — reseed or trace a path to refocus.");return;}
  const src=netKey(id);
  neighborsOf(id).forEach(nb=>{addNetNode(nb.other,src&&src.x+(Math.random()*2-1)*55,src&&src.y+(Math.random()*2-1)*55);addNetLink(id,nb.other,nb.type);});
  alpha=Math.max(alpha,0.7);updateNetTitle();}
function seedPath(ids,rels){netNodes=[];netLinks=[];hlNodes=new Set(ids);ntx=0;nty=0;nsc=1;
  const W=NET.clientWidth||900,H=NET.clientHeight||600,n=ids.length,step=Math.min(210,(W-170)/Math.max(1,n-1));
  ids.forEach((id,i)=>{const nd=addNetNode(id,85+i*step,H/2+(i%2?28:-28),i===0||i===n-1);nd.pinned=true;});
  for(let i=0;i<n-1;i++)netLinks.push({s:ids[i],t:ids[i+1],type:rels[i]||"",hl:true});
  alpha=0.4;updateNetTitle(`Traced path — ${n} nodes, ${n-1} links. Click a node to branch out from the chain.`);}
function simStep(){const W=NET.clientWidth||900,H=NET.clientHeight||600,ccx=W/2,ccy=H/2;
  for(let i=0;i<netNodes.length;i++)for(let j=i+1;j<netNodes.length;j++){const a=netNodes[i],b=netNodes[j];
    let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;if(d2<100)d2=100;const d=Math.sqrt(d2),f=REPULSE/d2,fx=dx/d*f,fy=dy/d*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
  netLinks.forEach(l=>{const a=netKey(l.s),b=netKey(l.t);if(!a||!b)return;let dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1,f=(d-REST)*SPRING,fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;});
  netNodes.forEach(n=>{n.vx+=(ccx-n.x)*CENTER;n.vy+=(ccy-n.y)*CENTER;if(n.pinned){n.vx=0;n.vy=0;return;}
    n.vx=Math.max(-45,Math.min(45,n.vx*DAMP));n.vy=Math.max(-45,Math.min(45,n.vy*DAMP));n.x+=n.vx*alpha;n.y+=n.vy*alpha;});}
function renderNet(){NET.innerHTML="";
  const defs=svgEl("defs");defs.innerHTML=`<marker id="nah" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="${css('--muted')}"/></marker>`;NET.append(defs);
  const root=svgEl("g",{transform:`translate(${ntx},${nty}) scale(${nsc})`});NET.append(root);
  netLinks.forEach(l=>{const a=netKey(l.s),b=netKey(l.t);if(!a||!b)return;
    const p=svgEl("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,class:"netedge"+(l.hl?" hl":"")});if(!l.hl)p.setAttribute("marker-end","url(#nah)");root.append(p);
    if(l.hl||netHover===l.s||netHover===l.t){const t=svgEl("text",{x:(a.x+b.x)/2,y:(a.y+b.y)/2-3,"text-anchor":"middle",class:"neterel"+(l.hl?" hl":"")});t.textContent=REL[l.type]||(l.type||"").toLowerCase();root.append(t);}});
  netNodes.forEach(n=>{const nd=N[n.id],r=n.seed?15:12,shp=drawShape(tshape(nd),n.x,n.y,r,tcolor(nd),css("--paper"));
    if(hlNodes.has(n.id)){shp.setAttribute("stroke",css("--accent"));shp.setAttribute("stroke-width","2.6");}
    else if(netHover===n.id){shp.setAttribute("stroke",css("--ink"));shp.setAttribute("stroke-width","2");}
    root.append(shp);
    const t=svgEl("text",{x:n.x,y:n.y+r+13,"text-anchor":"middle",class:"netlabel"});t.textContent=nd.label.length>22?nd.label.slice(0,21)+"…":nd.label;root.append(t);});}
function simLoop(){if(VIEW!=="network"){netRAF=null;return;}if(alpha>0.02){simStep();alpha*=COOL;}renderNet();netRAF=requestAnimationFrame(simLoop);}
function startSim(){if(!netRAF)netRAF=requestAnimationFrame(simLoop);}
function netPoint(e){const r=NET.getBoundingClientRect();return{x:(e.clientX-r.left-ntx)/nsc,y:(e.clientY-r.top-nty)/nsc};}
function nearestNode(p){let best=20*20,hit=null;netNodes.forEach(n=>{const dx=n.x-p.x,dy=n.y-p.y,d2=dx*dx+dy*dy;if(d2<best){best=d2;hit=n;}});return hit;}
NET.addEventListener("mousedown",e=>{const p=netPoint(e),hit=nearestNode(p);if(hit)netDrag={n:hit,moved:false};else netPanS={x:e.clientX-ntx,y:e.clientY-nty};NET.classList.add("drag");});
NET.addEventListener("mousemove",e=>{const p=netPoint(e);
  if(netDrag){netDrag.n.x=p.x;netDrag.n.y=p.y;netDrag.n.pinned=true;netDrag.moved=true;alpha=Math.max(alpha,0.3);}
  else if(netPanS){ntx=e.clientX-netPanS.x;nty=e.clientY-netPanS.y;}
  else{const h=nearestNode(p);netHover=h?h.id:null;}});
addEventListener("mouseup",()=>{if(netDrag){if(!netDrag.moved)expand(netDrag.n.id);netDrag=null;NET.classList.remove("drag");}if(netPanS){netPanS=null;NET.classList.remove("drag");}});
NET.addEventListener("dblclick",e=>{const hit=nearestNode(netPoint(e));if(hit)openModal(hit.id);});
NET.addEventListener("wheel",e=>{e.preventDefault();const r=NET.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,ns=Math.min(2.5,Math.max(0.3,nsc*(e.deltaY<0?1.12:0.89)));ntx=mx-(mx-ntx)*ns/nsc;nty=my-(my-nty)*ns/nsc;nsc=ns;},{passive:false});
function updateNetTitle(msg){const p=document.querySelector("#nettitle p");if(!p)return;
  p.textContent=msg||`${netNodes.length} nodes · ${netLinks.length} links. Click a node to expand · double-click for its card · drag to move · scroll to zoom.`;}
function setView(v,seed){VIEW=v;const on=v==="network";
  NETWRAP.classList.toggle("on",on);netToggleBtn.classList.toggle("on",on);
  document.getElementById("nettitle").style.display=on?"block":"none";
  document.getElementById("hintbar").style.display=on?"none":"block";
  if(on){if(seed)seedNetwork(seed);else if(!netNodes.length)seedNetwork((MOA.il23||G.nodes.find(n=>n.type==="Drug")).id);startSim();}
  else document.getElementById("ribbon").classList.remove("on");}
netToggleBtn.onclick=()=>setView(VIEW==="network"?"poster":"network");
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&!backdrop.classList.contains("on")&&VIEW==="network")setView("poster");});
// undirected adjacency + BFS shortest path (hubs excluded as intermediates)
const ADJ={};G.edges.forEach(e=>{(ADJ[e.source]=ADJ[e.source]||[]).push({o:e.target,type:e.type});(ADJ[e.target]=ADJ[e.target]||[]).push({o:e.source,type:e.type});});
function findPath(a,b){if(a===b)return{ids:[a],rels:[]};const ban=id=>id!==b&&isHub(N[id]);
  const prev={},prevE={},seen=new Set([a]),q=[a];
  while(q.length){const u=q.shift();for(const{o,type}of(ADJ[u]||[])){if(seen.has(o)||ban(o))continue;seen.add(o);prev[o]=u;prevE[o]=type;if(o===b){q.length=0;break;}q.push(o);}}
  if(!seen.has(b))return null;
  const ids=[],rels=[];let cur=b;while(cur!==undefined&&cur!==a){ids.unshift(cur);rels.unshift(prevE[cur]);cur=prev[cur];}
  if(cur!==a)return null;ids.unshift(a);return{ids,rels};}
const LBL2ID={};G.nodes.forEach(n=>{const k=n.label.toLowerCase();if(!(k in LBL2ID))LBL2ID[k]=n.id;});
function resolveLabel(v){v=(v||"").trim().toLowerCase();if(!v)return null;if(LBL2ID[v])return LBL2ID[v];const h=G.nodes.find(n=>n.label.toLowerCase().includes(v));return h?h.id:null;}
function ribbonHTML(ids,rels){return ids.map((id,i)=>`<b>${esc(N[id].label)}</b>${i<ids.length-1?` <span class="rel">—${esc(REL[rels[i]]||rels[i]||"")}→</span> `:""}`).join("");}
function tracePath(){const rib=document.getElementById("ribbon");
  const a=resolveLabel(document.getElementById("pin1").value),b=resolveLabel(document.getElementById("pin2").value);
  if(!a||!b){rib.className="pathribbon on";rib.innerHTML="Enter two entities — a drug, target, cell, cytokine or mechanism — to trace how they connect.";return;}
  const res=findPath(a,b);setView("network");
  if(!res){seedNetwork(a);rib.className="pathribbon on";rib.innerHTML=`No path between <b>${esc(N[a].label)}</b> and <b>${esc(N[b].label)}</b> that doesn't route through the shared indication.`;return;}
  seedPath(res.ids,res.rels);rib.className="pathribbon on";rib.innerHTML=ribbonHTML(res.ids,res.rels);}
document.getElementById("ptrace").onclick=tracePath;
document.getElementById("pin2").addEventListener("keydown",e=>{if(e.key==="Enter")tracePath();});

// ---- content-adaptive vertical flow: close dead space under a short hero + size canvas to content ----
// The upper region (masthead, side panels, strategy tree, mechanism/schematic) has a data-dependent
// bottom; the bottom bands are authored at fixed y (assuming a tall psoriasis hero). Measure the real
// upper bottom and shift the whole bottom section up (or down) to sit just beneath it, then size CH.
function layoutAdapt(){
  const B0=2070;                                   // authored y of the first bottom band ("Standard of care")
  const upper=[...CANVAS.querySelectorAll(".panel,.clusterlabel,.maphead,.node,.mast")]
              .filter(n=>n.offsetTop<B0-120).map(n=>n.offsetTop+n.offsetHeight);
  const upperBottom=Math.max(TREE_BOTTOM, ...(upper.length?upper:[1600]));
  const dY=Math.round((upperBottom+60)-B0);
  if(Math.abs(dY)>6){
    [...CANVAS.querySelectorAll(".panel,.clusterlabel,.secband")]
      .filter(n=>n.offsetTop>=B0-120).forEach(n=>{n.style.top=(n.offsetTop+dY)+"px";});
  }
  const all=[...CANVAS.querySelectorAll(".panel,.clusterlabel,.secband,.node")].map(n=>n.offsetTop+n.offsetHeight);
  ADAPT_CH=Math.round(Math.max(TREE_BOTTOM,...all)+70);
  CANVAS.style.height=ADAPT_CH+"px"; WIRES.setAttribute("height",ADAPT_CH);
}
function rebuild(){[...CANVAS.querySelectorAll(".block,.panel,.mast,.node,.bandlabel,.hnode")].forEach(n=>n.remove());WIRES.innerHTML="";buildHierarchy();buildSchematic();buildPanels();layoutAdapt();}
rebuild(); fit();
</script></body></html>
