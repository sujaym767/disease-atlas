<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plaque psoriasis — Atlas</title>
<style>
:root{
  --paper:#f2ecdd; --block:#fbf8f0; --panel:#f8f4e9; --ink:#231f18; --ink2:#5c564a; --muted:#8a8272; --rule:#cfc6b0; --rule2:#b9ad90;
  --s1:#2a78d6; --s2:#c25a1c; --s3:#1b8f68; --s4:#c98a12; --s5:#b0517f; --s6:#3f7a2e; --s7:#4a3aa7; --s8:#c0403f; --sN:#9a8f77;
  --accent:#8a2b1f; --kera:#e5c98f; --cell:#cdd8e6; --bio:#9c6b34;
  --sans:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif; --cond:"Arial Narrow",Arial,var(--sans); --mono:ui-monospace,Menlo,Consolas,monospace;
  --shadowmodal:0 24px 70px rgba(40,30,15,.45);
  --shadow:0 1px 2px rgba(70,52,20,.09), 0 6px 20px rgba(70,52,20,.07);
  --shadowsm:0 1px 3px rgba(70,52,20,.14);
  --gloss:linear-gradient(180deg, color-mix(in srgb,var(--panel) 40%,#fff) 0%, var(--panel) 62%);
}
:root[data-theme="dark"]{
  --paper:#15130f; --block:#201c16; --panel:#1c1913; --ink:#efe9db; --ink2:#c3bbab; --muted:#8a8272; --rule:#332e26; --rule2:#453d30;
  --s1:#4f92e6; --s2:#e07a3f; --s3:#31a97e; --s4:#d7a02f; --s5:#d071a0; --s6:#5aa246; --s7:#9085e9; --s8:#e06463; --sN:#9a8f77; --accent:#e0885f; --kera:#6b5a34; --cell:#2f3a49; --bio:#c99a5f;
  --shadow:0 1px 2px rgba(0,0,0,.30), 0 6px 20px rgba(0,0,0,.28);
  --shadowsm:0 1px 3px rgba(0,0,0,.4);
  --gloss:linear-gradient(180deg, color-mix(in srgb,var(--panel) 78%,#fff) 0%, var(--panel) 60%);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:12px}
button{font-family:inherit;cursor:pointer}
.tab{font-variant-numeric:tabular-nums}
#viewport{position:fixed;inset:0;overflow:hidden;cursor:grab;background:
  radial-gradient(circle at 30% 20%, color-mix(in srgb,var(--paper) 88%,#fff) 0%, var(--paper) 60%)}
#viewport.drag{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
#wires{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.node{position:absolute;cursor:pointer}
/* mechanism block */
.block{position:absolute;width:300px;background:var(--block);border:1px solid var(--rule2);border-left:4px solid var(--fam);box-shadow:var(--shadow);border-radius:2px}
.bhead{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:5px 8px;background:linear-gradient(180deg,color-mix(in srgb,var(--fam) 20%,var(--block)),color-mix(in srgb,var(--fam) 9%,var(--block)));border-bottom:1px solid var(--rule)}
.bhead .bn{font-weight:700;font-size:12px;line-height:1.05;color:var(--ink)}
.bhead .bc{font-size:9px;color:var(--muted);white-space:nowrap}
.bdesc{font-size:9.5px;color:var(--ink2);padding:3px 8px;border-bottom:1px solid var(--rule);font-style:italic}
.drow{display:grid;grid-template-columns:20px 1fr;gap:5px;padding:2px 8px;border-bottom:1px dotted var(--rule);cursor:pointer}
.drow:last-child{border-bottom:0}
.drow:hover{background:color-mix(in srgb,var(--fam) 10%,var(--block))}
.stage{font-family:var(--mono);font-size:9px;font-weight:700;text-align:center;color:var(--st,var(--muted));padding-top:1px}
.dn{font-weight:650;font-size:11px;line-height:1.08}
.dm{font-size:9px;color:var(--ink2);line-height:1.12}
.dm b{color:var(--ink);font-weight:600}
.mk{font-size:8px;font-weight:800;padding:0 2px;border-radius:2px;margin-left:2px;vertical-align:1px}
.mk.bio{color:#fff;background:var(--s1)}.mk.combo{color:#fff;background:var(--s3)}.mk.warn{color:var(--s8)}
.disc .dn{text-decoration:line-through;color:var(--muted)}
/* panels */
.panel{position:absolute;background:var(--gloss);border:1px solid var(--rule2);box-shadow:var(--shadow);border-radius:3px}
.panel h4{margin:0;display:flex;align-items:center;gap:6px;font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:12.5px;color:var(--accent);padding:5px 9px;border-bottom:1px solid var(--rule);background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 8%,transparent),transparent)}
.panel h4::before{content:"";width:4px;height:12px;background:var(--accent);border-radius:1px;flex:none;box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 30%,transparent)}
.panel .pc{padding:7px 9px}
.mast{position:absolute}
.mast .t{font-family:var(--cond);font-weight:700;font-size:42px;line-height:.86;text-transform:uppercase;letter-spacing:-.015em;color:var(--ink);text-shadow:0 1px 0 color-mix(in srgb,var(--paper) 60%,#fff)}
.mast .t small{display:block;font-family:var(--sans);font-size:9.5px;font-weight:700;letter-spacing:.2em;color:var(--accent);margin-top:6px;padding-bottom:7px;border-bottom:2px solid var(--accent);width:max-content;max-width:100%}
.mast .o{font-size:11.5px;line-height:1.4;color:var(--ink2);max-width:540px;margin-top:9px}
.mast .kb{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
.mast .k{border:1px solid var(--rule2);background:var(--gloss);box-shadow:var(--shadowsm);padding:5px 11px 4px;border-radius:3px;border-top:2px solid var(--accent)}
.mast .k b{font-family:var(--cond);font-size:21px;font-weight:700;color:var(--ink);display:block;line-height:1}.mast .k span{font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-top:2px}
.burden .st{display:grid;grid-template-columns:56px 1fr;gap:4px 9px;font-size:10px;align-items:baseline}
.burden .st b{font-family:var(--cond);font-size:15px;text-align:right;color:var(--accent)}
.burden .st span{color:var(--ink2)}
.burden .note{font-size:9.5px;color:var(--ink2);margin-top:5px}
.mkt .big{font-family:var(--cond);font-size:30px;font-weight:700}
.mkt .r{display:flex;justify-content:space-between;font-size:10px;color:var(--ink2);margin-top:2px}
.bench .row{display:grid;grid-template-columns:74px 1fr 20px;gap:5px;align-items:center;font-size:9.5px;margin:1.5px 0;cursor:pointer}
.bench .lab{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink2)}
.bench .tr{height:8px;background:var(--paper);border:1px solid var(--rule)}.bench .fi{height:100%}.bench .vv{text-align:right;color:var(--muted);font-weight:700}
.sites table{border-collapse:collapse;font-size:9.5px;width:100%}
.sites td{border-bottom:1px dotted var(--rule);padding:2px 4px;vertical-align:top}
.sites td:first-child{font-weight:700;white-space:nowrap}.sites td:nth-child(2){color:var(--accent);white-space:nowrap;font-weight:600}
.cats .row{display:grid;grid-template-columns:42px 1fr;gap:5px;font-size:9.5px;margin:2px 0;cursor:pointer}
.cats .d{font-weight:700;color:var(--accent);font-size:9px}.cats .k{font-size:7px;text-transform:uppercase;color:var(--muted)}
.deals .row{font-size:9.5px;margin:3px 0;cursor:pointer;border-bottom:1px dotted var(--rule);padding-bottom:2px}
.deals b{font-weight:700}.deals .v{color:var(--accent);font-weight:700}
.legend{font-size:9.5px;color:var(--ink2)}.legend code{font-family:var(--mono);font-weight:700;background:var(--paper);border:1px solid var(--rule);padding:0 3px}
.legend .lr{margin:3px 0}.legend .fam{display:inline-flex;align-items:center;gap:3px;margin:1px 6px 1px 0}.legend .fam i{width:8px;height:8px;display:inline-block;border-radius:2px}
/* band label */
.bandlabel{position:absolute;font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--rule2);font-size:13px}
/* ---- objective mind-map (RA-Capital-style decision tree) ---- */
.hnode{position:absolute;transform:translateY(-50%);border-radius:6px}
.hobj{color:#fff;padding:9px 12px;box-shadow:var(--shadow);border-radius:7px}
.hobj .ht{font-family:var(--cond);font-weight:700;font-size:17px;line-height:1.0;text-transform:uppercase;letter-spacing:.005em}
.hobj .hd{font-size:9px;line-height:1.3;margin-top:5px;opacity:.93}
.hstrat{color:#fff;padding:6px 10px;box-shadow:var(--shadowsm)}
.hstrat .ht{font-family:var(--cond);font-weight:700;font-size:13.5px;line-height:1.06}
.hstrat .hd{font-size:8px;line-height:1.24;margin-top:2px;opacity:.9}
.happr{padding:5px 9px;box-shadow:var(--shadowsm);border:1px solid var(--hc)}
.happr .ht{font-weight:700;font-size:10.5px;line-height:1.12;color:var(--ink)}
.happr .hd{font-size:8px;color:var(--ink2);margin-top:2px;line-height:1.22}
.hmech{border:1px solid var(--hc);box-shadow:var(--shadowsm);background:var(--block);border-radius:6px;overflow:hidden}
.hmech .mh{font-weight:700;font-size:9.5px;padding:3px 8px;color:var(--ink);background:color-mix(in srgb,var(--hc) 30%,var(--block));border-bottom:1px solid var(--hc)}
.hmech .md{font-size:7.5px;color:var(--ink2);padding:3px 8px 2px;line-height:1.22;font-style:italic}
.hasset{display:grid;grid-template-columns:15px 1fr;gap:6px;padding:2px 8px;font-size:9px;cursor:pointer;align-items:baseline;border-top:1px dotted var(--rule)}
.hasset:hover{background:color-mix(in srgb,var(--hc) 14%,transparent)}
.hasset .hs{font-family:var(--mono);font-weight:700;font-size:8px;text-align:center;color:var(--st,var(--muted))}
.hasset .han{font-weight:650;color:var(--ink)}.hasset.disc .han{text-decoration:line-through;color:var(--muted)}
.hasset .hac{color:var(--muted);font-size:7.5px}
.hasset .mk{font-size:7px}
.hwire{fill:none;stroke-linecap:round}
/* standard-of-care ladder */
.soc{display:flex;align-items:stretch}
.soc .step{flex:1;position:relative;padding:8px 11px 9px 18px;border-left:1px solid var(--rule);min-width:0}
.soc .step:first-child{border-left:0}
.soc .step::before{content:"";position:absolute;left:6px;top:8px;bottom:8px;width:5px;border-radius:3px;background:var(--sc);box-shadow:0 0 7px color-mix(in srgb,var(--sc) 55%,transparent)}
.soc .step .tier{font-family:var(--cond);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.soc .step .nm{font-family:var(--cond);font-size:18px;font-weight:700;color:var(--sc);line-height:1;margin:2px 0 4px}
.soc .step .ag{font-size:9.5px;color:var(--ink);font-weight:600;line-height:1.3}
.soc .step .nt{font-size:9px;color:var(--ink2);line-height:1.32;margin-top:5px}
.socbar{height:6px;display:flex;margin:2px 0 9px;border-radius:3px;overflow:hidden;box-shadow:var(--shadowsm)}.socbar i{flex:1}
.socnote{font-size:9px;color:var(--muted);margin-top:8px;font-style:italic}
/* trials timeline */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px 18px}
.trow{display:grid;grid-template-columns:38px 1fr;gap:8px;font-size:9.5px;cursor:pointer;padding:4px 5px;border-bottom:1px dotted var(--rule);align-items:baseline}
.trow:hover{background:color-mix(in srgb,var(--tc) 10%,transparent)}
.trow .yr{font-family:var(--cond);font-weight:700;font-size:13px;color:var(--tc);text-align:right;position:relative}
.trow .tn{font-weight:700;color:var(--ink)}.trow .tn i{font-weight:600;font-style:normal;color:var(--tc)}
.trow .tr{color:var(--ink2);line-height:1.28;margin-top:1px}
/* glossary */
.gloss2{columns:5;column-gap:18px;font-size:9.5px}
@media (max-width:1px){.gloss2{columns:2}}
.gloss2 .g{break-inside:avoid;margin:0 0 6px;line-height:1.28}
.gloss2 .g b{color:var(--accent);font-weight:700}
.gloss2 .g span{color:var(--ink2)}
/* comorbidity + market share */
.comorb{display:grid;grid-template-columns:1fr auto;gap:2px 10px;font-size:9.5px;margin-top:4px}
.comorb b{color:var(--accent);font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.comorb span{color:var(--ink2)}
.mshare .row{display:grid;grid-template-columns:11px 1fr auto;gap:7px;align-items:center;font-size:9.5px;margin:3px 0}
.mshare .row i{width:10px;height:10px;border-radius:2px;box-shadow:0 0 5px color-mix(in srgb,var(--mc) 50%,transparent)}
.mshare .row .cl{font-weight:600;color:var(--ink)}
.mshare .row .tr{color:var(--ink2);font-style:italic;text-align:right;white-space:nowrap}
/* SoC stage table */
.soctab{display:grid;grid-template-columns:118px repeat(3,1fr);font-size:9px;border:1px solid var(--rule);border-radius:4px;overflow:hidden}
.soctab .hd{font-family:var(--cond);font-weight:700;font-size:11px;color:#fff;padding:4px 8px;text-transform:uppercase;line-height:1}
.soctab .hd span{font-weight:400;font-size:7.5px;opacity:.9;text-transform:none}
.soctab .rl{font-weight:700;color:var(--ink);padding:4px 8px;border-top:1px solid var(--rule);display:flex;align-items:center;font-size:9px}
.soctab .cell{border-top:1px solid var(--rule);border-left:1px solid var(--rule);min-height:19px;display:flex;align-items:center}
.soctab .pres{font-size:8px;color:var(--ink2);padding:3px 7px;line-height:1.2;align-items:flex-start}
.soctab .pill{height:100%;min-height:17px;width:100%;display:flex;align-items:center;padding:0 8px;color:#fff;font-weight:700;font-size:8.5px}
.socnote{font-size:9px;color:var(--muted);margin-top:7px;font-style:italic}
/* sales donut — bigger pie, drug + company mapping */
.donut{display:flex;gap:14px;align-items:center}
.donut svg{flex:none}
.donut .lg{flex:1;min-width:0}
.donut .lg .row{display:grid;grid-template-columns:11px 1fr auto;gap:8px;align-items:center;padding:2px 0;cursor:pointer;border-bottom:1px dotted var(--rule)}
.donut .lg .row:last-child{border-bottom:0}
.donut .lg .row:hover{background:color-mix(in srgb,var(--accent) 6%,transparent)}
.donut .lg i{width:11px;height:11px;border-radius:2px}
.donut .lg .nm{font-weight:700;color:var(--ink);font-size:9.5px;line-height:1.02;display:block}
.donut .lg .co{font-size:7.5px;color:var(--muted);display:block}
.donut .lg .vsh{text-align:right;white-space:nowrap}
.donut .lg .vsh b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums;font-size:9.5px}
.donut .lg .vsh .sh{font-size:7.5px;color:var(--muted);display:block}
/* PASI response-kinetics chart */
.pasi svg{width:100%;display:block}
.pasi .lg{display:flex;flex-wrap:wrap;gap:3px 12px;font-size:8.5px;margin-top:5px}
.pasi .lg span{display:inline-flex;align-items:center;gap:4px;color:var(--ink2)}
.pasi .lg i{width:11px;height:3px;display:inline-block;border-radius:2px}
.pasi .lg b{color:var(--ink)}
/* dev matrix */
.devmx{border-collapse:collapse;width:100%;font-size:8.5px}
.devmx th{font-family:var(--cond);font-weight:700;font-size:9px;color:var(--ink2);padding:3px 2px;text-align:center;vertical-align:bottom;line-height:1}
.devmx th.co{text-align:left;padding-left:4px}
.devmx td{border:1px solid var(--rule);text-align:center;padding:2px 0}
.devmx td.co{text-align:left;font-weight:600;color:var(--ink);padding:2px 5px;white-space:nowrap;border-left:0}
.devmx .cc{display:inline-block;min-width:16px;padding:0 2px;border-radius:2px;color:#fff;font-family:var(--mono);font-weight:700;font-size:8px}
.devmx tr:hover td{background:color-mix(in srgb,var(--accent) 5%,transparent)}
/* map heading + cluster labels */
.maphead{position:absolute;text-align:center;transform:translateX(-50%)}
.maphead .h1{font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:24px;color:var(--ink);line-height:1}
.maphead .h2{font-size:12px;color:var(--accent);letter-spacing:.02em;margin-top:4px;font-weight:600}
.maphead .h2 b{color:var(--ink2)}
.clusterlabel{position:absolute;font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.11em;font-size:13px;color:var(--accent);border-bottom:2px solid color-mix(in srgb,var(--accent) 45%,var(--rule2));padding-bottom:3px}
.clusterlabel span{color:var(--muted);font-weight:600;letter-spacing:.04em;font-size:9px;text-transform:none}
/* SoC improvements */
.soctab .rl small{display:block;font-weight:400;color:var(--muted);font-size:7.5px}
.soctab .pct{font-family:var(--cond);font-weight:700;font-size:13px;color:var(--ink);padding:2px 8px;display:flex;align-items:center;justify-content:center}
.soctab .pill .ln{background:rgba(255,255,255,.35);border-radius:3px;padding:0 3px;margin-right:5px;font-size:7.5px}
.soctab .goal{font-size:7.5px;color:var(--ink2);padding:3px 7px;line-height:1.2;align-items:flex-start}
/* trial timeline */
.tmline{position:relative}
.tmyear{position:absolute;transform:translateX(-50%);font-family:var(--cond);font-weight:700;font-size:11px;color:var(--ink2)}
.tmev{position:absolute;transform:translateX(-50%);cursor:pointer;width:158px}
.tmev .dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--panel);margin:0 auto;box-shadow:var(--shadowsm);position:relative;z-index:2}
.tmev .stem{width:1.5px;margin:0 auto}
.tmev .card{font-size:8px;text-align:center;line-height:1.18}
.tmev .card .tn{font-weight:700;color:var(--ink)}
.tmev .card .ta{color:var(--tc);font-weight:700}
.tmev .card .tr{color:var(--ink2);margin-top:1px}
.tmev:hover .dot{transform:scale(1.25)}
/* compact date timeline (catalysts / cliffs) */
.mtl{position:relative}
.mtl .yr{position:absolute;transform:translateX(-50%);font-family:var(--cond);font-weight:700;font-size:10.5px;color:var(--muted)}
.mtl .ev{position:absolute;transform:translateX(-50%);width:130px;cursor:pointer}
.mtl .ev .d{font-family:var(--cond);font-weight:700;font-size:12px;color:var(--tc)}
.mtl .ev .l{font-size:9px;color:var(--ink);line-height:1.18;font-weight:600}
.mtl .ev:hover .l{color:var(--tc)}
.mtl .dot{position:absolute;width:9px;height:9px;border-radius:50%;border:2px solid var(--panel);z-index:2;box-shadow:var(--shadowsm)}
/* richer deal flow */
.deals .dl{border-bottom:1px dotted var(--rule);padding:5px 0;cursor:pointer}
.deals .dl:last-child{border-bottom:0}.deals .dl:hover{background:color-mix(in srgb,var(--accent) 5%,transparent)}
.deals .dh{font-size:9.5px}.deals .dh b{font-weight:700}
.deals .dm{font-size:8.5px;color:var(--ink2);margin-top:1px}.deals .dm .v{color:var(--accent);font-weight:700}
.dtag{display:inline-block;font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;padding:1px 4px;border-radius:3px;margin-right:4px;vertical-align:1px;color:#fff}
.dtag.mna{background:var(--s8)}.dtag.lic{background:var(--s1)}.dtag.part{background:var(--s3)}
.dstage{font-size:7.5px;color:var(--muted);border:1px solid var(--rule2);border-radius:3px;padding:0 4px;margin-left:4px;white-space:nowrap}
/* trials in focus */
.tfocus .row{display:grid;grid-template-columns:1fr auto;gap:8px;padding:4px 5px;border-bottom:1px dotted var(--rule);cursor:pointer;align-items:center}
.tfocus .row:last-of-type{border-bottom:0}.tfocus .row:hover{background:color-mix(in srgb,var(--tc) 11%,transparent)}
.tfocus .nm{font-weight:700;color:var(--ink);font-size:10px;line-height:1.05}.tfocus .sp{font-size:8px;color:var(--muted);margin-top:1px}
.tfocus .ph{font-family:var(--cond);font-weight:700;font-size:11px;color:var(--tc);white-space:nowrap;text-align:right}
.tfocus .ph small{display:block;font-family:var(--sans);font-weight:600;font-size:7px;color:var(--muted);text-transform:uppercase}
/* trial detail modal */
.trialbody{overflow:auto;padding:15px 20px}
.trialbody h3{margin:13px 0 4px;font-family:var(--cond);text-transform:uppercase;font-size:12px;color:var(--mc,var(--accent));letter-spacing:.05em}
.trialbody .lead{font-size:13.5px;color:var(--ink);line-height:1.4;font-weight:600}
.trialbody ul{margin:3px 0;padding-left:18px;font-size:12.5px;color:var(--ink2)}.trialbody li{margin:2px 0}
.trialbody .rd{font-size:12.5px;color:var(--ink2);line-height:1.4}
.trialgrid{display:grid;grid-template-columns:130px 1fr;gap:5px 14px;font-size:12px;margin-top:3px}
.trialgrid b{color:var(--ink);font-weight:600}.trialgrid span{color:var(--ink2)}

.modal{background:var(--paper);border:1px solid var(--rule2);border-top:4px solid var(--mc,var(--accent));width:min(1000px,96vw);height:min(660px,92vh);box-shadow:var(--shadowmodal);display:grid;grid-template-rows:auto 1fr;overflow:hidden}

.kpis{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}.kpis .k{border:1px solid var(--rule2);background:var(--block);padding:5px 9px}.kpis .k b{font-family:var(--cond);font-size:17px;font-weight:700}.kpis .k span{display:block;font-size:8.5px;text-transform:uppercase;color:var(--muted)}
.desc{font-size:12.5px;color:var(--ink2);margin:6px 0}.desc b{color:var(--ink)}
.safety{font-size:11.5px;border:1px solid var(--rule2);border-left:3px solid var(--s4);background:color-mix(in srgb,var(--s4) 7%,var(--block));padding:7px 9px;margin:8px 0}
.srcs{font-size:10.5px;color:var(--muted);margin-top:10px}.srcs a{color:var(--s1);text-decoration:none}
.mgraph{position:relative;min-width:0}.mgraph svg{width:100%;height:100%}
.mgraph .glegend{position:absolute;bottom:8px;left:10px;right:10px;display:flex;flex-wrap:wrap;gap:4px 12px;font-size:9.5px;color:var(--muted);background:color-mix(in srgb,var(--paper) 80%,transparent);padding:4px 6px}
.elabel{font-size:10px;fill:var(--ink);paint-order:stroke;stroke:var(--paper);stroke-width:3px}
.ecenter{font-family:var(--cond);font-weight:700;font-size:12px;fill:var(--ink);paint-order:stroke;stroke:var(--paper);stroke-width:3.5px}
.erel{font-size:8.5px;fill:var(--muted);paint-order:stroke;stroke:var(--paper);stroke-width:2.6px}
/* modal graph tools (1-hop/2-hop + explore) */
.gtools{position:absolute;top:8px;right:10px;z-index:2;display:flex;gap:5px}

.gtools .gt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.gholder{position:absolute;inset:0}
.ctrls button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
/* path-finding bar */
.pathbar{position:fixed;left:50%;transform:translateX(-50%);top:46px;z-index:30;display:flex;gap:5px;align-items:center;background:var(--panel);border:1px solid var(--rule2);padding:4px 6px;font-size:10px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.pathbar input{font-family:inherit;font-size:11px;border:1px solid var(--rule);background:var(--paper);color:var(--ink);padding:3px 5px;width:118px}
.pathbar button{border:1px solid var(--rule2);background:var(--block);color:var(--ink);padding:3px 9px;border-radius:3px;font-size:10px;font-weight:600}

#netwrap{position:fixed;inset:0;z-index:20;display:none;background:
  radial-gradient(circle at 50% 42%, color-mix(in srgb,var(--paper) 92%,#fff) 0%, var(--paper) 65%)}

.netedge.hl{stroke:var(--accent);stroke-width:3}

.netlabel{font-size:11px;fill:var(--ink);paint-order:stroke;stroke:var(--paper);stroke-width:3.4px;cursor:pointer}

.nettitle h3{margin:0;font-family:var(--cond);text-transform:uppercase;letter-spacing:.03em;font-size:15px;color:var(--accent)}
.nettitle p{margin:4px 0 0;font-size:10.5px;color:var(--ink2);line-height:1.3}

.scchip{font-family:var(--cond);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;padding:2px 9px;border:1px solid var(--rule2);border-radius:11px;background:var(--block);color:var(--ink2);cursor:pointer}

.scen .card .nm{font-family:var(--cond);font-weight:700;text-transform:uppercase;font-size:14px;color:var(--sc);letter-spacing:.02em}
.scen .card .bg{font-family:var(--cond);font-weight:700;font-size:20px;color:var(--ink);margin-left:auto;font-variant-numeric:tabular-nums}
.scen .card .cg{font-size:9.5px;color:var(--ink2);font-variant-numeric:tabular-nums}
.scen .card .sw{font-size:8.7px;color:var(--ink2);line-height:1.32;margin-top:3px}

.geo th:first-child{text-align:left}

.comp{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:7px}
.comp .card{border:1px solid var(--rule2);border-top:3px solid var(--cc);border-radius:3px;padding:6px 9px;background:var(--block);cursor:pointer}

.comp .card .pos{font-size:8.5px;color:var(--cc);font-weight:700;margin-left:auto;text-align:right;max-width:56%;line-height:1.1}

ams/solutions; a common driver of systemic step-up."},{"site":"Nails","prev":"~50% (lifetime)","note":"Slow to respond; often needs systemic therapy; predicts psoriatic arthritis."},{"site":"Palmoplantar","prev":"~12–16%","note":"Painful, disabling, frequently refractory to standard therapy."},{"site":"Genital / inverse","prev":"~30–60% (genital ever)","note":"Major QoL impact; sensitive-site tolerability; historically understudied."},{"site":"Pediatric","prev":"~1% of children","note":"Growing label set (etanercept, ustekinumab, ixekizumab, secukinumab, apremilast, icotrokinra ≥12)."}],"deals":[{"acquirer":"Bristol Myers Squibb","counterparty":"Celgene","asset":"deucravacitinib","value":"$74B","date":"2019-11","year":2019,"category":"M&A","stage":"Clinical","note":"Deucravacitinib (oral TYK2, then BMS-986165) entered BMS via the $74B Celgene acquisition."},{"acquirer":"Amgen","counterparty":"Celgene / BMS","asset":"apremilast","value":"$13.4B","date":"2019-11","year":2019,"category":"M&A","stage":"Marketed","note":"Otezla (PDE4) was divested for antitrust clearance during the BMS–Celgene merger."},{"acquirer":"Takeda","counterparty":"Nimbus Therapeutics","asset":"zasocitinib","value":"$4.0B upfront +$2B milestones","date":"2023-02","year":2023,"category":"M&A","stage":"Clinical","note":"Allosteric oral TYK2 TAK-279 acquired from Nimbus after strong Ph2b."},{"acquirer":"Eli Lilly","counterparty":"DICE Therapeutics","asset":"DC-806","value":"$2.4B","date":"2023-08","year":2023,"category":"M&A","stage":"Preclinical","note":"Oral IL-17 antagonist platform (DELSCAPE) acquired for early oral biologics-alternatives."},{"acquirer":"Organon","counterparty":"Dermavant","asset":"tapinarof","value":"up to ~$1.2B","date":"2024-10","year":2024,"category":"M&A","stage":"Marketed","note":"Topical AhR agonist Vtama acquired to build Organon's dermatology franchise."},{"acquirer":"Alumis","counterparty":"ACELYRIN","asset":"ESK-001 / izokibep","value":"all-stock merger","date":"2025-02","year":2025,"category":"M&A","stage":"Clinical","note":"Merged next-gen oral-immunology pipelines (ESK-001 TYK2 + izokibep IL-17)."},{"acquirer":"Johnson & Johnson","counterparty":"Protagonist Therapeutics","asset":"icotrokinra","value":"co-development + royalties","date":"2017-07","year":2017,"category":"Licensing","stage":"Discovery","note":"Oral IL-23R peptide (JNJ-2113) discovered by Protagonist, co-developed and commercialised by J&J."},{"acquirer":"Sun Pharma","counterparty":"Merck (MSD)","asset":"tildrakizumab","value":"$80M upfront + royalties","date":"2014-09","year":2014,"category":"Licensing","stage":"Clinical","note":"Ex-license of the IL-23 p19 mAb (then MK-3222) to Sun for worldwide development."},{"acquirer":"LEO Pharma","counterparty":"UNION therapeutics","asset":"orismilast","value":"option / partnership","date":"2021-01","year":2021,"category":"Partnership","stage":"Clinical","note":"Collaboration on next-gen PDE4 inhibition in inflammatory skin disease."}],"soc":[{"tier":1,"label":"Topical therapy","agents":"Corticosteroids · vit-D analogs · tapinarof · roflumilast","note":"First line for mild / localised disease (~80% of patients). Steroid-sparing non-steroidals now extend to face, folds and scalp.","colorVar":"--s4"},{"tier":2,"label":"Phototherapy","agents":"NB-UVB · excimer · PUVA","note":"Moderate disease or topical-refractory; office- or home-based. Safe in pregnancy; limited by access and time burden.","colorVar":"--s6"},{"tier":3,"label":"Conventional systemics","agents":"Methotrexate · cyclosporine · acitretin","note":"Moderate-to-severe; low-cost and widely used globally. Requires organ-toxicity monitoring; cyclosporine for short bursts.","colorVar":"--s8"},{"tier":4,"label":"Advanced oral","agents":"Apremilast (PDE4) · deucravacitinib (TYK2) · icotrokinra (IL-23R)","note":"Oral targeted therapy — the fastest-growing tier; increasingly a first-line systemic choice for oral-preferring patients.","colorVar":"--s3"},{"tier":5,"label":"Biologics","agents":"IL-23 · IL-17 · IL-12/23 · TNF","note":"Moderate-to-severe; the deepest, most durable clearance (PASI 90–100). IL-23 and IL-17 are the modern anchors.","colorVar":"--s1"}],"soc_note":"Escalation is not strictly stepwise — moderate-to-severe patients increasingly start advanced oral or biologic therapy directly. Basis: AAD-NPF guidelines of care.","glossary":[{"term":"PASI","def":"Psoriasis Area and Severity Index — composite 0–72 score of erythema, induration and scaling weighted by body-region area."},{"term":"PASI 90 / 100","def":"Share of patients reaching ≥90% / 100% improvement in PASI from baseline — the modern efficacy bar (PASI 75 was the older standard)."},{"term":"BSA","def":"Body Surface Area involved (%); ≥10% (or special sites) marks moderate-to-severe disease."},{"term":"DLQI","def":"Dermatology Life Quality Index (0–30) — patient-reported quality-of-life impact; 0/1 means no effect on life."},{"term":"IL-23","def":"Dendritic-cell cytokine (p19 + p40 subunits) that sustains pathogenic Th17 cells — the most disease-specific target."},{"term":"IL-17A / IL-17F","def":"Th17 effector cytokines acting on keratinocytes; blocking them gives the fastest, deepest skin clearance."},{"term":"Th17 cell","def":"IL-23-dependent T-helper subset that produces IL-17 and IL-22."},{"term":"TYK2","def":"Intracellular pseudokinase that transduces IL-23 signalling; oral allosteric inhibition (deucravacitinib) avoids the JAK boxed warning."},{"term":"JAK–STAT","def":"Kinase→transcription-factor relay beneath cytokine receptors; STAT3 switches on the Th17 programme."},{"term":"RORγt","def":"Master transcription factor of Th17 identity; an emerging small-molecule target."},{"term":"Biologic","def":"Engineered protein (usually a monoclonal antibody) that neutralises a specific cytokine or receptor; injectable."},{"term":"Biosimilar","def":"Highly similar copy of an off-patent biologic; launches drive steep price competition (Humira, Stelara)."},{"term":"p19 / p40","def":"IL-23-specific (p19) vs IL-12/23-shared (p40) subunits; selective p19 blockade proved more effective than p40."},{"term":"NMA","def":"Network meta-analysis — pools many trials to rank therapies never tested head-to-head (e.g. Armstrong 2020)."},{"term":"Drug survival","def":"Real-world persistence: how long patients stay on a therapy before switching/stopping — a durability proxy."},{"term":"PsA","def":"Psoriatic arthritis — inflammatory joint disease developing in ~30% of psoriasis patients."},{"term":"NB-UVB","def":"Narrow-band ultraviolet-B phototherapy."},{"term":"Loss of exclusivity","def":"Patent expiry that opens a product to generic or biosimilar competition."}],"trials":[{"trial":"ERASURE / FIXTURE","asset":"secukinumab","family_key":"il17","year":2014,"phase":"Ph3","result":"First IL-17A pivotal; PASI 90 ~59%, superior to etanercept.","src":"erasure"},{"trial":"AMAGINE-1/2/3","asset":"brodalumab","family_key":"il17","year":2015,"phase":"Ph3","result":"IL-17RA blockade; very high clearance; a boxed warning later shaped uptake.","src":"armstrong"},{"trial":"UNCOVER-1/2/3","asset":"ixekizumab","family_key":"il17","year":2016,"phase":"Ph3","result":"PASI 90 ~68–71% — among the fastest, deepest responders of its era.","src":"uncover"},{"trial":"VOYAGE 1/2","asset":"guselkumab","family_key":"il23","year":2017,"phase":"Ph3","result":"IL-23 p19; PASI 90 ~73% at wk16, superior to adalimumab.","src":"voyage"},{"trial":"reSURFACE 1/2","asset":"tildrakizumab","family_key":"il23","year":2017,"phase":"Ph3","result":"IL-23 p19; established q12w dosing; PASI 90 ~35–39%.","src":"armstrong"},{"trial":"UltIMMa-1/2","asset":"risankizumab","family_key":"il23","year":2018,"phase":"Ph3","result":"PASI 90 ~75%, superior to ustekinumab — set the IL-23 benchmark.","src":"ultimma"},{"trial":"ECLIPSE","asset":"guselkumab","family_key":"il23","year":2019,"phase":"Ph3","result":"Head-to-head win: guselkumab beat secukinumab on wk-48 PASI 90 (durability).","src":"eclipse"}, 21","end":"2023","inclusion":"Adults; moderate-to-severe plaque psoriasis.","sites":"Multi-country Phase 2","kols":"Industry-sponsored; investigators on ClinicalTrials.gov","significance":"Nanobody format tests whether a small IL-17A/F protein can match mAbs — a platform bet."},{"name":"POETYK PSO long-term extension","drug":"deucravacitinib","fam":"kinase","sponsor":"Bristol Myers Squibb","phase":"Phase 3 LTE","status":"Ongoing (≥4-year data)","endpoints":["Maintenance of PASI 75 / sPGA 0/1 over time","Long-term safety (no JAK-class signal)"],"readout":"Durable response and a clean multi-year safety profile — supporting first-oral-TYK2 positioning.","start":"2019","end":"ongoing","inclusion":"POETYK PSO-1/-2 completers; moderate-to-severe plaque psoriasis.","sites":"Global long-term extension","kols":"Armstrong, Warren, Blauvelt (pivotal lead authors)","significance":"Durability + safety are the oral-TYK2 differentiator versus classic JAK inhibitors."}],"trials_focus_note":"The most strategically important programmes. Endpoints, eligibility, sites and dates would be pulled live from ClinicalTrials.gov (API v2) by NCT id; figures here are curated from cited toplines. Named KOLs are pivotal-trial lead authors; industry site investigators are listed on ClinicalTrials.gov.","market_share":[{"cls":"IL-23 p19","trend":"Largest & growing","colorVar":"--s1"},{"cls":"IL-17A / A-F","trend":"Large, stable","colorVar":"--s2"},{"cls":"TNF (incl. biosimilar)","trend":"Large but eroding","colorVar":"--s5"},{"cls":"IL-12/23 (p40)","trend":"Shrinking — biosimilars","colorVar":"--sN"},{"cls":"Oral advanced (TYK2/PDE4/IL-23R)","trend":"Small, fastest-growing","colorVar":"--s3"}],"market_note":null,"pasi_kinetics":{"weeks":[0,4,8,12,16],"note":"Class-representative PASI-90 trajectories (NMA / onset-of-action-informed; illustrative). IL-17 acts fastest and deepest; IL-23 p19 climbs more slowly but is durable; oral agents plateau lower.","series":[{"label":"IL-17 (A / A-F)","colorVar":"  Taltz decline; re-enter via oral IL-17","strength":"Only credible oral IL-17 mechanism; deep immunology capability","vulnerability":"Taltz guided flat-to-declining; wrote off the first DICE asset; a generation behind the oral leaders"},{"company":"Bristol Myers Squibb","position":"Underperforming oral incumbent. Sotyktu ~$0.29B","depth":"Paediatric Phase 3 only (readout 2029)","posture":"Salvage volume via a direct-to-patient discount channel","strength":"First-in-class TYK2 with 5-year durability and a new PsA label","vulnerability":"Proof that efficacy without payer position yields no revenue; DTC pricing destroys the class's price reference"},{"company":"Takeda","position":"Entrant. Zasocitinib NDA from FY2026","depth":"One late-stage oral plus PsA Phase 3 and IBD Phase 2","posture":"Buy into I&I at scale via the $4B Nimbus deal","strength":"Only PASI 100 head-to-head win over another oral; fastest onset in class; cross-indication optionality","vulnerability":"Second into the segment; class-lumped with cheaper deucravacitinib by payers"},{"company":"Alumis","position":"Entrant, pure-play. Envudeucitinib NDA 2H 2026","depth":"Single asset","posture":"File and partner or sell","strength":"Competitive PASI 90/100 data; Kaken deal validates the asset","vulnerability":"No commercial infrastructure; no head-to-head against another oral; financing dependence"},{"company":"Amgen","position":"Declining oral incumbent. Otezla","depth":"None material in psoriasis","posture":"Harvest to LOE","strength":"Entrenched step-therapy position","vulnerability":"IRA MFP 2027, generics Feb 2028; becomes a payer obstacle rather than an asset"},{"company":"China cohort (Innovent, Junshi, Hansoh, InnoCare, BIOCAD)","position":"Domestic Phase 3 across IL-23, IL-17 and TYK2","depth":"Broad but on validated mechanisms","posture":"Serve a <10% penetrated domestic market; out-licence opportunistically","strength":"Cost base; adolescent programmes; completed pivotals","vulnerability":"No Western regulatory path yet; mechanisms already commoditised in the US and EU"}],"catalysts_watch":[{"catalyst":"Icotyde (icotrokinra) US launch trajectory — first two quarters of scripts and payer coverage","type":"Commercial / Access","expected":"H2 2026 – H1 2027","why":"The single cleanest test of whether an oral with biologic-class efficacy can win a first-line position against rebate-protected injectables. If it repeats Sotyktu's launch curve, the oral thesis is worth materially less."},{"catalyst":"Zasocitinib NDA submission and FDA acceptance","type":"Regulatory","expected":"FY2026 (from Apr 2026)","why":"Second next-generation oral into the queue; LATITUDE Atlas showed statistical superiority over deucravacitinib on PASI 100 at week 16, making it the first oral to beat another oral head-to-head."},{"catalyst":"Envudeucitinib (ESK-001) NDA submission","type":"Regulatory","expected":"2H 2026","why":"Third oral entrant; PASI 100 of ~40% at week 24 is competitive. Alumis is the only pure-play, making it the most likely acquisition target in the class."},{"catalyst":"ICONIC-ASCEND readout — icotrokinra vs ustekinumab","type":"Clinical","expected":"2026","why":"First head-to-head of an oral against an injectable biologic in plaque psoriasis. A superiority win reframes guideline sequencing."},{"catalyst":"Otezla maximum fair price under IRA IPAY 2027","type":"Policy","expected":"Effective 1 Jan 2027","why":"Sets the Medicare reference price for the oral tier and anchors commercial negotiation for icotrokinra and the TYK2s."},{"catalyst":"Otezla US generic entry","type":"LOE","expected":"Feb 2028","why":"Removes the branded floor from the oral segment and creates a cheap step-therapy rung payers can require before any new oral."},{"catalyst":"2027 PBM formulary decisions on Icotyde and the TYK2 class","type":"Access","expected":"Q3–Q4 2026","why":"Determines whether the oral tier is positioned first-line or behind biologic failure. This decision, not the clinical data, sets the segment's 2027–2031 revenue."},{"catalyst":"Skyrizi and Cosentyx exclusivity erosion","type":"LOE","expected":"Early 2030s","why":"The single largest determinant of the ten-year forecast; the reason base-case CAGR decays from 7.8% (5y) to 5.3% (10y)."}],"risks":[{"risk":"Orals cannibalise injectables instead of expanding the treated pool, so the market grows with price rather than volume","category":"Commercial/Access","prob":"M–H","impact":"H","horizon":"2026–2029","trigger":"Icotyde's first four quarters showing net new patient starts rather than switches from biologics; NBRx mix disclosed by J&J"},{"risk":"Payers step the oral tier behind biologic failure, repeating the Sotyktu outcome","category":"Commercial/Access","prob":"M","impact":"H","horizon":"2026–2027","trigger":"Published 2027 formulary criteria placing icotrokinra at parity with or ahead of an IL-23 biologic on at least one Big-3 formulary"},{"risk":"Net-price compression accelerates as three orals compete for one formulary slot","category":"Commercial/Access","prob":"H","impact":"M–H","horizon":"2027–2031","trigger":"Whether zasocitinib and envudeucitinib price to differentiate or to buy access; whether DTC channels proliferate beyond BMS"},{"risk":"IRA selection extends to an IL-23 franchise (risankizumab or guselkumab)","category":"Policy","prob":"M","impact":"H","horizon":"2028–2031","trigger":"CMS selection lists in subsequent IPAY cycles; Part D spend rankings"},{"risk":"PBM private-label biosimilar vertical integration further compresses the whole class reference price","category":"Policy/Access","prob":"H","impact":"M","horizon":"2026–2029","trigger":"Regulatory or legislative action on PBM ownership of supply; any rebate-reform proposal advancing"},{"risk":"Class safety signal in oral TYK2 inhibitors (a JAK-adjacent finding at scale)","category":"Clinical","prob":"L–M","impact":"H","horizon":"2027–2031","trigger":"Post-marketing surveillance across deucravacitinib, zasocitinib and envudeucitinib; any FDA class labelling action"},{"risk":"Icotrokinra real-world efficacy underperforms the ICONIC trial population","category":"Clinical","prob":"L–M","impact":"M–H","horizon":"2026–2028","trigger":"First registry and claims-based persistence data; 12-month drug-survival curves versus IL-23 biologics"},{"risk":"Biosimilar entry to risankizumab and secukinumab arrives earlier than the early-2030s assumption","category":"Competitive","prob":"L–M","impact":"H","horizon":"2029–2032","trigger":"Patent litigation outcomes and biosimilar filing disclosures; any settlement dates becoming public"},{"risk":"China-origin assets enter Western markets at disruptive price points via in-licensing","category":"Competitive","prob":"L–M","impact":"M","horizon":"2028–2032","trigger":"Any Western regulatory filing by Innovent, Junshi, Hansoh or InnoCare in this indication"},{"risk":"Epidemiology overstated — the addressable pool is closer to claims-based than survey-based prevalence","category":"Scientific","prob":"M","impact":"M","horizon":"ongoing","trigger":"Prospective claims-linked prevalence work; whether icotrokinra's conversion of untreated patients matches the funnel's implied ~630k"}],"thesis":[{"heading":"State of the field","text":"Plaque psoriasis is the most commercially mature autoimmune dermatology indication and, as of 2026, the one undergoing the sharpest structural change in a decade. Two things happened in parallel. First, the injectable ceiling was reached: IL-23 and IL-17 inhibitors deliver PASI 90 in 55–75% of patients and complete clearance in 40–60%, and the marginal gain from the next antibody is small enough that head-to-head superiority trials now turn on PASI 100 rather than PASI 75. Second, on 18 March 2026 the FDA approved icotrokinra (ICOTYDE, Johnson & Johnson) — the first targeted oral peptide antagonist of the IL-23 receptor — for moderate-to-severe plaque psoriasis in adults and patients 12 and over weighing at least 40 kg. For the first time an oral agent carries biologic-class efficacy rather than the compromised efficacy of apremilast or, in commercial practice, deucravacitinib. The consequence is that the competitive question has moved from \"which molecule clears skin best\" to \"which molecule gets to the patient first, at what net price\". That is a payer question, and the payer environment simultaneously hardened: ustekinumab biosimilars entered the US in February 2025 at discounts up to 85%; the Big Three PBMs removed Humira and Stelara reference products from 2026 formularies in favour of their own private-label biosimilars; and the Inflation Reduction Act set Stelara's maximum fair price at $4,695 versus a $13,836 list from 1 January 2026, with Otezla following in 2027."},{"heading":"Market size and growth trajectory","text":"We size the global plaque psoriasis therapeutics market at approximately $30B in 2025 and $32B in 2026 [Estimated], built bottom-up from indication-attributable brand revenue and cross-checked against a top-down envelope of $28.9–34.2B from published market-research estimates. Base case takes the market to ~$40B by 2029 and ~$46.5B by 2031 — a 7.8% CAGR over five years — before growth decelerates to a 5.3% ten-year CAGR as risankizumab and secukinumab approach loss of exclusivity in the early 2030s. Growth is almost entirely a mix shift, not a price story: the oral targeted segment grows from ~$3B to ~$14B by 2031 (36% CAGR) while the TNF and biosimilar tier contracts at roughly −15% a year. The headline growth figures circulating in market-research reports — up to $80B by 2034 — are not reconcilable with observed brand revenue and appear to be built on list rather than net prices. Treat them as an upper bound on gross sales, not as a forecast of realisable revenue."},{"heading":"Competitive landscape highlights","text":"AbbVie is the clear leader: Skyrizi reached $17.56B in FY2025 (+32.5% in Q4 alone) inside a $30.4B immunology portfolio, and did so in only the second full year after the Humira LOE. Johnson & Johnson holds the strongest strategic position for the next cycle — Tremfya grew 40.5% to $5.2B and icotrokinra gives it the first oral IL-23 franchise — but it is simultaneously absorbing a Stelara collapse of roughly 42% in 2025, a ~1,040 basis-point drag on Immunology segment growth. Novartis (Cosentyx, $6.7B) and Lilly (Taltz) are defending mature IL-17 franchises with lifecycle indications rather than new derm efficacy. UCB is the momentum story: Bimzelx reached €2.22B in FY2025, over 200% growth, with 53% of sales from psoriasis. Bristol Myers Squibb is the cautionary tale and the single most instructive data point in this report. Sotyktu, an oral with genuine efficacy and a clean safety profile, reached only ~$0.3B in FY2025 with US revenue flat as higher demand was offset by lower net selling price. BMS's response — routing Sotyktu through a direct-to-patient platform at more than 80% below list from January 2026 — is an admission that the rebate-gated channel would not give an oral a first-line position. Every oral entrant now faces that same wall."},{"heading":"Key strategic risks and access barriers","text":"The dominant risk is not clinical. It is that the oral era expands the number of competitors without expanding the treated pool — in which case the new entrants cannibalise injectables at a lower net price and the market grows more slowly than the patient count. Step therapy through conventional systemics remains near-universal in the US, and incomplete step documentation is the leading cause of prior-authorisation denial. In Europe, NICE-derived thresholds (PASI ≥10 and DLQI >10) formally exclude most of the moderate segment from biologic access. Meanwhile PBM economics have inverted: private-label biosimilars from Cordavis, Nuvaila and Quallent are displacing both originators and third-party biosimilars, which compresses net price across the whole ustekinumab and adalimumab tier and resets the reference point against which any new oral is priced."},{"heading":"Investment thesis","text":"Plaque psoriasis remains an attractive market on absolute size and durability but has become a poor market for undifferentiated entry. The value now sits in two places: (1) assets that credibly convert untreated systemic-eligible patients rather than switch already-treated ones — which means oral route, first-line label, adolescent coverage and site-specific data; and (2) capabilities that lower the cost of proving differentiation in an indication where the efficacy bar is already ~70% IGA 0/1 and trials must therefore be large, head-to-head and endpoint-aggressive. A ninth me-too IL-17 or IL-23 antibody has negative expected value. A tenth oral entrant without a payer strategy has the same problem Sotyktu had."}],"nodes":[{"id":"ind:plaque-psoriasis","type":"Indication","label":"Plaque psoriasis","attrs":{"area":""},"sources":[]},{"id":"moa:il23","type":"MoAClass","label":"IL-23 / Th17 axis","attrs":{"family_key":"il23","colorVar":"--s1","order":1,"safety":"Cleanest profile — no increased candidiasis or IBD signal (may be IBD-protective), low serious-infection rates, no boxed warnings."},"sources":[]},{"id":"moa:il17","type":"MoAClass","label":"IL-17 axis","attrs":{"family_key":"il17","colorVar":"--s2","order":2,"safety":"Mucocutaneous Candida (highest with bimekizumab); caution/avoid in IBD; brodalumab carries a boxed warning for suicidal ideation. No consistent MACE/malignancy signal."},"sources":[]},{"id":"moa:tnf","type":"MoAClass","label":"TNF inhibitors","attrs":{"family_key":"tnf","colorVar":"--s5","order":3,"safety":"Boxed warnings: serious infections (incl. TB reactivation — screen first) and malignancy (lymphoma). HBV reactivation, demyelination, CHF worsening; highest herpes-zoster rate."},"sources":[]},{"id":"moa:kinase","type":"MoAClass","label":"Oral kinase inhibitors (TYK2 / JAK)","attrs":{"family_key":"kinase","colorVar":"--s3","order":4,"safety":"Selective TYK2 (deucravacitinib) does NOT carry the JAK boxed warning; 5-yr data show no MACE/VTE/malignancy signal. Classic JAK inhibitors carry the class boxed warning (infection, MACE, thrombosis, malignancy)."},"sources":[]},{"id":"moa:pde4","type":"MoAClass","label":"PDE4 inhibitors","attrs":{"family_key":"pde4","colorVar":"--s7","order":5,"safety":"No boxed warning, no lab monitoring. GI (diarrhea/nausea), weight loss, and a depression/mood warning (apremilast)."},"sources":[]},{"id":"moa:topical","type":"MoAClass","label":"Topical non-steroidal","attrs":{"family_key":"topical","colorVar":"--s4","order":6,"safety":"Local, well-tolerated; steroid-sparing. Suitable for chronic use and sensitive sites."},"sources":[]},{"id":"moa:steroid","type":"MoAClass","label":"Topical corticosteroids","attrs":{"family_key":"steroid","colorVar":"--sN","order":7,"safety":"Skin atrophy, striae, tachyphylaxis and HPA-axis suppression with chronic/high-potency use."},"sources":[]},{"id":"moa:conv","type":"MoAClass","label":"Conventional systemics","attrs":{"family_key":"conv","colorVar":"--s8","order":8,"safety":"Organ toxicity and monitoring: MTX (hepatotoxicity, cytopenia, teratogenic), cyclosporine (nephrotoxicity, hypertension), acitretin (teratogenic, hyperlipidemia)."},"sources":[]},{"id":"moa:novel","type":"MoAClass","label":"Novel / emerging mechanisms","attrs":{"family_key":"novel","colorVar":"--s6","order":9,"safety":null},"sources":[]},{"id":"moa:hist","type":"MoAClass","label":"Withdrawn / discontinued","attrs":{"family_key":"hist","colorVar":"--sN","order":10,"safety":null},"sources":[]},{"id":"seg:mild","type":"MarketSegment","label":"Mild (topical-managed)","attrs":{"share_pct":80},"sources":[]},{"id":"seg:modsev","type":"MarketSegment","label":"Moderate-to-severe (systemic-eligible)","attrs":{"share_pct":20},"sources":[]},{"id":"drug:guselkumab","type":"Drug","label":"guselkumab","attrs":{"brand":"Tremfya","sub":"IL-23 p19 inhibitor","sub_class":"IL-23 p19 inhibitor","route":"SC" ll","pos":"dc","description":"Dermal antigen-presenting cell. On activation it secretes IL-23, IL-12 and TNF, initiating and sustaining the pathogenic T-cell response that drives psoriatic plaques."},"sources":[]},{"id":"bio:th17","type":"Biology","label":"Th17 cell","attrs":{"kind":"cell","pos":"th17","description":"IL-23-dependent effector T cell. It signals intracellularly through TYK2 / JAK-STAT and secretes the effector cytokines IL-17A, IL-17F and IL-22."},"sources":[]},{"id":"bio:kera","type":"Biology","label":"Keratinocyte","attrs":{"kind":"cell","pos":"kera","description":"Epidermal cell. Under IL-17 and TNF it hyperproliferates and releases further chemokines and cytokines, closing a self-amplifying inflammatory loop that forms the scaly plaque."},"sources":[]},{"id":"bio:plaque","type":"Biology","label":"Psoriatic plaque","attrs":{"kind":"outcome","pos":"plaque","description":"The clinical lesion — a well-demarcated, thickened, scaly erythematous plaque produced by keratinocyte hyperproliferation and immune infiltration."},"sources":[]},{"id":"bio:il23","type":"Biology","label":"IL-23","attrs":{"kind":"cytokine","pos":"il23","description":"Dendritic-cell cytokine (p19 + p40) that maintains pathogenic Th17 cells — the most disease-specific and best-validated target in psoriasis."},"sources":[]},{"id":"bio:p40","type":"Biology","label":"IL-12/23 p40","attrs":{"kind":"cytokine","pos":"p40","description":"Shared subunit of IL-12 and IL-23. Blocking p40 (ustekinumab) inhibits both; selective p19 blockade has since proven more effective."},"sources":[]},{"id":"bio:il17","type":"Biology","label":"IL-17A / IL-17F","attrs":{"kind":"cytokine","pos":"il17","description":"The effector cytokines acting on keratinocytes. Neutralising them delivers the fastest, deepest skin clearance of any class."},"sources":[]},{"id":"bio:il22","type":"Biology","label":"IL-22","attrs":{"kind":"cytokine","pos":"il22","description":"Th17-derived cytokine promoting keratinocyte proliferation and epidermal acanthosis."},"sources":[]},{"id":"bio:tnf","type":"Biology","label":"TNF-α","attrs":{"kind":"cytokine","pos":"tnf","description":"Pleiotropic pro-inflammatory cytokine that amplifies the cascade at multiple points; the first successful biologic target in psoriasis."},"sources":[]},{"id":"bio:tyk2","type":"Biology","label":"TYK2","attrs":{"kind":"intracellular","pos":"tyk2","description":"Intracellular pseudokinase that transduces IL-23 (and type-I interferon) signalling — the basis of oral allosteric TYK2 inhibition."},"sources":[]},{"id":"bio:pde4","type":"Biology","label":"PDE4 / cAMP","attrs":{"kind":"intracellular","pos":"pde4","description":"Phosphodiesterase-4 regulates intracellular cAMP in immune cells; inhibiting it dampens pro-inflammatory cytokine output (apremilast, roflumilast)."},"sources":[]},{"id":"bio:il23r","type":"Biology","label":"IL-23 receptor","attrs":{"kind":"receptor","description":"Cell-surface receptor complex (IL-23R + IL-12Rβ1) on Th17 cells. Engaged by IL-23; the target of the first oral IL-23R peptide antagonist (icotrokinra)."},"sources":[]},{"id":"bio:il17r","type":"Biology","label":"IL-17RA receptor","attrs":{"kind":"receptor","description":"Keratinocyte receptor (IL-17RA/RC) for IL-17A/F. Neutralised directly by brodalumab; signals via Act1 to NF-κB."},"sources":[]},{"id":"bio:jak2","type":"Biology","label":"JAK2","attrs":{"kind":"intracellular","description":"Janus kinase paired with TYK2 beneath the IL-23 receptor; together they phosphorylate STAT3 on cytokine binding."},"sources":[]},{"id":"bio:stat3","type":"Biology","label":"STAT3","attrs":{"kind":"intracellular","description":"Transcription factor phosphorylated by TYK2/JAK2. It translocates to the nucleus and switches on the Th17 genetic programme."},"sources":[]},{"id":"bio:rorgt","type":"Biology","label":"RORγt","attrs":{"kind":"intracellular","description":"Master transcription factor of Th17 identity, induced downstream of STAT3; it drives IL-17/IL-22 production and is an emerging small-molecule target."},"sources":[]},{"id":"bio:nfkb","type":"Biology","label":"NF-κB","attrs":{"kind":"intracellular","description":"Central inflammatory transcription factor activated in keratinocytes by IL-17 and TNF, amplifying chemokine and cytokine output."},"sources":[]},{"id":"catalyst:c1","type":"Catalyst","label":"Humira (adalimumab) biosimilars enter US","attrs":{"date":"2023-07","kind":"patent_expiry","significance":"First big psoriasis-biologic patent cliff; ~9 biosimilars in 2023.","company":"AbbVie"},"sources":["ajmc_humira"]},{"id":"catalyst:c2","type":"Catalyst","label":"Bimzelx (bimekizumab) approved for plaque psoriasis (US)","attrs":{"date":"2023-10","kind":"approval","significance":"First IL-17A and IL-17F inhibitor; deepest skin-clearance benchmark.","company":"UCB"},"sources":["fda"]},{"id":"catalyst:c3","type":"Catalyst","label":"Stelara (ustekinumab) US biosimilar cliff","attrs":{"date":"2025-01","kind":"patent_expiry","significance":"~7 biosimilars launch in 2025 at up to ~85% discount; Stelara ~$10.4B (2024).","company":"Johnson & Johnson"},"sources":["cfb_stelara"]},{"id":"catalyst:c4","type":"Catalyst","label":"Zoryve (roflumilast) foam approved for scalp & body","attrs":{"date":"2025-05","kind":"approval","significance":"Extends the topical PDE4 franchise into scalp.","company":"Arcutis Biotherapeutics"},"sources":["arcutis_foam"]},{"id":"catalyst:c5","type":"Catalyst","label":"Zasocitinib (TAK-279) positive Phase 3 topline","attrs":{"date":"2025-12","kind":"readout","significance":">50% PASI 90, ~30% PASI 100 at wk16; positions oral TYK2 as a 2026 filer.","company":"Takeda"},"sources":["takeda_zaso"]},{"id":"catalyst:c6","type":"Catalyst","label":"Envudeucitinib (ESK-001) positive Phase 3 topline","attrs":{"date":"2026-01","kind":"readout","significance":"~74% PASI 75; oral TYK2 competitor; NDA planned H2 2026.","company":"Alumis"},"sources":["alumis_esk"]},{"id":"catalyst:c7","type":"Catalyst","label": <script>
"use strict";
const G=JSON.parse(document.getElementById("graph").textContent);
const N=Object.fromEntries(G.nodes.map(n=>[n.id,n])), SRC=Object.fromEntries((G.sources||[]).map(s=>[s.id,s]));
const OUT={},INC={}; G.edges.forEach(e=>{(OUT[e.source]=OUT[e.source]||[]).push(e);(INC[e.target]=INC[e.target]||[]).push(e);});
const oN=(id,t)=>(OUT[id]||[]).filter(e=>!t||e.type===t).map(e=>N[e.target]);
const iN=(id,t)=>(INC[id]||[]).filter(e=>!t||e.type===t).map(e=>N[e.source]);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function el(t,a,k){const n=document.createElement(t);if(a)for(const x in a){if(x=="html")n.innerHTML=a[x];else if(x=="text")n.textContent=a[x];else if(x=="cls")n.className=a[x];else if(x[0]=="o"&&x[1]=="n")n.addEventListener(x.slice(2),a[x]);else if(a[x]!=null)n.setAttribute(x,a[x]);}for(const c of[].concat(k||[])){if(c==null)continue;n.append(c.nodeType?c:document.createTextNode(c));}return n;}
const NS="http://www.w3.org/2000/svg";
const svgEl=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const FAM=Object.fromEntries((G.families||[]).map(f=>[f.key,f]));
const MOA=Object.fromEntries(G.nodes.filter(n=>n.type=="MoAClass").map(m=>[m.attrs.family_key,m]));
const STAGE={approved:["M","--s6"],filed:["F","--s1"],phase3:["III","--s1"],phase2_3:["II/III","--s1"],phase2:["II","--s4"],phase1_2:["I/II","--s4"],phase1:["I","--s2"],preclinical:["P","--muted"],discontinued:["✕","--s8"]};
const PORD={approved:0,filed:1,phase3:2,phase2_3:3,phase2:4,phase1_2:5,phase1:6,preclinical:7,discontinued:8};
const fmt$=m=>m==null?null:(m>=1000?"$"+(m/1000).toFixed(1)+"B":"$"+m+"M");
// resolvable ClinicalTrials.gov link: a specific study when we have an NCT id, else a
// search scoped to THIS atlas's disease (never a hardcoded condition) — always returns results.
const ctLink=(nct,drug)=>nct
  ?"https://clinicaltrials.gov/study/"+encodeURIComponent(nct)
  :"https://clinicaltrials.gov/search?cond="+encodeURIComponent(G.meta.focus||"")+(drug?"&intr="+encodeURIComponent(drug):"");
const CANVAS=document.getElementById("canvas"), WIRES=document.getElementById("wires");
const CW=3400, CH=5580; CANVAS.style.width=CW+"px"; CANVAS.style.height=CH+"px"; WIRES.setAttribute("width",CW); WIRES.setAttribute("height",CH);
let TREE_BOTTOM=0, ADAPT_CH=CH;   // set by buildHierarchy / layoutAdapt (content-adaptive vertical flow)

/* ---------- schematic (IL-23 / IL-17 immune cascade) — a corner region, local coords ---------- */
let SOX=1930, SOY=940; const SW=900, SH=560;   // schematic div origin (in the mid-right void) + size
const SCH={ // LOCAL coords within the schematic SVG (0..SW, 0..SH)
  dc:[130,140], p40:[280,75], il23:[280,200], th17:[450,210], tyk2:[525,285], il22:[560,130],
  il17:[450,335], tnf:[280,360], pde4:[175,270], kera:[690,230], plaque:[820,230]
};
const schBio=k=>N["bio:"+k];  // schematic key -> Biology node
function buildSchematic(){
  const g=el("div",{cls:"node",style:`left:${SOX}px;top:${SOY}px;width:${SW}px;height:${SH}px`});
  const s=svgEl("svg",{viewBox:`0 0 ${SW} ${SH}`,width:SW,height:SH}); g.append(s);
  const off=p=>[SCH[p][0],SCH[p][1]];
  const cellC=css("--cell"), keraC=css("--kera"), accC=css("--accent");
  s.append((()=>{const d=svgEl("defs");d.innerHTML=
    `<marker id="sah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="${css('--ink2')}"/></marker>`+
    `<radialGradient id="gcell" cx="36%" cy="30%" r="82%"><stop offset="0%" stop-color="color-mix(in srgb,${cellC} 35%,#fff)"/><stop offset="100%" stop-color="${cellC}"/></radialGradient>`+
    `<radialGradient id="gkera" cx="36%" cy="30%" r="82%"><stop offset="0%" stop-color="color-mix(in srgb,${keraC} 35%,#fff)"/><stop offset="100%" stop-color="${keraC}"/></radialGradient>`+
    `<radialGradient id="gplaque" cx="40%" cy="28%" r="85%"><stop offset="0%" stop-color="color-mix(in srgb,${accC} 30%,#fff)"/><stop offset="100%" stop-color="${accC}"/></radialGradient>`+
    `<filter id="schsh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="2.4" flood-color="#3a2a12" flood-opacity="0.34"/></filter>`+
    `<filter id="schglow" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="1" stdDeviation="1.6" flood-color="#3a2a12" flood-opacity="0.30"/></filter>`;
    return d;})());
  // faint skin-layer backdrop (epidermis where the keratinocyte sits; dermis where DC/T cells sit)
  s.append(svgEl("rect",{x:520,y:60,width:360,height:440,fill:css("--kera"),opacity:.13,rx:10}));
  s.append(svgEl("rect",{x:20,y:60,width:500,height:440,fill:css("--cell"),opacity:.13,rx:10}));
  const lyr=(x,t)=>{const e=svgEl("text",{x,y:78,"text-anchor":"middle","font-size":"9",fill:css("--muted"),"letter-spacing":".1em"});e.textContent=t;s.append(e);};
  lyr(270,"DERMIS"); lyr(700,"EPIDERMIS");
  function arrow(a,b,col,dash,w){const [x1,y1]=off(a),[x2,y2]=off(b);const l=svgEl("line",{x1,y1,x2,y2,stroke:col||css("--rule2"),"stroke-width":w||2.4,"marker-end":"url(#sah)"});if(dash)l.setAttribute("stroke-dasharray","4 3");s.append(l);return[(x1+x2)/2,(y1+y2)/2];}
  function annot(a,b,text,dy){const[mx,my]=[(off(a)[0]+off(b)[0])/2,(off(a)[1]+off(b)[1])/2];const t=svgEl("text",{x:mx,y:my+(dy||-6),"text-anchor":"middle",class:"schnote"});t.textContent=text;s.append(t);}
  // cascade arrows + annotations
  arrow("dc","il23",css("--s1")); annot("dc","il23","secretes",-6);
  arrow("il23","th17",css("--s1")); annot("il23","th17","sustains Th17",-6);
  arrow("il23","tyk2",css("--s3"),true,1.6); annot("il23","tyk2","signals via TYK2",12);
  arrow("th17","il17",css("--s2")); arrow("th17","il22",css("--s2"),false,1.6);
  arrow("il17","kera",css("--s2"));
  {const[kx,ky]=off("kera");const t=svgEl("text",{x:kx-72,y:ky-16,"text-anchor":"middle",class:"schnote"});t.textContent="hyperproliferation";s.append(t);}
  arrow("il22","kera",css("--s2"),false,1.4);
  arrow("tnf","kera",css("--s5"),true); annot("tnf","kera","amplifies",14);
  arrow("kera","plaque",css("--accent"));
  // feedback loop kera -> dc, routed BELOW the cascade so it doesn't cross the Th17 cell/label
  {const[ax,ay]=off("kera"),[bx,by]=off("dc"),dip=478;
    s.append(svgEl("path",{d:`M${ax},${ay+20} C${ax},${dip} ${bx},${dip} ${bx},${by+22}`,fill:"none",stroke:css("--muted"),"stroke-width":1.6,"stroke-dasharray":"4 3","marker-end":"url(#sah)"}));
    const t=svgEl("text",{x:(ax+bx)/2,y:dip-5,"text-anchor":"middle",class:"schnote"});t.textContent="self-amplifying feedback loop";s.append(t);}
  // cells (clickable Biology) — gradient-shaded with a soft drop shadow + membrane ring
  function cell(k,r,grad){const [x,y]=off(k),b=schBio(k);const grp=svgEl("g",{class:"anchor"});grp.style.cursor="pointer";
    grp.append(svgEl("ellipse",{cx:x,cy:y,rx:r*1.15,ry:r,fill:`url(#${grad})`,stroke:css("--rule2"),"stroke-width":1.5,filter:"url(#schsh)"}));
    grp.append(svgEl("ellipse",{cx:x,cy:y,rx:r*1.15-3,ry:r-3,fill:"none",stroke:"#fff","stroke-width":.8,opacity:.35})); // inner membrane sheen
    grp.append(svgEl("circle",{cx:x-r*.28,cy:y-r*.18,r:r*.34,fill:css("--ink2"),opacity:.45})); // nucleus
    grp.append(svgEl("circle",{cx:x-r*.28-r*.1,cy:y-r*.18-r*.1,r:r*.12,fill:"#fff",opacity:.4})); // nucleolus highlight
    const t=svgEl("text",{x,y:y-r-6,"text-anchor":"middle",class:"schlab"});t.textContent=(b&&b.label)||k;grp.append(t);
    if(b)grp.onclick=()=>openModal(b.id); s.append(grp);}
  cell("dc",25,"gcell"); cell("th17",25,"gcell"); cell("kera",30,"gkera");
  // plaque outcome — layered scaly block
  const [px,py]=off("plaque"),bp=schBio("plaque");const pg=svgEl("g",{class:"anchor"});pg.style.cursor="pointer";
  pg.append(svgEl("rect",{x:px-16,y:py-18,width:32,height:36,rx:3,fill:"url(#gplaque)",stroke:css("--accent"),"stroke-width":1,filter:"url(#schsh)"}));
  [0,1,2].forEach(i=>pg.append(svgEl("rect",{x:px-16,y:py-18+i*7,width:32,height:2.4,fill:"#fff",opacity:.34}))); // scale lines
  const ptl=svgEl("text",{x:px,y:py+33,"text-anchor":"middle",class:"schsub","font-weight":"700"});ptl.textContent="plaque";pg.append(ptl);
  if(bp)pg.onclick=()=>openModal(bp.id); s.append(pg);
  // cytokine / intracellular nodes (clickable Biology; ringed in the family colour that targets them)
  const RING={p40:"il23",il23:"il23",il17:"il17",tnf:"tnf",tyk2:"kinase",pde4:"pde4",il22:"il17"};
  ["p40","il23","il17","tnf","tyk2","pde4","il22"].forEach(k=>{const [x,y]=off(k),b=schBio(k);
    const grp=svgEl("g",{class:"anchor"});grp.style.cursor="pointer";const r=k=="il22"?11:15,rc=css(FAM[RING[k]]?.colorVar||"--sN");
    grp.append(svgEl("circle",{cx:x,cy:y,r,fill:"color-mix(in srgb,"+rc+" 12%,var(--block))",stroke:rc,"stroke-width":2.4,filter:"url(#schglow)"}));
    grp.append(svgEl("circle",{cx:x-r*.32,cy:y-r*.32,r:r*.34,fill:"#fff",opacity:.35})); // specular
    const t=svgEl("text",{x,y:y+3,"text-anchor":"middle","font-size":k=="il22"?"7.5":"8.5","font-weight":"800",fill:css("--ink")});t.textContent=(b&&b.label.replace(" / IL-17F","").replace("IL-12/23 ",""))||k;grp.append(t);
    if(b)grp.onclick=()=>openModal(b.id); s.append(grp);});
  const tt=svgEl("text",{x:SW/2,y:24,"text-anchor":"middle",class:"schlab","font-size":"15","letter-spacing":".03em"});tt.textContent=("THE "+(G.meta.cascade_label||"disease immune cascade")).toUpperCase();s.append(tt);
  s.append(svgEl("line",{x1:SW/2-150,y1:31,x2:SW/2+150,y2:31,stroke:css("--accent"),"stroke-width":1.4,opacity:.7}));
  const hint=svgEl("text",{x:SW/2,y:44,"text-anchor":"middle","font-size":"9",fill:css("--muted"),"font-style":"italic"});hint.textContent="click any cell or cytokine for the science";s.append(hint);
  CANVAS.append(g);
}

/* ---------- mechanism blocks + connectors ---------- */
const LAYOUT={ // family -> {x,y} top-left of block
  il23:[30,440], tnf:[30,720], conv:[30,900],
  novel:[360,560], hist:[360,840],
  il17:[2430,230], kinase:[2430,610],
  pde4:[2110,230], topical:[2110,420], steroid:[2110,630],
};
const DESC={il23:"Block IL-23 (p19) or p40 to starve Th17 cells.",il17:"Neutralise the effector cytokine IL-17A/F or its receptor.",
  tnf:"Neutralise TNF-α — the original biologic target.",kinase:"Oral inhibition of intracellular TYK2 / JAK signalling.",
  pde4:"Raise cAMP to dampen cytokine output (oral & topical).",topical:"Non-steroidal keratinocyte-normalising topicals.",
  steroid:"Anti-inflammatory topical corticosteroids.",conv:"Low-cost legacy oral systemics.",
  novel:"Emerging / experimental mechanisms.",hist:"Withdrawn or discontinued agents."};
function buildBlocks(){
  for(const fk in LAYOUT){
    const m=MOA[fk]; if(!m)continue; const col=css(FAM[fk].colorVar||"--sN");
    const drugs=iN(m.id,"HAS_MECHANISM").sort((a,b)=>(PORD[a.attrs.highest_phase]-PORD[b.attrs.highest_phase])||((b.attrs.annual_sales_usd_m||0)-(a.attrs.annual_sales_usd_m||0)));
    const [x,y]=LAYOUT[fk];
    const blk=el("div",{cls:"block",style:`left:${x}px;top:${y}px;--fam:${col}`,"data-node":m.id});
    blk.append(el("div",{cls:"bhead",onclick:()=>openModal(m.id)},[el("div",{cls:"bn",text:m.label}),el("div",{cls:"bc",text:drugs.length+" · "+((MOA[fk].attrs.validation_status)||"")})]));
    blk.append(el("div",{cls:"bdesc",text:DESC[fk]||""}));
    drugs.forEach(d=>blk.append(drow(d,col)));
    CANVAS.append(blk);
  }
}
function drow(d,col){
  const a=d.attrs, st=STAGE[a.highest_phase]||["?","--muted"], comp=oN(d.id,"DEVELOPED_BY")[0];
  const meta=[]; if(comp)meta.push("<b>"+esc(comp.label)+"</b>");
  if(a.route)meta.push(esc(a.route)+(a.dose?" "+esc(a.dose):""));

// orthogonal elbow: horizontal stub -> vertical channel -> horizontal into the anchor, with rounded corners
function elbowPath(sx,sy,cx,ax,ay,r){
  const h1=Math.sign(cx-sx)||1, v=Math.sign(ay-sy)||1, h2=Math.sign(ax-cx)||1;
  const rr=Math.min(r,Math.abs(cx-sx)/2||r,Math.abs(ay-sy)/2||r,Math.abs(ax-cx)/2||r);
  return `M${sx},${sy} L${cx-h1*rr},${sy} Q${cx},${sy} ${cx},${sy+v*rr} L${cx},${ay-v*rr} Q${cx},${ay} ${cx+h2*rr},${ay} L${ax},${ay}`;
}

function hMeasure(n){
  if(n.k==="mech"){const na=(n.drugs||[]).length; n._h=HH.mechHead+(n.d?15:0)+(na?na*HH.chipH+4:8); return n._h;}
  const kids=n.ch||[]; let h=0; kids.forEach((c,i)=>{h+=hMeasure(c); if(i)h+=HH.vGap;}); n._h=Math.max(h,HH.minH); return n._h;

function hPlace(n,depth,side,xInner,yTop){

  const w=HW[n.k]||HW.mech; n._w=w; n._innerX=xInner; n._x=side<0?xInner-w:xInner; n._outerX=side<0?n._x:n._x+w;

  if(shape=="triangle")return `${x},${y-s} ${x+s*0.92},${y+s*0.62} ${x-s*0.92},${y+s*0.62}`;
  if(shape=="hexagon"){let p=[];for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;p.push(`${(x+s*Math.cos(a)).toFixed(1)},${(y+s*Math.sin(a)).toFixed(1)}`);}return p.join(" ");}
  if(shape=="pentagon"){let p=[];for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5;p.push(`${(x+s*Math.cos(a)).toFixed(1)},${(y+s*Math.sin(a)).toFixed(1)}`);}return p.join(" ");}
  if(shape=="star"){let p=[];for(let i=0;i<10;i++){const rr=i%2?s*0.45:s;const a=-Math.PI/2+i*Math.PI/5;p.push(`${(x+rr*Math.cos(a)).toFixed(1)},${(y+rr*Math.sin(a)).toFixed(1)}`);}return p.join(" ");}
