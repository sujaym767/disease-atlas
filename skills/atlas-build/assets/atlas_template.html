<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
:root{
  --paper:#f2ecdd; --block:#fbf8f0; --panel:#f8f4e9; --ink:#231f18; --ink2:#5c564a; --muted:#8a8272; --rule:#cfc6b0; --rule2:#b9ad90;
  --s1:#2a78d6; --s2:#c25a1c; --s3:#1b8f68; --s4:#c98a12; --s5:#b0517f; --s6:#3f7a2e; --s7:#4a3aa7; --s8:#c0403f; --sN:#9a8f77;
  --accent:#8a2b1f; --kera:#e5c98f; --cell:#cdd8e6; --bio:#9c6b34;
  --sans:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif; --cond:"Arial Narrow",Arial,var(--sans); --mono:ui-monospace,Menlo,Consolas,monospace;
  --shadowmodal:0 24px 70px rgba(40,30,15,.45);
  --shadow:0 1px 2px rgba(70,52,20,.09), 0 6px 20px rgba(70,52,20,.07);
  --shadowsm:0 1px 3px rgba(70,52,20,.14);
  --gloss:linear-gradient(180deg, color-mix(in srgb,var(--panel) 40%,#fff) 0%, var(--panel) 62%);
}
:root[data-theme="dark"]{
  --paper:#15130f; --block:#201c16; --panel:#1c1913; --ink:#efe9db; --ink2:#c3bbab; --muted:#8a8272; --rule:#332e26; --rule2:#453d30;
  --s1:#4f92e6; --s2:#e07a3f; --s3:#31a97e; --s4:#d7a02f; --s5:#d071a0; --s6:#5aa246; --s7:#9085e9; --s8:#e06463; --sN:#9a8f77; --accent:#e0885f; --kera:#6b5a34; --cell:#2f3a49; --bio:#c99a5f;
  --shadow:0 1px 2px rgba(0,0,0,.30), 0 6px 20px rgba(0,0,0,.28);
  --shadowsm:0 1px 3px rgba(0,0,0,.4);
  --gloss:linear-gradient(180deg, color-mix(in srgb,var(--panel) 78%,#fff) 0%, var(--panel) 60%);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:12px}
button{font-family:inherit;cursor:pointer}
.tab{font-variant-numeric:tabular-nums}
#viewport{position:fixed;inset:0;overflow:hidden;cursor:grab;background:
  radial-gradient(circle at 30% 20%, color-mix(in srgb,var(--paper) 88%,#fff) 0%, var(--paper) 60%)}
#viewport.drag{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
#wires{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.node{position:absolute;cursor:pointer}
/* mechanism block */
.block{position:absolute;width:300px;background:var(--block);border:1px solid var(--rule2);border-left:4px solid var(--fam);box-shadow:var(--shadow);border-radius:2px}
.bhead{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:5px 8px;background:linear-gradient(180deg,color-mix(in srgb,var(--fam) 20%,var(--block)),color-mix(in srgb,var(--fam) 9%,var(--block)));border-bottom:1px solid var(--rule)}
.bhead .bn{font-weight:700;font-size:12px;line-height:1.05;color:var(--ink)}
.bhead .bc{font-size:9px;color:var(--muted);white-space:nowrap}
.bdesc{font-size:9.5px;color:var(--ink2);padding:3px 8px;border-bottom:1px solid var(--rule);font-style:italic}
.drow{display:grid;grid-template-columns:20px 1fr;gap:5px;padding:2px 8px;border-bottom:1px dotted var(--rule);cursor:pointer}
.drow:last-child{border-bottom:0}
.drow:hover{background:color-mix(in srgb,var(--fam) 10%,var(--block))}
.stage{font-family:var(--mono);font-size:9px;font-weight:700;text-align:center;color:var(--st,var(--muted));padding-top:1px}
.dn{font-weight:650;font-size:11px;line-height:1.08}
.dm{font-size:9px;color:var(--ink2);line-height:1.12}
.dm b{color:var(--ink);font-weight:600}
.mk{font-size:8px;font-weight:800;padding:0 2px;border-radius:2px;margin-left:2px;vertical-align:1px}
.mk.bio{color:#fff;background:var(--s1)}.mk.combo{color:#fff;background:var(--s3)}.mk.warn{color:var(--s8)}
.disc .dn{text-decoration:line-through;color:var(--muted)}
/* panels */
.panel{position:absolute;background:var(--gloss);border:1px solid var(--rule2);box-shadow:var(--shadow);border-radius:3px}
.panel h4{margin:0;display:flex;align-items:center;gap:6px;font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:12.5px;color:var(--accent);padding:5px 9px;border-bottom:1px solid var(--rule);background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 8%,transparent),transparent)}
.panel h4::before{content:"";width:4px;height:12px;background:var(--accent);border-radius:1px;flex:none;box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 30%,transparent)}
.panel .pc{padding:7px 9px}
.mast{position:absolute}
.mast .t{font-family:var(--cond);font-weight:700;font-size:42px;line-height:.86;text-transform:uppercase;letter-spacing:-.015em;color:var(--ink);text-shadow:0 1px 0 color-mix(in srgb,var(--paper) 60%,#fff)}
.mast .t small{display:block;font-family:var(--sans);font-size:9.5px;font-weight:700;letter-spacing:.2em;color:var(--accent);margin-top:6px;padding-bottom:7px;border-bottom:2px solid var(--accent);width:max-content;max-width:100%}
.mast .o{font-size:11.5px;line-height:1.4;color:var(--ink2);max-width:540px;margin-top:9px}
.mast .kb{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
.mast .k{border:1px solid var(--rule2);background:var(--gloss);box-shadow:var(--shadowsm);padding:5px 11px 4px;border-radius:3px;border-top:2px solid var(--accent)}
.mast .k b{font-family:var(--cond);font-size:21px;font-weight:700;color:var(--ink);display:block;line-height:1}.mast .k span{font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-top:2px}
.burden .st{display:grid;grid-template-columns:56px 1fr;gap:4px 9px;font-size:10px;align-items:baseline}
.burden .st b{font-family:var(--cond);font-size:15px;text-align:right;color:var(--accent)}
.burden .st span{color:var(--ink2)}
.burden .note{font-size:9.5px;color:var(--ink2);margin-top:5px}
.mkt .big{font-family:var(--cond);font-size:30px;font-weight:700}
.mkt .r{display:flex;justify-content:space-between;font-size:10px;color:var(--ink2);margin-top:2px}
.bench .row{display:grid;grid-template-columns:74px 1fr 20px;gap:5px;align-items:center;font-size:9.5px;margin:1.5px 0;cursor:pointer}
.bench .lab{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink2)}
.bench .tr{height:8px;background:var(--paper);border:1px solid var(--rule)}.bench .fi{height:100%}.bench .vv{text-align:right;color:var(--muted);font-weight:700}
.sites table{border-collapse:collapse;font-size:9.5px;width:100%}
.sites td{border-bottom:1px dotted var(--rule);padding:2px 4px;vertical-align:top}
.sites td:first-child{font-weight:700;white-space:nowrap}.sites td:nth-child(2){color:var(--accent);white-space:nowrap;font-weight:600}
.cats .row{display:grid;grid-template-columns:42px 1fr;gap:5px;font-size:9.5px;margin:2px 0;cursor:pointer}
.cats .d{font-weight:700;color:var(--accent);font-size:9px}.cats .k{font-size:7px;text-transform:uppercase;color:var(--muted)}
.deals .row{font-size:9.5px;margin:3px 0;cursor:pointer;border-bottom:1px dotted var(--rule);padding-bottom:2px}
.deals b{font-weight:700}.deals .v{color:var(--accent);font-weight:700}
.legend{font-size:9.5px;color:var(--ink2)}.legend code{font-family:var(--mono);font-weight:700;background:var(--paper);border:1px solid var(--rule);padding:0 3px}
.legend .lr{margin:3px 0}.legend .fam{display:inline-flex;align-items:center;gap:3px;margin:1px 6px 1px 0}.legend .fam i{width:8px;height:8px;display:inline-block;border-radius:2px}
/* band label */
.bandlabel{position:absolute;font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--rule2);font-size:13px}
/* ---- objective mind-map (RA-Capital-style decision tree) ---- */
.hnode{position:absolute;transform:translateY(-50%);border-radius:6px}
.hobj{color:#fff;padding:9px 12px;box-shadow:var(--shadow);border-radius:7px}
.hobj .ht{font-family:var(--cond);font-weight:700;font-size:17px;line-height:1.0;text-transform:uppercase;letter-spacing:.005em}
.hobj .hd{font-size:9px;line-height:1.3;margin-top:5px;opacity:.93}
.hstrat{color:#fff;padding:6px 10px;box-shadow:var(--shadowsm)}
.hstrat .ht{font-family:var(--cond);font-weight:700;font-size:13.5px;line-height:1.06}
.hstrat .hd{font-size:8px;line-height:1.24;margin-top:2px;opacity:.9}
.happr{padding:5px 9px;box-shadow:var(--shadowsm);border:1px solid var(--hc)}
.happr .ht{font-weight:700;font-size:10.5px;line-height:1.12;color:var(--ink)}
.happr .hd{font-size:8px;color:var(--ink2);margin-top:2px;line-height:1.22}
.hmech{border:1px solid var(--hc);box-shadow:var(--shadowsm);background:var(--block);border-radius:6px;overflow:hidden}
.hmech .mh{font-weight:700;font-size:9.5px;padding:3px 8px;color:var(--ink);background:color-mix(in srgb,var(--hc) 30%,var(--block));border-bottom:1px solid var(--hc)}
.hmech .md{font-size:7.5px;color:var(--ink2);padding:3px 8px 2px;line-height:1.22;font-style:italic}
.hasset{display:grid;grid-template-columns:15px 1fr;gap:6px;padding:2px 8px;font-size:9px;cursor:pointer;align-items:baseline;border-top:1px dotted var(--rule)}
.hasset:hover{background:color-mix(in srgb,var(--hc) 14%,transparent)}
.hasset .hs{font-family:var(--mono);font-weight:700;font-size:8px;text-align:center;color:var(--st,var(--muted))}
.hasset .han{font-weight:650;color:var(--ink)}.hasset.disc .han{text-decoration:line-through;color:var(--muted)}
.hasset .hac{color:var(--muted);font-size:7.5px}
.hasset .mk{font-size:7px}
.hwire{fill:none;stroke-linecap:round}
/* standard-of-care ladder */
.soc{display:flex;align-items:stretch}
.soc .step{flex:1;position:relative;padding:8px 11px 9px 18px;border-left:1px solid var(--rule);min-width:0}
.soc .step:first-child{border-left:0}
.soc .step::before{content:"";position:absolute;left:6px;top:8px;bottom:8px;width:5px;border-radius:3px;background:var(--sc);box-shadow:0 0 7px color-mix(in srgb,var(--sc) 55%,transparent)}
.soc .step .tier{font-family:var(--cond);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.soc .step .nm{font-family:var(--cond);font-size:18px;font-weight:700;color:var(--sc);line-height:1;margin:2px 0 4px}
.soc .step .ag{font-size:9.5px;color:var(--ink);font-weight:600;line-height:1.3}
.soc .step .nt{font-size:9px;color:var(--ink2);line-height:1.32;margin-top:5px}
.socbar{height:6px;display:flex;margin:2px 0 9px;border-radius:3px;overflow:hidden;box-shadow:var(--shadowsm)}.socbar i{flex:1}
.socnote{font-size:9px;color:var(--muted);margin-top:8px;font-style:italic}
/* trials timeline */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px 18px}
.trow{display:grid;grid-template-columns:38px 1fr;gap:8px;font-size:9.5px;cursor:pointer;padding:4px 5px;border-bottom:1px dotted var(--rule);align-items:baseline}
.trow:hover{background:color-mix(in srgb,var(--tc) 10%,transparent)}
.trow .yr{font-family:var(--cond);font-weight:700;font-size:13px;color:var(--tc);text-align:right;position:relative}
.trow .tn{font-weight:700;color:var(--ink)}.trow .tn i{font-weight:600;font-style:normal;color:var(--tc)}
.trow .tr{color:var(--ink2);line-height:1.28;margin-top:1px}
/* glossary */
.gloss2{columns:5;column-gap:18px;font-size:9.5px}
@media (max-width:1px){.gloss2{columns:2}}
.gloss2 .g{break-inside:avoid;margin:0 0 6px;line-height:1.28}
.gloss2 .g b{color:var(--accent);font-weight:700}
.gloss2 .g span{color:var(--ink2)}
/* comorbidity + market share */
.comorb{display:grid;grid-template-columns:1fr auto;gap:2px 10px;font-size:9.5px;margin-top:4px}
.comorb b{color:var(--accent);font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.comorb span{color:var(--ink2)}
.mshare .row{display:grid;grid-template-columns:11px 1fr auto;gap:7px;align-items:center;font-size:9.5px;margin:3px 0}
.mshare .row i{width:10px;height:10px;border-radius:2px;box-shadow:0 0 5px color-mix(in srgb,var(--mc) 50%,transparent)}
.mshare .row .cl{font-weight:600;color:var(--ink)}
.mshare .row .tr{color:var(--ink2);font-style:italic;text-align:right;white-space:nowrap}
/* SoC stage table */
.soctab{display:grid;grid-template-columns:118px repeat(3,1fr);font-size:9px;border:1px solid var(--rule);border-radius:4px;overflow:hidden}
.soctab .hd{font-family:var(--cond);font-weight:700;font-size:11px;color:#fff;padding:4px 8px;text-transform:uppercase;line-height:1}
.soctab .hd span{font-weight:400;font-size:7.5px;opacity:.9;text-transform:none}
.soctab .rl{font-weight:700;color:var(--ink);padding:4px 8px;border-top:1px solid var(--rule);display:flex;align-items:center;font-size:9px}
.soctab .cell{border-top:1px solid var(--rule);border-left:1px solid var(--rule);min-height:19px;display:flex;align-items:center}
.soctab .pres{font-size:8px;color:var(--ink2);padding:3px 7px;line-height:1.2;align-items:flex-start}
.soctab .pill{height:100%;min-height:17px;width:100%;display:flex;align-items:center;padding:0 8px;color:#fff;font-weight:700;font-size:8.5px}
.socnote{font-size:9px;color:var(--muted);margin-top:7px;font-style:italic}
/* sales donut — bigger pie, drug + company mapping */
.donut{display:flex;gap:14px;align-items:center}
.donut svg{flex:none}
.donut .lg{flex:1;min-width:0}
.donut .lg .row{display:grid;grid-template-columns:11px 1fr auto;gap:8px;align-items:center;padding:2px 0;cursor:pointer;border-bottom:1px dotted var(--rule)}
.donut .lg .row:last-child{border-bottom:0}
.donut .lg .row:hover{background:color-mix(in srgb,var(--accent) 6%,transparent)}
.donut .lg i{width:11px;height:11px;border-radius:2px}
.donut .lg .nm{font-weight:700;color:var(--ink);font-size:9.5px;line-height:1.02;display:block}
.donut .lg .co{font-size:7.5px;color:var(--muted);display:block}
.donut .lg .vsh{text-align:right;white-space:nowrap}
.donut .lg .vsh b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums;font-size:9.5px}
.donut .lg .vsh .sh{font-size:7.5px;color:var(--muted);display:block}
/* PASI response-kinetics chart */
.pasi svg{width:100%;display:block}
.pasi .lg{display:flex;flex-wrap:wrap;gap:3px 12px;font-size:8.5px;margin-top:5px}
.pasi .lg span{display:inline-flex;align-items:center;gap:4px;color:var(--ink2)}
.pasi .lg i{width:11px;height:3px;display:inline-block;border-radius:2px}
.pasi .lg b{color:var(--ink)}
/* dev matrix */
.devmx{border-collapse:collapse;width:100%;font-size:8.5px}
.devmx th{font-family:var(--cond);font-weight:700;font-size:9px;color:var(--ink2);padding:3px 2px;text-align:center;vertical-align:bottom;line-height:1}
.devmx th.co{text-align:left;padding-left:4px}
.devmx td{border:1px solid var(--rule);text-align:center;padding:2px 0}
.devmx td.co{text-align:left;font-weight:600;color:var(--ink);padding:2px 5px;white-space:nowrap;border-left:0}
.devmx .cc{display:inline-block;min-width:16px;padding:0 2px;border-radius:2px;color:#fff;font-family:var(--mono);font-weight:700;font-size:8px}
.devmx tr:hover td{background:color-mix(in srgb,var(--accent) 5%,transparent)}
/* map heading + cluster labels */
.maphead{position:absolute;text-align:center;transform:translateX(-50%)}
.maphead .h1{font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:24px;color:var(--ink);line-height:1}
.maphead .h2{font-size:12px;color:var(--accent);letter-spacing:.02em;margin-top:4px;font-weight:600}
.maphead .h2 b{color:var(--ink2)}
.clusterlabel{position:absolute;font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.11em;font-size:13px;color:var(--accent);border-bottom:2px solid color-mix(in srgb,var(--accent) 45%,var(--rule2));padding-bottom:3px}
.clusterlabel span{color:var(--muted);font-weight:600;letter-spacing:.04em;font-size:9px;text-transform:none}
/* SoC improvements */
.soctab .rl small{display:block;font-weight:400;color:var(--muted);font-size:7.5px}
.soctab .pct{font-family:var(--cond);font-weight:700;font-size:13px;color:var(--ink);padding:2px 8px;display:flex;align-items:center;justify-content:center}
.soctab .pill .ln{background:rgba(255,255,255,.35);border-radius:3px;padding:0 3px;margin-right:5px;font-size:7.5px}
.soctab .goal{font-size:7.5px;color:var(--ink2);padding:3px 7px;line-height:1.2;align-items:flex-start}
/* trial timeline */
.tmline{position:relative}
.tmyear{position:absolute;transform:translateX(-50%);font-family:var(--cond);font-weight:700;font-size:11px;color:var(--ink2)}
.tmev{position:absolute;transform:translateX(-50%);cursor:pointer;width:158px}
.tmev .dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--panel);margin:0 auto;box-shadow:var(--shadowsm);position:relative;z-index:2}
.tmev .stem{width:1.5px;margin:0 auto}
.tmev .card{font-size:8px;text-align:center;line-height:1.18}
.tmev .card .tn{font-weight:700;color:var(--ink)}
.tmev .card .ta{color:var(--tc);font-weight:700}
.tmev .card .tr{color:var(--ink2);margin-top:1px}
.tmev:hover .dot{transform:scale(1.25)}
/* compact date timeline (catalysts / cliffs) */
.mtl{position:relative}
.mtl .yr{position:absolute;transform:translateX(-50%);font-family:var(--cond);font-weight:700;font-size:10.5px;color:var(--muted)}
.mtl .ev{position:absolute;transform:translateX(-50%);width:130px;cursor:pointer}
.mtl .ev .d{font-family:var(--cond);font-weight:700;font-size:12px;color:var(--tc)}
.mtl .ev .l{font-size:9px;color:var(--ink);line-height:1.18;font-weight:600}
.mtl .ev:hover .l{color:var(--tc)}
.mtl .dot{position:absolute;width:9px;height:9px;border-radius:50%;border:2px solid var(--panel);z-index:2;box-shadow:var(--shadowsm)}
/* richer deal flow */
.deals .dl{border-bottom:1px dotted var(--rule);padding:5px 0;cursor:pointer}
.deals .dl:last-child{border-bottom:0}.deals .dl:hover{background:color-mix(in srgb,var(--accent) 5%,transparent)}
.deals .dh{font-size:9.5px}.deals .dh b{font-weight:700}
.deals .dm{font-size:8.5px;color:var(--ink2);margin-top:1px}.deals .dm .v{color:var(--accent);font-weight:700}
.dtag{display:inline-block;font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;padding:1px 4px;border-radius:3px;margin-right:4px;vertical-align:1px;color:#fff}
.dtag.mna{background:var(--s8)}.dtag.lic{background:var(--s1)}.dtag.part{background:var(--s3)}
.dstage{font-size:7.5px;color:var(--muted);border:1px solid var(--rule2);border-radius:3px;padding:0 4px;margin-left:4px;white-space:nowrap}
/* trials in focus */
.tfocus .row{display:grid;grid-template-columns:1fr auto;gap:8px;padding:4px 5px;border-bottom:1px dotted var(--rule);cursor:pointer;align-items:center}
.tfocus .row:last-of-type{border-bottom:0}.tfocus .row:hover{background:color-mix(in srgb,var(--tc) 11%,transparent)}
.tfocus .nm{font-weight:700;color:var(--ink);font-size:10px;line-height:1.05}.tfocus .sp{font-size:8px;color:var(--muted);margin-top:1px}
.tfocus .ph{font-family:var(--cond);font-weight:700;font-size:11px;color:var(--tc);white-space:nowrap;text-align:right}
.tfocus .ph small{display:block;font-family:var(--sans);font-weight:600;font-size:7px;color:var(--muted);text-transform:uppercase}
/* trial detail modal */
.trialbody{overflow:auto;padding:15px 20px}
.trialbody h3{margin:13px 0 4px;font-family:var(--cond);text-transform:uppercase;font-size:12px;color:var(--mc,var(--accent));letter-spacing:.05em}
.trialbody .lead{font-size:13.5px;color:var(--ink);line-height:1.4;font-weight:600}
.trialbody ul{margin:3px 0;padding-left:18px;font-size:12.5px;color:var(--ink2)}.trialbody li{margin:2px 0}
.trialbody .rd{font-size:12.5px;color:var(--ink2);line-height:1.4}
.trialgrid{display:grid;grid-template-columns:130px 1fr;gap:5px 14px;font-size:12px;margin-top:3px}
.trialgrid b{color:var(--ink);font-weight:600}.trialgrid span{color:var(--ink2)}

function buildBlocks(){
  for(const fk in LAYOUT){
    const m=MOA[fk]; if(!m)continue; const col=css(FAM[fk].colorVar||"--sN");
    const drugs=iN(m.id,"HAS_MECHANISM").sort((a,b)=>(PORD[a.attrs.highest_phase]-PORD[b.attrs.highest_phase])||((b.attrs.annual_sales_usd_m||0)-(a.attrs.annual_sales_usd_m||0)));
    const [x,y]=LAYOUT[fk];
    const blk=el("div",{cls:"block",style:`left:${x}px;top:${y}px;--fam:${col}`,"data-node":m.id});
    blk.append(el("div",{cls:"bhead",onclick:()=>openModal(m.id)},[el("div",{cls:"bn",text:m.label}),el("div",{cls:"bc",text:drugs.length+" · "+((MOA[fk].attrs.validation_status)||"")})]));
    blk.append(el("div",{cls:"bdesc",text:DESC[fk]||""}));
    drugs.forEach(d=>blk.append(drow(d,col)));
    CANVAS.append(blk);
  }
}
function drow(d,col){
  const a=d.attrs, st=STAGE[a.highest_phase]||["?","--muted"], comp=oN(d.id,"DEVELOPED_BY")[0];
  const meta=[]; if(comp)meta.push("<b>"+esc(comp.label)+"</b>");
  if(a.route)meta.push(esc(a.route)+(a.dose?" "+esc(a.dose):""));
  if(a.p90!=null)meta.push("P90 "+a.p90); if(a.annual_sales_usd_m)meta.push(fmt$(a.annual_sales_usd_m));
  let mk=""; if(a.bios)mk+='<span class="mk bio" title="'+esc(a.bios)+'">B</span>'; if(a.combo)mk+='<span class="mk combo">+</span>'; if((a.note||"").toLowerCase().includes("boxed warning"))mk+='<span class="mk warn">⚠</span>';
  const r=el("div",{cls:"drow"+(a.highest_phase=="discontinued"?" disc":""),"data-node":d.id},[
    el("span",{cls:"stage",style:`--st:${css(st[1])}`,text:st[0]}),
    el("div",{},[el("div",{cls:"dn",html:esc(d.label)+mk}),el("div",{cls:"dm",html:meta.join(" · ")})])]);
  r.onclick=e=>{e.stopPropagation();openModal(d.id);}; return r;
}
// orthogonal elbow: horizontal stub -> vertical channel -> horizontal into the anchor, with rounded corners
function elbowPath(sx,sy,cx,ax,ay,r){
  const h1=Math.sign(cx-sx)||1, v=Math.sign(ay-sy)||1, h2=Math.sign(ax-cx)||1;
  const rr=Math.min(r,Math.abs(cx-sx)/2||r,Math.abs(ay-sy)/2||r,Math.abs(ax-cx)/2||r);
  return `M${sx},${sy} L${cx-h1*rr},${sy} Q${cx},${sy} ${cx},${sy+v*rr} L${cx},${ay-v*rr} Q${cx},${ay} ${cx+h2*rr},${ay} L${ax},${ay}`;
}
function drawConnectors(){
  WIRES.innerHTML="";
  let li=0, ri=0;                                   // per-side stagger counters
  for(const fk in LAYOUT){
    const m=MOA[fk]; if(!m)continue; const el2=CANVAS.querySelector(`.block[data-node="${CSS.escape(m.id)}"]`); if(!el2)continue;
    const [bx,by]=LAYOUT[fk]; const left=bx<CW/2;
    const sx=left?bx+300:bx, sy=by+18; const [ax,ay]=SCH[FAM[fk].anchor]||SCH.th17;
    const idx=left?li++:ri++;
    const cx=left ? ax-(58+idx*15) : ax+(58+idx*15);  // vertical channel just before the anchor, staggered per family
    const col=css(FAM[fk].colorVar||"--sN");
    WIRES.append(svgEl("path",{d:elbowPath(sx,sy,cx,ax,ay,9),fill:"none",stroke:col,"stroke-width":1.8,opacity:.6,"stroke-linejoin":"round","stroke-linecap":"round"}));
    WIRES.append(svgEl("circle",{cx:sx,cy:sy,r:2.4,fill:col,opacity:.8}));      // tap at the block
    WIRES.append(svgEl("circle",{cx:ax,cy:ay,r:3.4,fill:col}));                 // dot at the point of action
    WIRES.append(svgEl("circle",{cx:ax,cy:ay,r:3.4,fill:"none",stroke:css("--paper"),"stroke-width":1}));
  }
}

/* ---------- objective mind-map (Objective -> Strategy -> Approach -> Mechanism -> Assets) ---------- */
const MMTOP=330, CENTERX=CW/2, HGAP=54;
const HW={obj:252,strat:188,appr:174,mech:198}, HH={chipH:22,mechHead:20,vGap:12,minH:26};
const DBYN={}; G.nodes.forEach(n=>{if(n.type==="Drug")DBYN[n.label.toLowerCase()]=n;});
function hMeasure(n){
  if(n.k==="mech"){const na=(n.drugs||[]).length; n._h=HH.mechHead+(n.d?15:0)+(na?na*HH.chipH+4:8); return n._h;}
  const kids=n.ch||[]; let h=0; kids.forEach((c,i)=>{h+=hMeasure(c); if(i)h+=HH.vGap;}); n._h=Math.max(h,HH.minH); return n._h;
}
function hPlace(n,depth,side,xInner,yTop){
  n._depth=depth; n._side=side; n._yTop=yTop; n._yc=yTop+n._h/2;
  const w=HW[n.k]||HW.mech; n._w=w; n._innerX=xInner; n._x=side<0?xInner-w:xInner; n._outerX=side<0?n._x:n._x+w;
  const kids=n.ch||[]; if(kids.length){
    const childInner=side<0?n._outerX-HGAP:n._outerX+HGAP;
    let kh=0; kids.forEach((c,i)=>{kh+=c._h; if(i)kh+=HH.vGap;});
    let y=n._yc-kh/2; kids.forEach(c=>{hPlace(c,depth+1,side,childInner,y); y+=c._h+HH.vGap;});
  }
}
function buildHierarchy(){
  const H=G.hierarchy||[]; if(!H.length)return;
  H.forEach(hMeasure);
  let ly=MMTOP; H.filter(o=>o.side==="left").forEach(o=>{hPlace(o,0,-1,CENTERX-150,ly); ly+=o._h+80;});
  let ry=MMTOP; H.filter(o=>o.side!=="left").forEach(o=>{hPlace(o,0,+1,CENTERX+150,ry); ry+=o._h+80;});
  TREE_BOTTOM=Math.max(ly,ry)-80;   // bottom extent of the strategy tree (for adaptive vertical flow)
  const tint=(c,p)=>`color-mix(in srgb, ${css(c)} ${p}%, var(--block))`;
  const walk=(n,fn)=>{fn(n); (n.ch||[]).forEach(c=>walk(c,fn));};
  H.forEach(o=>{const oc=o.c||"--s1", ocv=css(oc);
    walk(o,n=>{(n.ch||[]).forEach(c=>{const x1=n._outerX,y1=n._yc,x2=c._innerX,y2=c._yc,mx=(x1+x2)/2;
      const w=n.k==="obj"?3:n.k==="strat"?2:1.4;
      WIRES.append(svgEl("path",{d:`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`,class:"hwire",stroke:ocv,"stroke-width":w,opacity:.5}));});});
    walk(o,n=>CANVAS.append(hbox(n,oc,ocv,tint)));
  });
}

    (n.drugs||[]).forEach(nm=>{const dr=DBYN[(nm||"").toLowerCase()]; if(!dr)return; const a=dr.attrs, st=STAGE[a.highest_phase]||["?","--muted"], comp=oN(dr.id,"DEVELOPED_BY")[0];

  const root=svgEl("g",{transform:`translate(${ntx},${nty}) scale(${nsc})`});NET.append(root);
  netLinks.forEach(l=>{const a=netKey(l.s),b=netKey(l.t);if(!a||!b)return;
    const p=svgEl("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,class:"netedge"+(l.hl?" hl":"")});if(!l.hl)p.setAttribute("marker-end","url(#nah)");root.append(p);
    if(l.hl||netHover===l.s||netHover===l.t){const t=svgEl("text",{x:(a.x+b.x)/2,y:(a.y+b.y)/2-3,"text-anchor":"middle",class:"neterel"+(l.hl?" hl":"")});t.textContent=REL[l.type]||(l.type||"").toLowerCase();root.append(t);}});
  netNodes.forEach(n=>{const nd=N[n.id],r=n.seed?15:12,shp=drawShape(tshape(nd),n.x,n.y,r,tcolor(nd),css("--paper"));
    if(hlNodes.has(n.id)){shp.setAttribute("stroke",css("--accent"));shp.setAttribute("stroke-width","2.6");}
    else if(netHover===n.id){shp.setAttribute("stroke",css("--ink"));shp.setAttribute("stroke-width","2");}
    root.append(shp);
    const t=svgEl("text",{x:n.x,y:n.y+r+13,"text-anchor":"middle",class:"netlabel"});t.textContent=nd.label.length>22?nd.label.slice(0,21)+"…":nd.label;root.append(t);});}
function simLoop(){if(VIEW!=="network"){netRAF=null;return;}if(alpha>0.02){simStep();alpha*=COOL;}renderNet();netRAF=requestAnimationFrame(simLoop);}
function startSim(){if(!netRAF)netRAF=requestAnimationFrame(simLoop);}
function netPoint(e){const r=NET.getBoundingClientRect();return{x:(e.clientX-r.left-ntx)/nsc,y:(e.clientY-r.top-nty)/nsc};}
function nearestNode(p){let best=20*20,hit=null;netNodes.forEach(n=>{const dx=n.x-p.x,dy=n.y-p.y,d2=dx*dx+dy*dy;if(d2<best){best=d2;hit=n;}});return hit;}
NET.addEventListener("mousedown",e=>{const p=netPoint(e),hit=nearestNode(p);if(hit)netDrag={n:hit,moved:false};else netPanS={x:e.clientX-ntx,y:e.clientY-nty};NET.classList.add("drag");});
NET.addEventListener("mousemove",e=>{const p=netPoint(e);
  if(netDrag){netDrag.n.x=p.x;netDrag.n.y=p.y;netDrag.n.pinned=true;netDrag.moved=true;alpha=Math.max(alpha,0.3);}
  else if(netPanS){ntx=e.clientX-netPanS.x;nty=e.clientY-netPanS.y;}
  else{const h=nearestNode(p);netHover=h?h.id:null;}});
addEventListener("mouseup",()=>{if(netDrag){if(!netDrag.moved)expand(netDrag.n.id);netDrag=null;NET.classList.remove("drag");}if(netPanS){netPanS=null;NET.classList.remove("drag");}});
NET.addEventListener("dblclick",e=>{const hit=nearestNode(netPoint(e));if(hit)openModal(hit.id);});
NET.addEventListener("wheel",e=>{e.preventDefault();const r=NET.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,ns=Math.min(2.5,Math.max(0.3,nsc*(e.deltaY<0?1.12:0.89)));ntx=mx-(mx-ntx)*ns/nsc;nty=my-(my-nty)*ns/nsc;nsc=ns;},{passive:false});
function updateNetTitle(msg){const p=document.querySelector("#nettitle p");if(!p)return;
  p.textContent=msg||`${netNodes.length} nodes · ${netLinks.length} links. Click a node to expand · double-click for its card · drag to move · scroll to zoom.`;}
function setView(v,seed){VIEW=v;const on=v==="network";
  NETWRAP.classList.toggle("on",on);netToggleBtn.classList.toggle("on",on);
  document.getElementById("nettitle").style.display=on?"block":"none";
  document.getElementById("hintbar").style.display=on?"none":"block";
  if(on){if(seed)seedNetwork(seed);else if(!netNodes.length)seedNetwork((MOA.il23||G.nodes.find(n=>n.type==="Drug")).id);startSim();}
  else document.getElementById("ribbon").classList.remove("on");}
netToggleBtn.onclick=()=>setView(VIEW==="network"?"poster":"network");
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&!backdrop.classList.contains("on")&&VIEW==="network")setView("poster");});
// undirected adjacency + BFS shortest path (hubs excluded as intermediates)
const ADJ={};G.edges.forEach(e=>{(ADJ[e.source]=ADJ[e.source]||[]).push({o:e.target,type:e.type});(ADJ[e.target]=ADJ[e.target]||[]).push({o:e.source,type:e.type});});
function findPath(a,b){if(a===b)return{ids:[a],rels:[]};const ban=id=>id!==b&&isHub(N[id]);
  const prev={},prevE={},seen=new Set([a]),q=[a];
  while(q.length){const u=q.shift();for(const{o,type}of(ADJ[u]||[])){if(seen.has(o)||ban(o))continue;seen.add(o);prev[o]=u;prevE[o]=type;if(o===b){q.length=0;break;}q.push(o);}}
  if(!seen.has(b))return null;
  const ids=[],rels=[];let cur=b;while(cur!==undefined&&cur!==a){ids.unshift(cur);rels.unshift(prevE[cur]);cur=prev[cur];}
  if(cur!==a)return null;ids.unshift(a);return{ids,rels};}
const LBL2ID={};G.nodes.forEach(n=>{const k=n.label.toLowerCase();if(!(k in LBL2ID))LBL2ID[k]=n.id;});
function resolveLabel(v){v=(v||"").trim().toLowerCase();if(!v)return null;if(LBL2ID[v])return LBL2ID[v];const h=G.nodes.find(n=>n.label.toLowerCase().includes(v));return h?h.id:null;}
function ribbonHTML(ids,rels){return ids.map((id,i)=>`<b>${esc(N[id].label)}</b>${i<ids.length-1?` <span class="rel">—${esc(REL[rels[i]]||rels[i]||"")}→</span> `:""}`).join("");}
function tracePath(){const rib=document.getElementById("ribbon");
  const a=resolveLabel(document.getElementById("pin1").value),b=resolveLabel(document.getElementById("pin2").value);
  if(!a||!b){rib.className="pathribbon on";rib.innerHTML="Enter two entities — a drug, target, cell, cytokine or mechanism — to trace how they connect.";return;}
  const res=findPath(a,b);setView("network");
  if(!res){seedNetwork(a);rib.className="pathribbon on";rib.innerHTML=`No path between <b>${esc(N[a].label)}</b> and <b>${esc(N[b].label)}</b> that doesn't route through the shared indication.`;return;}
  seedPath(res.ids,res.rels);rib.className="pathribbon on";rib.innerHTML=ribbonHTML(res.ids,res.rels);}
document.getElementById("ptrace").onclick=tracePath;
document.getElementById("pin2").addEventListener("keydown",e=>{if(e.key==="Enter")tracePath();});

// ---- content-adaptive vertical flow: close dead space under a short hero + size canvas to content ----
// The upper region (masthead, side panels, strategy tree, mechanism/schematic) has a data-dependent
// bottom; the bottom bands are authored at fixed y (assuming a tall psoriasis hero). Measure the real
// upper bottom and shift the whole bottom section up (or down) to sit just beneath it, then size CH.
function layoutAdapt(){
  const B0=2070;                                   // authored y of the first bottom band ("Standard of care")
  const upper=[...CANVAS.querySelectorAll(".panel,.clusterlabel,.maphead,.node,.mast")]
              .filter(n=>n.offsetTop<B0-120).map(n=>n.offsetTop+n.offsetHeight);
  const upperBottom=Math.max(TREE_BOTTOM, ...(upper.length?upper:[1600]));
  const dY=Math.round((upperBottom+60)-B0);
  if(Math.abs(dY)>6){
    [...CANVAS.querySelectorAll(".panel,.clusterlabel,.secband")]
      .filter(n=>n.offsetTop>=B0-120).forEach(n=>{n.style.top=(n.offsetTop+dY)+"px";});
  }
  const all=[...CANVAS.querySelectorAll(".panel,.clusterlabel,.secband,.node")].map(n=>n.offsetTop+n.offsetHeight);
  ADAPT_CH=Math.round(Math.max(TREE_BOTTOM,...all)+70);
  CANVAS.style.height=ADAPT_CH+"px"; WIRES.setAttribute("height",ADAPT_CH);
}
function rebuild(){[...CANVAS.querySelectorAll(".block,.panel,.mast,.node,.bandlabel,.hnode")].forEach(n=>n.remove());WIRES.innerHTML="";buildHierarchy();buildSchematic();buildPanels();layoutAdapt();}
rebuild(); fit();
</script></body></html>
